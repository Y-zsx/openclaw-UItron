<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>任务执行监控中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
        .metric-card { transition: transform 0.2s; }
        .metric-card:hover { transform: translateY(-2px); }
        .status-completed { color: #10b981; }
        .status-failed { color: #ef4444; }
        .status-running { color: #3b82f6; }
        .status-pending { color: #f59e0b; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">
    <!-- 头部 -->
    <header class="bg-gradient-to-r from-blue-600 to-purple-600 py-4 px-6 shadow-lg">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold flex items-center gap-2">
                📊 任务执行监控中心
            </h1>
            <div class="flex items-center gap-4">
                <span id="lastUpdate" class="text-sm opacity-80"></span>
                <button onclick="refreshAll()" class="bg-white/20 hover:bg-white/30 px-4 py-2 rounded-lg text-sm">
                    🔄 刷新
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-6">
        <!-- 核心指标卡片 -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
            <!-- 总执行次数 -->
            <div class="metric-card bg-gray-800 rounded-xl p-5 shadow-lg border border-gray-700">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-400 text-sm">总执行次数</p>
                        <p id="totalExecutions" class="text-3xl font-bold text-blue-400">-</p>
                    </div>
                    <div class="text-4xl">📈</div>
                </div>
            </div>

            <!-- 成功率 -->
            <div class="metric-card bg-gray-800 rounded-xl p-5 shadow-lg border border-gray-700">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-400 text-sm">成功率 (24h)</p>
                        <p id="successRate" class="text-3xl font-bold text-green-400">-</p>
                    </div>
                    <div class="text-4xl">✅</div>
                </div>
            </div>

            <!-- 运行中 -->
            <div class="metric-card bg-gray-800 rounded-xl p-5 shadow-lg border border-gray-700">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-400 text-sm">运行中任务</p>
                        <p id="runningTasks" class="text-3xl font-bold text-blue-400">-</p>
                    </div>
                    <div class="text-4xl">⏳</div>
                </div>
            </div>

            <!-- 失败任务 -->
            <div class="metric-card bg-gray-800 rounded-xl p-5 shadow-lg border border-gray-700">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-400 text-sm">失败任务 (24h)</p>
                        <p id="failedTasks" class="text-3xl font-bold text-red-400">-</p>
                    </div>
                    <div class="text-4xl">❌</div>
                </div>
            </div>
        </div>

        <!-- 执行时间统计 -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
            <div class="bg-gray-800 rounded-xl p-4 shadow-lg border border-gray-700">
                <p class="text-gray-400 text-sm">平均执行时间</p>
                <p id="avgDuration" class="text-2xl font-bold text-purple-400">-</p>
            </div>
            <div class="bg-gray-800 rounded-xl p-4 shadow-lg border border-gray-700">
                <p class="text-gray-400 text-sm">最短执行时间</p>
                <p id="minDuration" class="text-2xl font-bold text-green-400">-</p>
            </div>
            <div class="bg-gray-800 rounded-xl p-4 shadow-lg border border-gray-700">
                <p class="text-gray-400 text-sm">最长执行时间</p>
                <p id="maxDuration" class="text-2xl font-bold text-orange-400">-</p>
            </div>
        </div>

        <!-- 按Agent统计 -->
        <div class="bg-gray-800 rounded-xl p-5 shadow-lg border border-gray-700 mb-6">
            <h2 class="text-lg font-bold mb-4 flex items-center gap-2">
                🤖 按Agent统计
            </h2>
            <div id="agentStats" class="overflow-x-auto">
                <table class="w-full text-sm">
                    <thead class="bg-gray-700">
                        <tr>
                            <th class="px-4 py-2 text-left">Agent</th>
                            <th class="px-4 py-2 text-right">总执行</th>
                            <th class="px-4 py-2 text-right">成功</th>
                            <th class="px-4 py-2 text-right">失败</th>
                            <th class="px-4 py-2 text-right">成功率</th>
                        </tr>
                    </thead>
                    <tbody id="agentTableBody" class="divide-y divide-gray-700">
                        <tr><td colspan="5" class="px-4 py-4 text-center text-gray-500">加载中...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- 最近执行记录 -->
        <div class="bg-gray-800 rounded-xl p-5 shadow-lg border border-gray-700">
            <h2 class="text-lg font-bold mb-4 flex items-center gap-2">
                📋 最近执行记录
            </h2>
            <div class="overflow-x-auto">
                <table class="w-full text-sm">
                    <thead class="bg-gray-700">
                        <tr>
                            <th class="px-3 py-2 text-left">时间</th>
                            <th class="px-3 py-2 text-left">任务</th>
                            <th class="px-3 py-2 text-left">Agent</th>
                            <th class="px-3 py-2 text-center">状态</th>
                            <th class="px-3 py-2 text-right">耗时</th>
                        </tr>
                    </thead>
                    <tbody id="execTableBody" class="divide-y divide-gray-700">
                        <tr><td colspan="5" class="px-4 py-4 text-center text-gray-500">加载中...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const API_BASE = 'http://localhost:18190/api';

        async function fetchJSON(url) {
            try {
                const resp = await fetch(url);
                return await resp.json();
            } catch (e) {
                console.error('Fetch error:', e);
                return null;
            }
        }

        async function refreshAll() {
            const summary = await fetchJSON(API_BASE + '/summary');
            if (!summary) {
                alert('无法连接到API服务，请确保task_monitor_api.py正在运行');
                return;
            }

            document.getElementById('lastUpdate').textContent = '更新于 ' + new Date().toLocaleTimeString();

            // 核心指标
            const metrics = summary.metrics || {};
            document.getElementById('totalExecutions').textContent = metrics.total_executions || 0;

            const sr = summary.success_rate_24h || {};
            document.getElementById('successRate').textContent = sr.success_rate ? sr.success_rate + '%' : '-';

            document.getElementById('runningTasks').textContent = summary.running_tasks || 0;
            document.getElementById('failedTasks').textContent = summary.failed_tasks_24h || 0;

            // 执行时间
            const ds = summary.duration_stats_24h || {};
            document.getElementById('avgDuration').textContent = ds.avg ? ds.avg + 's' : '-';
            document.getElementById('minDuration').textContent = ds.min ? ds.min + 's' : '-';
            document.getElementById('maxDuration').textContent = ds.max ? ds.max + 's' : '-';

            // Agent统计
            const byAgent = metrics.by_agent || {};
            const agentRows = Object.entries(byAgent).map(([agent, data]) => {
                const rate = data.total > 0 ? ((data.completed / data.total) * 100).toFixed(1) : 0;
                return `
                    <tr class="hover:bg-gray-700/50">
                        <td class="px-4 py-2 font-mono text-blue-300">${agent}</td>
                        <td class="px-4 py-2 text-right">${data.total}</td>
                        <td class="px-4 py-2 text-right text-green-400">${data.completed}</td>
                        <td class="px-4 py-2 text-right text-red-400">${data.failed}</td>
                        <td class="px-4 py-2 text-right">${rate}%</td>
                    </tr>
                `;
            }).join('');
            document.getElementById('agentTableBody').innerHTML = agentRows || '<tr><td colspan="5" class="px-4 py-4 text-center text-gray-500">暂无数据</td></tr>';

            // 最近执行
            const executions = await fetchJSON(API_BASE + '/executions?limit=20');
            if (executions && executions.executions) {
                const execRows = executions.executions.reverse().map(e => {
                    let statusClass = '';
                    let statusText = '';
                    switch(e.status) {
                        case 'completed': statusClass = 'status-completed'; statusText = '✓ 成功'; break;
                        case 'failed': statusClass = 'status-failed'; statusText = '✗ 失败'; break;
                        case 'running': statusClass = 'status-running'; statusText = '⏳ 运行中'; break;
                        default: statusText = e.status;
                    }
                    const time = e.start_time ? new Date(e.start_time).toLocaleString() : '-';
                    return `
                        <tr class="hover:bg-gray-700/50">
                            <td class="px-3 py-2 text-gray-400">${time}</td>
                            <td class="px-3 py-2 font-mono text-sm">${e.task || '-'}</td>
                            <td class="px-3 py-2 text-blue-300">${e.agent_id || '-'}</td>
                            <td class="px-3 py-2 text-center ${statusClass}">${statusText}</td>
                            <td class="px-3 py-2 text-right">${e.duration ? e.duration + 's' : '-'}</td>
                        </tr>
                    `;
                }).join('');
                document.getElementById('execTableBody').innerHTML = execRows || '<tr><td colspan="5" class="px-4 py-4 text-center text-gray-500">暂无执行记录</td></tr>';
            }
        }

        // 初始加载
        refreshAll();

        // 每30秒自动刷新
        setInterval(refreshAll, 30000);
    </script>
</body>
</html>
