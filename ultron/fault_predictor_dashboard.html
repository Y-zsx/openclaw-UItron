<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>故障预测与预防性维护</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #e0e0e0;
        }
        .header {
            background: linear-gradient(90deg, #0f3460, #e94560);
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(233, 69, 96, 0.3);
        }
        .header h1 { font-size: 28px; margin-bottom: 5px; }
        .header .subtitle { opacity: 0.8; font-size: 14px; }
        
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .metric-card {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.3s;
        }
        .metric-card:hover { transform: translateY(-5px); }
        .metric-card.critical { border-color: #ff4757; }
        .metric-card.warning { border-color: #ffa502; }
        .metric-card.ok { border-color: #2ed573; }
        
        .metric-value { font-size: 32px; font-weight: bold; margin: 10px 0; }
        .metric-label { font-size: 14px; opacity: 0.7; }
        
        .section {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .section h2 {
            border-bottom: 2px solid #e94560;
            padding-bottom: 10px;
            margin-bottom: 15px;
            font-size: 20px;
        }
        
        .prediction-card {
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
            border-left: 4px solid;
        }
        .prediction-card.CRITICAL { border-color: #ff4757; }
        .prediction-card.HIGH { border-color: #ff6b81; }
        .prediction-card.MEDIUM { border-color: #ffa502; }
        .prediction-card.LOW { border-color: #2ed573; }
        
        .prediction-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .fault-type { font-weight: bold; font-size: 16px; }
        .severity-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }
        .severity-badge.CRITICAL { background: #ff4757; }
        .severity-badge.HIGH { background: #ff6b81; }
        .severity-badge.MEDIUM { background: #ffa502; color: #000; }
        .severity-badge.LOW { background: #2ed573; color: #000; }
        
        .probability-bar {
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            margin: 10px 0;
            overflow: hidden;
        }
        .probability-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.5s;
        }
        
        .evidence { font-size: 13px; opacity: 0.8; margin: 8px 0; }
        .recommendation { 
            font-size: 13px; 
            color: #7bed9f; 
            background: rgba(123, 237, 159, 0.1);
            padding: 8px;
            border-radius: 4px;
        }
        
        .actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
        }
        .btn-primary { background: #e94560; color: white; }
        .btn-secondary { background: #0f3460; color: white; }
        .btn:hover { transform: scale(1.05); }
        
        .maintenance-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
        }
        .maintenance-btn {
            padding: 15px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }
        .maintenance-btn:hover {
            background: rgba(233, 69, 96, 0.3);
            border-color: #e94560;
        }
        
        .chart-container { height: 300px; margin: 20px 0; }
        
        .status-ok { color: #2ed573; }
        .status-warning { color: #ffa502; }
        .status-critical { color: #ff4757; }
        
        .timestamp { text-align: center; opacity: 0.5; font-size: 12px; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🔮 故障预测与预防性维护系统</h1>
        <div class="subtitle">Agent服务智能监控 | 端口 18238</div>
    </div>
    
    <div class="container">
        <div class="metrics-grid" id="metricsGrid">
            <div class="metric-card" id="cpuCard">
                <div class="metric-label">CPU 使用率</div>
                <div class="metric-value" id="cpuValue">--%</div>
            </div>
            <div class="metric-card" id="memCard">
                <div class="metric-label">内存使用率</div>
                <div class="metric-value" id="memValue">--%</div>
            </div>
            <div class="metric-card" id="diskCard">
                <div class="metric-label">磁盘使用率</div>
                <div class="metric-value" id="diskValue">--%</div>
            </div>
            <div class="metric-card" id="connCard">
                <div class="metric-label">网络连接数</div>
                <div class="metric-value" id="connValue">--</div>
            </div>
        </div>
        
        <div class="section">
            <h2>📊 系统指标趋势</h2>
            <div class="chart-container">
                <canvas id="metricsChart"></canvas>
            </div>
        </div>
        
        <div class="section">
            <h2>⚠️ 故障预测</h2>
            <div id="predictionsList">
                <p style="opacity:0.7; text-align:center; padding:20px;">正在分析...</p>
            </div>
        </div>
        
        <div class="section">
            <h2>🛠️ 预防性维护</h2>
            <div class="maintenance-grid">
                <div class="maintenance-btn" onclick="performMaintenance('clear_cache')">
                    <div>🧹</div>
                    <div>清理缓存</div>
                </div>
                <div class="maintenance-btn" onclick="performMaintenance('clear_old_logs')">
                    <div>📄</div>
                    <div>清理旧日志</div>
                </div>
                <div class="maintenance-btn" onclick="performMaintenance('restart_gateway')">
                    <div>🔄</div>
                    <div>重启Gateway</div>
                </div>
                <div class="maintenance-btn" onclick="runAnalysis()">
                    <div>🔍</div>
                    <div>重新分析</div>
                </div>
            </div>
        </div>
        
        <div class="section">
            <h2>📜 维护历史</h2>
            <div id="maintenanceHistory">
                <p style="opacity:0.7; text-align:center; padding:20px;">暂无记录</p>
            </div>
        </div>
        
        <div class="timestamp" id="timestamp"></div>
    </div>
    
    <script>
        const API_BASE = 'http://' + location.hostname + ':18238';
        let metricsHistory = { labels: [], cpu: [], memory: [], disk: [] };
        let chart = null;
        
        function getSeverityColor(severity) {
            const colors = { CRITICAL: '#ff4757', HIGH: '#ff6b81', MEDIUM: '#ffa502', LOW: '#2ed573' };
            return colors[severity] || '#aaa';
        }
        
        function getProbabilityColor(prob) {
            if (prob >= 0.8) return '#ff4757';
            if (prob >= 0.6) return '#ffa502';
            return '#2ed573';
        }
        
        async function loadMetrics() {
            try {
                const resp = await fetch(API_BASE + '/metrics');
                const data = await resp.json();
                
                document.getElementById('cpuValue').textContent = data.cpu_percent.toFixed(1) + '%';
                document.getElementById('memValue').textContent = data.memory_percent.toFixed(1) + '%';
                document.getElementById('diskValue').textContent = data.disk_percent.toFixed(1) + '%';
                document.getElementById('connValue').textContent = data.network_connections;
                
                // 更新卡片状态
                const updateCard = (id, value, thresholds) => {
                    const card = document.getElementById(id);
                    card.className = 'metric-card';
                    if (value >= thresholds.critical) card.classList.add('critical');
                    else if (value >= thresholds.warning) card.classList.add('warning');
                    else card.classList.add('ok');
                };
                
                updateCard('cpuCard', data.cpu_percent, { warning: 60, critical: 80 });
                updateCard('memCard', data.memory_percent, { warning: 75, critical: 90 });
                updateCard('diskCard', data.disk_percent, { warning: 80, critical: 90 });
                
                // 更新历史
                const now = new Date().toLocaleTimeString();
                metricsHistory.labels.push(now);
                metricsHistory.cpu.push(data.cpu_percent);
                metricsHistory.memory.push(data.memory_percent);
                metricsHistory.disk.push(data.disk_percent);
                
                if (metricsHistory.labels.length > 20) {
                    metricsHistory.labels.shift();
                    metricsHistory.cpu.shift();
                    metricsHistory.memory.shift();
                    metricsHistory.disk.shift();
                }
                
                updateChart();
            } catch (e) {
                console.error('Failed to load metrics:', e);
            }
        }
        
        function updateChart() {
            const ctx = document.getElementById('metricsChart').getContext('2d');
            
            if (chart) chart.destroy();
            
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: metricsHistory.labels,
                    datasets: [
                        { label: 'CPU %', data: metricsHistory.cpu, borderColor: '#e94560', fill: false, tension: 0.4 },
                        { label: '内存 %', data: metricsHistory.memory, borderColor: '#0fb9b1', fill: false, tension: 0.4 },
                        { label: '磁盘 %', data: metricsHistory.disk, borderColor: '#575fcf', fill: false, tension: 0.4 }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { labels: { color: '#e0e0e0' } } },
                    scales: {
                        x: { ticks: { color: '#aaa' }, grid: { color: 'rgba(255,255,255,0.1)' } },
                        y: { ticks: { color: '#aaa' }, grid: { color: 'rgba(255,255,255,0.1)' }, min: 0, max: 100 }
                    }
                }
            });
        }
        
        async function loadPredictions() {
            try {
                const resp = await fetch(API_BASE + '/predictions?limit=10');
                const data = await resp.json();
                const container = document.getElementById('predictionsList');
                
                if (data.predictions.length === 0) {
                    container.innerHTML = '<p style="opacity:0.7; text-align:center; padding:20px;">✅ 系统运行正常，无预测故障</p>';
                    return;
                }
                
                container.innerHTML = data.predictions.map(p => `
                    <div class="prediction-card ${p.severity}">
                        <div class="prediction-header">
                            <span class="fault-type">${p.fault_type}</span>
                            <span class="severity-badge ${p.severity}">${p.severity}</span>
                        </div>
                        <div class="probability-bar">
                            <div class="probability-fill" style="width:${p.probability * 100}%; background:${getProbabilityColor(p.probability)}"></div>
                        </div>
                        <div class="evidence">📊 ${p.evidence}</div>
                        <div class="recommendation">💡 ${p.recommendation}</div>
                        <div class="actions">
                            <button class="btn btn-primary" onclick="resolvePrediction(${p.id})">标记已解决</button>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                console.error('Failed to load predictions:', e);
            }
        }
        
        async function loadMaintenanceHistory() {
            try {
                const resp = await fetch(API_BASE + '/maintenance');
                const data = await resp.json();
                const container = document.getElementById('maintenanceHistory');
                
                if (data.history.length === 0) {
                    return;
                }
                
                container.innerHTML = data.history.map(h => `
                    <div style="padding:10px; border-bottom:1px solid rgba(255,255,255,0.1);">
                        <span class="status-${h.status === 'success' ? 'ok' : 'critical'}">●</span>
                        <strong>${h.action}</strong> - ${h.created_at}
                    </div>
                `).join('');
            } catch (e) {
                console.error('Failed to load maintenance:', e);
            }
        }
        
        async function runAnalysis() {
            try {
                await fetch(API_BASE + '/analyze');
                await loadPredictions();
                await loadMetrics();
            } catch (e) {
                alert('分析失败: ' + e.message);
            }
        }
        
        async function performMaintenance(action) {
            if (!confirm('确定执行 ' + action + '?')) return;
            
            try {
                const resp = await fetch(API_BASE + '/maintenance', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action, target: 'system' })
                });
                const data = await resp.json();
                alert('执行结果: ' + JSON.stringify(data));
                loadMaintenanceHistory();
            } catch (e) {
                alert('执行失败: ' + e.message);
            }
        }
        
        async function resolvePrediction(id) {
            try {
                await fetch(API_BASE + '/resolve', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prediction_id: id })
                });
                loadPredictions();
            } catch (e) {
                alert('操作失败: ' + e.message);
            }
        }
        
        // 初始化
        loadMetrics();
        loadPredictions();
        loadMaintenanceHistory();
        
        // 每10秒刷新
        setInterval(() => {
            loadMetrics();
            loadPredictions();
        }, 10000);
        
        document.getElementById('timestamp').textContent = '最后更新: ' + new Date().toLocaleString();
    </script>
</body>
</html>
