<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网站监控中心 - Website Monitor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        
        header {
            text-align: center;
            padding: 40px 0;
        }
        h1 { font-size: 2.5rem; margin-bottom: 10px; }
        .subtitle { color: #8892b0; font-size: 1rem; }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }
        .stat-card {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .stat-value { font-size: 2.5rem; font-weight: bold; }
        .stat-label { color: #8892b0; margin-top: 5px; }
        .up { color: #00d26a; }
        .down { color: #ff4757; }
        
        .sites { margin-top: 30px; }
        .site-card {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .site-info h3 { margin-bottom: 5px; }
        .site-url { color: #8892b0; font-size: 0.9rem; }
        .site-status {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .status-badge {
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
        }
        .status-up { background: rgba(0,210,106,0.2); color: #00d26a; }
        .status-down { background: rgba(255,71,87,0.2); color: #ff4757; }
        .response-time { color: #8892b0; }
        
        .refresh-btn {
            display: block;
            margin: 30px auto;
            padding: 12px 30px;
            background: #00d26a;
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .refresh-btn:hover { transform: scale(1.05); }
        
        .footer {
            text-align: center;
            margin-top: 50px;
            color: #8892b0;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🖥️ 网站监控中心</h1>
            <p class="subtitle">Website Monitoring Dashboard</p>
        </header>
        
        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="total">0</div>
                <div class="stat-label">监控站点</div>
            </div>
            <div class="stat-card">
                <div class="stat-value up" id="up">0</div>
                <div class="stat-label">在线</div>
            </div>
            <div class="stat-card">
                <div class="stat-value down" id="down">0</div>
                <div class="stat-label">离线</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="avg-time">0ms</div>
                <div class="stat-label">平均响应</div>
            </div>
        </div>
        
        <div class="sites" id="sites">
            <div class="site-card">
                <div class="site-info">
                    <h3>加载中...</h3>
                    <p class="site-url">正在获取监控数据...</p>
                </div>
            </div>
        </div>
        
        <button class="refresh-btn" onclick="loadData()">🔄 刷新数据</button>
        
        <footer class="footer">
            <p>由 奥创🤖 提供技术支持 | 最后更新: <span id="last-update">-</span></p>
        </footer>
    </div>
    
    <script>
        async function loadData() {
            try {
                const response = await fetch('../logs/monitor.json');
                const lines = await response.text();
                const lastLine = lines.trim().split('\n').pop();
                const data = JSON.parse(lastLine);
                
                const results = data.results || [];
                const up = results.filter(r => r.status === 'up').length;
                const down = results.filter(r => r.status === 'down').length;
                const avgTime = results.length ? 
                    Math.round(results.reduce((sum, r) => sum + (r.response_time || 0), 0) / results.length) : 0;
                
                document.getElementById('total').textContent = results.length;
                document.getElementById('up').textContent = up;
                document.getElementById('down').textContent = down;
                document.getElementById('avg-time').textContent = avgTime + 'ms';
                document.getElementById('last-update').textContent = new Date().toLocaleString('zh-CN');
                
                const sitesHtml = results.map(site => `
                    <div class="site-card">
                        <div class="site-info">
                            <h3>${site.site}</h3>
                            <p class="site-url">${site.url}</p>
                        </div>
                        <div class="site-status">
                            <span class="response-time">${site.response_time}ms</span>
                            <span class="status-badge ${site.status === 'up' ? 'status-up' : 'status-down'}">
                                ${site.status === 'up' ? '✅ 在线' : '❌ 离线'}
                            </span>
                        </div>
                    </div>
                `).join('');
                
                document.getElementById('sites').innerHTML = sitesHtml || '<p style="text-align:center;color:#8892b0;">暂无监控数据</p>';
            } catch(e) {
                console.error(e);
                document.getElementById('sites').innerHTML = '<p style="text-align:center;color:#ff4757;">加载数据失败</p>';
            }
        }
        
        loadData();
        setInterval(loadData, 30000);
    </script>
</body>
</html>
