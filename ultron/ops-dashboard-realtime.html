<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>奥创实时运维仪表板 🦞</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 20px 30px;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .logo { font-size: 28px; font-weight: bold; }
        .logo span { color: #ff6b6b; }
        .header-right { display: flex; align-items: center; gap: 15px; }
        .status-badge {
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: bold;
            background: linear-gradient(90deg, #22c55e, #16a34a);
            box-shadow: 0 4px 15px rgba(34,197,94,0.4);
        }
        .time-display { color: rgba(255,255,255,0.8); font-size: 14px; }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 25px;
        }
        
        @media (max-width: 1200px) {
            .grid { grid-template-columns: repeat(2, 1fr); }
            .chart-grid { grid-template-columns: 1fr; }
            .detail-grid { grid-template-columns: 1fr; }
        }
        
        @media (max-width: 768px) {
            body { padding: 10px; }
            .header { flex-direction: column; gap: 15px; padding: 15px; }
            .grid { grid-template-columns: 1fr; }
            .logo { font-size: 20px; }
        }
        
        .stat-card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .stat-icon { font-size: 32px; margin-bottom: 10px; }
        .stat-value { 
            font-size: 36px; 
            font-weight: bold;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .stat-label { 
            color: rgba(255,255,255,0.6); 
            font-size: 14px; 
            margin-top: 5px; 
        }
        
        .chart-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 25px;
        }
        .chart-card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .chart-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .chart-container {
            height: 200px;
            position: relative;
        }
        
        .detail-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }
        .detail-card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .detail-title {
            font-size: 14px;
            color: rgba(255,255,255,0.6);
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .detail-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .detail-item:last-child { border-bottom: none; }
        .detail-key { color: rgba(255,255,255,0.7); }
        .detail-val { font-weight: bold; color: #22c55e; }
        
        .footer {
            text-align: center;
            padding: 20px;
            color: rgba(255,255,255,0.4);
            font-size: 12px;
        }
        
        .api-status {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
            background: #22c55e;
            animation: pulse 2s infinite;
        }
        .api-status.error { background: #ef4444; }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .refresh-indicator {
            color: rgba(255,255,255,0.5);
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">奥创<span>实时运维</span>仪表板 🦞</div>
        <div class="header-right">
            <div class="time-display" id="timeDisplay"></div>
            <div class="status-badge">
                <span class="api-status" id="apiStatus"></span>
                <span id="apiText">连接中...</span>
            </div>
        </div>
    </div>
    
    <div class="grid">
        <div class="stat-card">
            <div class="stat-icon">💻</div>
            <div class="stat-value" id="cpuValue">--</div>
            <div class="stat-label">CPU 使用率</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">🧠</div>
            <div class="stat-value" id="memValue">--</div>
            <div class="stat-label">内存使用率</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">💾</div>
            <div class="stat-value" id="diskValue">--</div>
            <div class="stat-label">磁盘使用率</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">⚡</div>
            <div class="stat-value" id="loadValue">--</div>
            <div class="stat-label">系统负载 (1min)</div>
        </div>
    </div>
    
    <div class="chart-grid">
        <div class="chart-card">
            <div class="chart-title">📊 CPU & 内存历史</div>
            <div class="chart-container">
                <canvas id="cpuMemChart"></canvas>
            </div>
        </div>
        <div class="chart-card">
            <div class="chart-title">🌐 网络流量</div>
            <div class="chart-container">
                <canvas id="networkChart"></canvas>
            </div>
        </div>
    </div>
    
    <div class="detail-grid">
        <div class="detail-card">
            <div class="detail-title">🔌 网络详情</div>
            <div class="detail-item">
                <span class="detail-key">发送字节</span>
                <span class="detail-val" id="bytesSent">--</span>
            </div>
            <div class="detail-item">
                <span class="detail-key">接收字节</span>
                <span class="detail-val" id="bytesRecv">--</span>
            </div>
            <div class="detail-item">
                <span class="detail-key">发送包</span>
                <span class="detail-val" id="pktsSent">--</span>
            </div>
            <div class="detail-item">
                <span class="detail-key">接收包</span>
                <span class="detail-val" id="pktsRecv">--</span>
            </div>
        </div>
        
        <div class="detail-card">
            <div class="detail-title">📈 进程信息</div>
            <div class="detail-item">
                <span class="detail-key">总进程数</span>
                <span class="detail-val" id="processes">--</span>
            </div>
            <div class="detail-item">
                <span class="detail-key">CPU核心数</span>
                <span class="detail-val" id="cpuCount">--</span>
            </div>
            <div class="detail-item">
                <span class="detail-key">内存总量</span>
                <span class="detail-val" id="memTotal">--</span>
            </div>
            <div class="detail-item">
                <span class="detail-key">内存可用</span>
                <span class="detail-val" id="memAvail">--</span>
            </div>
        </div>
        
        <div class="detail-card">
            <div class="detail-title">🔧 系统状态</div>
            <div class="detail-item">
                <span class="detail-key">负载 (1m)</span>
                <span class="detail-val" id="load1">--</span>
            </div>
            <div class="detail-item">
                <span class="detail-key">负载 (5m)</span>
                <span class="detail-val" id="load5">--</span>
            </div>
            <div class="detail-item">
                <span class="detail-key">负载 (15m)</span>
                <span class="detail-val" id="load15">--</span>
            </div>
            <div class="detail-item">
                <span class="detail-key">最后更新</span>
                <span class="detail-val" id="lastUpdate">--</span>
            </div>
        </div>
    </div>
    
    <div class="footer">
        <span class="refresh-indicator">每 5 秒自动刷新</span> | 
        奥创运维仪表板 v3.0
    </div>

    <script>
        const API_URL = 'http://' + window.location.hostname + ':18230/api/metrics';
        
        // 历史数据存储
        const historyData = {
            labels: [],
            cpu: [],
            mem: [],
            netIn: [],
            netOut: []
        };
        
        const MAX_HISTORY = 20;
        
        // 格式化字节数
        function formatBytes(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }
        
        // 格式化时间
        function formatTime(timestamp) {
            const date = new Date(timestamp);
            return date.toLocaleTimeString('zh-CN');
        }
        
        // 初始化图表
        let cpuMemChart, networkChart;
        
        function initCharts() {
            const ctx1 = document.getElementById('cpuMemChart').getContext('2d');
            cpuMemChart = new Chart(ctx1, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [
                        {
                            label: 'CPU %',
                            data: [],
                            borderColor: '#00d2ff',
                            backgroundColor: 'rgba(0, 210, 255, 0.1)',
                            fill: true,
                            tension: 0.4
                        },
                        {
                            label: '内存 %',
                            data: [],
                            borderColor: '#8b5cf6',
                            backgroundColor: 'rgba(139, 92, 246, 0.1)',
                            fill: true,
                            tension: 0.4
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { labels: { color: '#fff' } }
                    },
                    scales: {
                        y: { 
                            beginAtZero: true,
                            max: 100,
                            ticks: { color: 'rgba(255,255,255,0.6)' },
                            grid: { color: 'rgba(255,255,255,0.1)' }
                        },
                        x: {
                            ticks: { color: 'rgba(255,255,255,0.6)' },
                            grid: { color: 'rgba(255,255,255,0.1)' }
                        }
                    }
                }
            });
            
            const ctx2 = document.getElementById('networkChart').getContext('2d');
            networkChart = new Chart(ctx2, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [
                        {
                            label: '入站 (MB)',
                            data: [],
                            borderColor: '#22c55e',
                            backgroundColor: 'rgba(34, 197, 94, 0.1)',
                            fill: true,
                            tension: 0.4
                        },
                        {
                            label: '出站 (MB)',
                            data: [],
                            borderColor: '#f59e0b',
                            backgroundColor: 'rgba(245, 158, 11, 0.1)',
                            fill: true,
                            tension: 0.4
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { labels: { color: '#fff' } }
                    },
                    scales: {
                        y: { 
                            beginAtZero: true,
                            ticks: { color: 'rgba(255,255,255,0.6)' },
                            grid: { color: 'rgba(255,255,255,0.1)' }
                        },
                        x: {
                            ticks: { color: 'rgba(255,255,255,0.6)' },
                            grid: { color: 'rgba(255,255,255,0.1)' }
                        }
                    }
                }
            });
        }
        
        // 更新图表
        function updateCharts() {
            cpuMemChart.data.labels = historyData.labels;
            cpuMemChart.data.datasets[0].data = historyData.cpu;
            cpuMemChart.data.datasets[1].data = historyData.mem;
            cpuMemChart.update('none');
            
            networkChart.data.labels = historyData.labels;
            networkChart.data.datasets[0].data = historyData.netIn;
            networkChart.data.datasets[1].data = historyData.netOut;
            networkChart.update('none');
        }
        
        // 获取数据
        async function fetchMetrics() {
            try {
                const response = await fetch(API_URL, { 
                    timeout: 5000,
                    cache: 'no-cache'
                });
                
                if (!response.ok) throw new Error('API error');
                
                const data = await response.json();
                
                // 更新API状态
                document.getElementById('apiStatus').classList.remove('error');
                document.getElementById('apiText').textContent = '在线';
                
                // 更新顶部时间
                document.getElementById('timeDisplay').textContent = new Date().toLocaleString('zh-CN');
                
                // 更新主要指标
                document.getElementById('cpuValue').textContent = data.cpu.usage_percent.toFixed(1) + '%';
                document.getElementById('memValue').textContent = data.memory.percent.toFixed(1) + '%';
                document.getElementById('diskValue').textContent = data.disk.disks[0].percent.toFixed(1) + '%';
                document.getElementById('loadValue').textContent = data.load['1min'].toFixed(2);
                
                // 更新详情
                document.getElementById('bytesSent').textContent = formatBytes(data.network.bytes_sent);
                document.getElementById('bytesRecv').textContent = formatBytes(data.network.bytes_recv);
                document.getElementById('pktsSent').textContent = data.network.packets_sent.toLocaleString();
                document.getElementById('pktsRecv').textContent = data.network.packets_recv.toLocaleString();
                
                document.getElementById('processes').textContent = data.processes;
                document.getElementById('cpuCount').textContent = data.cpu.count;
                document.getElementById('memTotal').textContent = formatBytes(data.memory.total);
                document.getElementById('memAvail').textContent = formatBytes(data.memory.available);
                
                document.getElementById('load1').textContent = data.load['1min'].toFixed(2);
                document.getElementById('load5').textContent = data.load['5min'].toFixed(2);
                document.getElementById('load15').textContent = data.load['15min'].toFixed(2);
                document.getElementById('lastUpdate').textContent = formatTime(data.timestamp);
                
                // 更新历史数据
                const timeLabel = new Date(data.timestamp).toLocaleTimeString('zh-CN', { 
                    hour: '2-digit', 
                    minute: '2-digit', 
                    second: '2-digit' 
                });
                
                historyData.labels.push(timeLabel);
                historyData.cpu.push(data.cpu.usage_percent);
                historyData.mem.push(data.memory.percent);
                
                // 计算网络增量 (MB)
                const netIn = data.network.bytes_recv / 1024 / 1024;
                const netOut = data.network.bytes_sent / 1024 / 1024;
                historyData.netIn.push(netIn);
                historyData.netOut.push(netOut);
                
                // 限制历史长度
                if (historyData.labels.length > MAX_HISTORY) {
                    historyData.labels.shift();
                    historyData.cpu.shift();
                    historyData.mem.shift();
                    historyData.netIn.shift();
                    historyData.netOut.shift();
                }
                
                updateCharts();
                
            } catch (error) {
                console.error('获取指标失败:', error);
                document.getElementById('apiStatus').classList.add('error');
                document.getElementById('apiText').textContent = '离线';
            }
        }
        
        // 初始化
        initCharts();
        fetchMetrics();
        
        // 每5秒刷新
        setInterval(fetchMetrics, 5000);
    </script>
</body>
</html>
