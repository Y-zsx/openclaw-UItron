<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>健康检查仪表盘</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
        }
        .header h1 { font-size: 28px; }
        .refresh-btn {
            background: #4ade80;
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }
        .refresh-btn:hover { background: #22c55e; }
        
        .status-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .status-card {
            background: rgba(255,255,255,0.08);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            transition: transform 0.3s;
        }
        .status-card:hover { transform: translateY(-5px); }
        .status-card.healthy { border: 2px solid #4ade80; }
        .status-card.warning { border: 2px solid #fbbf24; }
        .status-card.error { border: 2px solid #f87171; }
        
        .status-value { font-size: 48px; font-weight: 700; margin: 10px 0; }
        .status-label { color: #94a3b8; font-size: 14px; }
        
        .network-health { color: #4ade80; }
        .healthy-count { color: #4ade80; }
        .unhealthy-count { color: #f87171; }
        
        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .service-card {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .service-icon {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        .service-icon.healthy { background: rgba(74, 222, 128, 0.2); }
        .service-icon.error { background: rgba(248, 113, 113, 0.2); }
        
        .service-info { flex: 1; }
        .service-name { font-weight: 600; font-size: 16px; margin-bottom: 5px; }
        .service-port { color: #94a3b8; font-size: 13px; }
        .service-meta { display: flex; gap: 15px; margin-top: 8px; font-size: 12px; }
        
        .charts-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .charts-container.three-col {
            grid-template-columns: repeat(3, 1fr);
        }
        @media (max-width: 1200px) {
            .charts-container.three-col { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 800px) {
            .charts-container.three-col { grid-template-columns: 1fr; }
        }
        .chart-box {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 20px;
        }
        .chart-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 15px;
            color: #e2e8f0;
        }
        
        .timestamp { color: #64748b; font-size: 12px; }
        
        .tab-nav {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .tab-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: #94a3b8;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .tab-btn.active {
            background: #4ade80;
            color: #000;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <h1>🔍 健康检查仪表盘</h1>
            <p class="timestamp" id="lastUpdate">最后更新: --</p>
        </div>
        <button class="refresh-btn" onclick="loadData()">🔄 刷新</button>
    </div>
    
    <div class="status-cards">
        <div class="status-card healthy">
            <div class="status-label">网络健康度</div>
            <div class="status-value network-health" id="networkHealth">--</div>
            <div class="status-label">总体状态</div>
        </div>
        <div class="status-card healthy">
            <div class="status-label">健康服务</div>
            <div class="status-value healthy-count" id="healthyCount">--</div>
            <div class="status-label">正常运行</div>
        </div>
        <div class="status-card">
            <div class="status-label">服务总数</div>
            <div class="status-value" id="totalCount">--</div>
            <div class="status-label">监控中</div>
        </div>
        <div class="status-card">
            <div class="status-label">检查次数</div>
            <div class="status-value" id="checkCount">--</div>
            <div class="status-label">本次会话</div>
        </div>
    </div>
    
    <div class="tab-nav">
        <button class="tab-btn active" onclick="switchTab('services')">📋 服务</button>
        <button class="tab-btn" onclick="switchTab('charts')">📊 图表</button>
        <button class="tab-btn" onclick="switchTab('analysis')">📈 分析</button>
    </div>
    
    <div id="services" class="tab-content active">
        <div class="services-grid" id="servicesGrid">
            <!-- 服务卡片动态加载 -->
        </div>
    </div>
    
    <div id="charts" class="tab-content">
        <div class="charts-container">
            <div class="chart-box">
                <div class="chart-title">📈 响应时间趋势 (ms)</div>
                <canvas id="responseTimeChart"></canvas>
            </div>
            <div class="chart-box">
                <div class="chart-title">🏥 健康度历史</div>
                <canvas id="healthHistoryChart"></canvas>
            </div>
        </div>
    </div>
    
    <div id="analysis" class="tab-content">
        <div class="charts-container three-col">
            <div class="chart-box">
                <div class="chart-title">🥧 服务健康分布</div>
                <canvas id="healthDistributionChart"></canvas>
            </div>
            <div class="chart-box">
                <div class="chart-title">📊 平均响应时间</div>
                <canvas id="avgResponseChart"></canvas>
            </div>
            <div class="chart-box">
                <div class="chart-title">⏱️ 服务响应分布</div>
                <canvas id="responseDistChart"></canvas>
            </div>
        </div>
        <div class="charts-container">
            <div class="chart-box">
                <div class="chart-title">📉 每小时健康趋势</div>
                <canvas id="hourlyTrendChart"></canvas>
            </div>
            <div class="chart-box">
                <div class="chart-title">🎯 服务性能雷达</div>
                <canvas id="performanceRadarChart"></canvas>
            </div>
        </div>
    </div>
    
    <script>
        let responseTimeChart, healthHistoryChart;
        let healthDistributionChart, avgResponseChart, responseDistChart;
        let hourlyTrendChart, performanceRadarChart;
        let currentServices = [];
        let currentHistory = [];
        
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.target.classList.add('active');
        }
        
        async function loadData() {
            try {
                const [statusRes, servicesRes, historyRes, hourlyRes] = await Promise.all([
                    fetch('/status'),
                    fetch('/services'),
                    fetch('/history?limit=30'),
                    fetch('/hourly?hours=24')
                ]);
                
                const status = await statusRes.json();
                const services = await servicesRes.json();
                const history = await historyRes.json();
                const hourly = await hourlyRes.json();
                
                currentServices = services.services;
                currentHistory = history.history;
                
                // 更新状态卡片
                document.getElementById('networkHealth').textContent = status.network_health + '%';
                document.getElementById('healthyCount').textContent = status.healthy_services;
                document.getElementById('totalCount').textContent = status.total_services;
                document.getElementById('checkCount').textContent = status.check_count;
                document.getElementById('lastUpdate').textContent = '最后更新: ' + new Date().toLocaleString('zh-CN');
                
                // 更新服务卡片
                const servicesGrid = document.getElementById('servicesGrid');
                servicesGrid.innerHTML = services.services.map(svc => `
                    <div class="service-card">
                        <div class="service-icon ${svc.status === 'healthy' ? 'healthy' : 'error'}">
                            ${svc.status === 'healthy' ? '✅' : '❌'}
                        </div>
                        <div class="service-info">
                            <div class="service-name">${svc.service_name}</div>
                            <div class="service-port">端口: ${svc.port}</div>
                            <div class="service-meta">
                                <span>响应: ${svc.response_time_ms.toFixed(2)}ms</span>
                                <span>HTTP: ${svc.http_code}</span>
                            </div>
                        </div>
                    </div>
                `).join('');
                
                // 更新所有图表
                updateCharts(history.history, hourly.hourly || [], services.services);
            } catch (e) {
                console.error('加载数据失败:', e);
            }
        }
        
        function updateCharts(history, hourlyData, services) {
            const labels = history.map(h => new Date(h.timestamp).toLocaleTimeString('zh-CN'));
            const healthData = history.map(h => h.network_health);
            
            // 解析每个服务的响应时间
            const servicesData = {};
            const serviceNames = {};
            history.forEach(h => {
                try {
                    const details = JSON.parse(h.details_json);
                    Object.entries(details).forEach(([port, data]) => {
                        if (!servicesData[port]) servicesData[port] = [];
                        servicesData[port].push(data.response_time_ms);
                        serviceNames[port] = data.service_name || 'Port ' + port;
                    });
                } catch(e) {}
            });
            
            // 健康历史图表
            if (healthHistoryChart) healthHistoryChart.destroy();
            const ctx1 = document.getElementById('healthHistoryChart').getContext('2d');
            healthHistoryChart = new Chart(ctx1, {
                type: 'line',
                data: {
                    labels: labels.reverse(),
                    datasets: [{
                        label: '健康度 %',
                        data: healthData.reverse(),
                        borderColor: '#4ade80',
                        backgroundColor: 'rgba(74, 222, 128, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { labels: { color: '#fff' } } },
                    scales: {
                        y: { min: 0, max: 100, ticks: { color: '#94a3b8' } },
                        x: { ticks: { color: '#94a3b8' } }
                    }
                }
            });
            
            // 响应时间图表
            if (responseTimeChart) responseTimeChart.destroy();
            const ctx2 = document.getElementById('responseTimeChart').getContext('2d');
            const colors = ['#4ade80', '#60a5fa', '#f472b6', '#fbbf24', '#a78bfa', '#f87171'];
            const datasets = Object.entries(servicesData).map(([port, times], i) => ({
                label: serviceNames[port] || 'Port ' + port,
                data: times.reverse(),
                borderColor: colors[i % colors.length],
                tension: 0.4,
                fill: false
            }));
            
            responseTimeChart = new Chart(ctx2, {
                type: 'line',
                data: { labels: labels.reverse(), datasets },
                options: {
                    responsive: true,
                    plugins: { legend: { labels: { color: '#fff' } } },
                    scales: {
                        y: { ticks: { color: '#94a3b8' } },
                        x: { ticks: { color: '#94a3b8' } }
                    }
                }
            });
            
            // ========== 分析页图表 ==========
            
            // 服务健康分布饼图
            if (healthDistributionChart) healthDistributionChart.destroy();
            const ctx3 = document.getElementById('healthDistributionChart').getContext('2d');
            const healthyCount = services.filter(s => s.status === 'healthy').length;
            const unhealthyCount = services.filter(s => s.status !== 'healthy').length;
            healthDistributionChart = new Chart(ctx3, {
                type: 'doughnut',
                data: {
                    labels: ['健康', '异常'],
                    datasets: [{
                        data: [healthyCount, unhealthyCount],
                        backgroundColor: ['#4ade80', '#f87171']
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { labels: { color: '#fff' } } }
                }
            });
            
            // 平均响应时间柱状图
            if (avgResponseChart) avgResponseChart.destroy();
            const ctx4 = document.getElementById('avgResponseChart').getContext('2d');
            const avgData = services.map(s => ({
                name: s.service_name.substring(0, 12),
                time: s.response_time_ms
            }));
            avgResponseChart = new Chart(ctx4, {
                type: 'bar',
                data: {
                    labels: avgData.map(d => d.name),
                    datasets: [{
                        label: '响应时间 (ms)',
                        data: avgData.map(d => d.time),
                        backgroundColor: colors.slice(0, services.length)
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { labels: { color: '#fff' } } },
                    scales: {
                        y: { ticks: { color: '#94a3b8' } },
                        x: { ticks: { color: '#94a3b8' } }
                    }
                }
            });
            
            // 响应时间分布
            if (responseDistChart) responseDistChart.destroy();
            const ctx5 = document.getElementById('responseDistChart').getContext('2d');
            const allTimes = Object.values(servicesData).flat();
            const buckets = [0, 10, 50, 100, 200, 500];
            const bucketCounts = buckets.map((b, i) => {
                if (i === 0) return allTimes.filter(t => t <= buckets[1]).length;
                if (i === buckets.length - 1) return allTimes.filter(t => t > b).length;
                return allTimes.filter(t => t > b && t <= buckets[i+1]).length;
            });
            responseDistChart = new Chart(ctx5, {
                type: 'bar',
                data: {
                    labels: ['<10ms', '10-50ms', '50-100ms', '100-200ms', '>200ms'],
                    datasets: [{
                        label: '次数',
                        data: bucketCounts,
                        backgroundColor: ['#4ade80', '#60a5fa', '#fbbf24', '#f472b6', '#f87171']
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { labels: { color: '#fff' } } },
                    scales: {
                        y: { ticks: { color: '#94a3b8' } },
                        x: { ticks: { color: '#94a3b8' } }
                    }
                }
            });
            
            // 小时趋势
            if (hourlyTrendChart) hourlyTrendChart.destroy();
            const ctx6 = document.getElementById('hourlyTrendChart').getContext('2d');
            const hourlyLabels = hourlyData.map(h => h.hour || '-');
            const hourlyHealth = hourlyData.map(h => h.avg_health || 0);
            hourlyTrendChart = new Chart(ctx6, {
                type: 'line',
                data: {
                    labels: hourlyLabels,
                    datasets: [{
                        label: '平均健康度',
                        data: hourlyHealth,
                        borderColor: '#a78bfa',
                        backgroundColor: 'rgba(167, 139, 250, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { labels: { color: '#fff' } } },
                    scales: {
                        y: { min: 0, max: 100, ticks: { color: '#94a3b8' } },
                        x: { ticks: { color: '#94a3b8' } }
                    }
                }
            });
            
            // 性能雷达图
            if (performanceRadarChart) performanceRadarChart.destroy();
            const ctx7 = document.getElementById('performanceRadarChart').getContext('2d');
            const radarData = services.map(s => {
                // 将响应时间转换为分数 (越快越高分)
                const score = Math.max(0, 100 - s.response_time_ms);
                return score;
            });
            performanceRadarChart = new Chart(ctx7, {
                type: 'radar',
                data: {
                    labels: services.map(s => s.service_name.substring(0, 10)),
                    datasets: [{
                        label: '性能得分',
                        data: radarData,
                        backgroundColor: 'rgba(96, 165, 250, 0.3)',
                        borderColor: '#60a5fa',
                        pointBackgroundColor: '#60a5fa'
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { labels: { color: '#fff' } } },
                    scales: {
                        r: {
                            min: 0,
                            max: 100,
                            ticks: { color: '#94a3b8', backdropColor: 'transparent' },
                            grid: { color: 'rgba(255,255,255,0.1)' },
                            pointLabels: { color: '#fff' }
                        }
                    }
                }
            });
        }
        
        // 启动时加载
        loadData();
        
        // 每30秒自动刷新
        setInterval(loadData, 30000);
    </script>
</body>
</html>
