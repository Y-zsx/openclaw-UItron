<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>奥创 - 智能决策监控面板</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', 'PingFang SC', sans-serif; 
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh; color: #e0e0e0;
        }
        .header {
            background: linear-gradient(90deg, #0f3460, #16213e);
            padding: 20px 30px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid #e94560;
        }
        .header h1 { color: #e94560; font-size: 1.8em; }
        .header .time { color: #888; font-size: 0.9em; }
        .stats-row { display: flex; gap: 20px; padding: 20px 30px; }
        .stat-card {
            flex: 1; background: #1a1a2e; border-radius: 12px; padding: 20px;
            text-align: center; border: 1px solid #333;
        }
        .stat-card.warning { border-color: #f39c12; }
        .stat-card.error { border-color: #e74c3c; }
        .stat-card.success { border-color: #27ae60; }
        .stat-value { font-size: 2.5em; font-weight: bold; }
        .stat-label { color: #888; margin-top: 5px; }
        .alerts-section { padding: 0 30px 20px; }
        .alerts-section h2 { margin-bottom: 15px; color: #e94560; }
        .alert-item {
            background: #1a1a2e; border-radius: 8px; padding: 15px 20px;
            margin-bottom: 10px; display: flex; align-items: center;
            border-left: 4px solid;
        }
        .alert-item.warning { border-color: #f39c12; }
        .alert-item.error { border-color: #e74c3c; }
        .alert-icon { font-size: 1.5em; margin-right: 15px; }
        .alert-content { flex: 1; }
        .alert-title { font-weight: bold; margin-bottom: 5px; }
        .alert-message { color: #888; font-size: 0.9em; }
        .alert-time { color: #666; font-size: 0.8em; }
        .alert-actions button {
            background: #e94560; border: none; color: white;
            padding: 8px 16px; border-radius: 4px; cursor: pointer;
        }
        .alert-actions button:hover { background: #c73e54; }
        .no-alerts { 
            text-align: center; padding: 40px; color: #27ae60;
            font-size: 1.2em;
        }
        .metrics-grid { 
            display: grid; grid-template-columns: repeat(4, 1fr); 
            gap: 15px; padding: 20px 30px;
        }
        .metric-card {
            background: #1a1a2e; border-radius: 8px; padding: 15px;
            text-align: center;
        }
        .metric-value { font-size: 1.8em; font-weight: bold; }
        .metric-label { color: #888; font-size: 0.9em; }
        .pulse { animation: pulse 2s infinite; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🦞 奥创 - 智能决策监控面板</h1>
        <div class="time">
            <span id="currentTime"></span>
            <span class="pulse">● 实时</span>
        </div>
    </div>

    <div class="stats-row">
        <div class="stat-card" id="activeAlerts">
            <div class="stat-value">-</div>
            <div class="stat-label">活跃告警</div>
        </div>
        <div class="stat-card" id="enabledRules">
            <div class="stat-value">-</div>
            <div class="stat-label">监控规则</div>
        </div>
        <div class="stat-card success" id="pendingAlerts">
            <div class="stat-value">-</div>
            <div class="stat-label">待处理</div>
        </div>
        <div class="stat-card" id="resolvedToday">
            <div class="stat-value">-</div>
            <div class="stat-label">今日解决</div>
        </div>
    </div>

    <div class="metrics-grid" id="metricsGrid"></div>

    <div class="alerts-section">
        <h2>📊 告警列表</h2>
        <div id="alertsList"></div>
    </div>

    <script>
        const API_BASE = 'http://' + location.hostname + ':18122';
        
        function updateTime() {
            document.getElementById('currentTime').textContent = 
                new Date().toLocaleString('zh-CN');
        }
        setInterval(updateTime, 1000);
        updateTime();

        async function fetchData() {
            try {
                const [statsRes, alertsRes] = await Promise.all([
                    fetch(API_BASE + '/stats'),
                    fetch(API_BASE + '/alerts')
                ]);
                const stats = await statsRes.json();
                const alertsData = await alertsRes.json();
                updateDashboard(stats, alertsData);
            } catch (e) {
                document.getElementById('alertsList').innerHTML = 
                    '<div class="no-alerts">⚠️ 无法连接到告警服务</div>';
            }
        }

        function updateDashboard(stats, alertsData) {
            const alerts = alertsData.alerts || [];
            
            // 更新统计卡片
            document.querySelector('#activeAlerts .stat-value').textContent = stats.active_alerts;
            document.querySelector('#enabledRules .stat-value').textContent = stats.enabled_rules;
            document.querySelector('#pendingAlerts .stat-value').textContent = stats.pending_alerts;
            document.querySelector('#resolvedToday .stat-value').textContent = stats.resolved_today;

            // 告警卡片样式
            const activeCard = document.getElementById('activeAlerts');
            activeCard.className = 'stat-card ' + (stats.active_alerts > 0 ? 'error' : 'success');

            // 更新指标网格（取最新告警的指标）
            const metricsGrid = document.getElementById('metricsGrid');
            const latestMetrics = alerts.length > 0 ? alerts[0].metrics : {};
            const metricLabels = { cpu: 'CPU %', memory: '内存 %', disk: '磁盘 %', error_rate: '错误率 %' };
            const metricColors = { cpu: '#e74c3c', memory: '#f39c12', disk: '#9b59b6', error_rate: '#e74c3c' };
            
            metricsGrid.innerHTML = Object.entries(latestMetrics).map(([k, v]) => `
                <div class="metric-card">
                    <div class="metric-value" style="color: ${metricColors[k] || '#fff'}">${v}</div>
                    <div class="metric-label">${metricLabels[k] || k}</div>
                </div>
            `).join('');

            // 更新告警列表
            const alertsList = document.getElementById('alertsList');
            if (alerts.length === 0) {
                alertsList.innerHTML = '<div class="no-alerts">✓ 所有系统正常运行</div>';
            } else {
                const severityIcons = { warning: '⚠️', error: '🔴', critical: '💀' };
                const timeAgo = (ts) => {
                    const diff = Math.floor((Date.now() - new Date(ts)) / 1000);
                    if (diff < 60) return diff + '秒前';
                    if (diff < 3600) return Math.floor(diff / 60) + '分钟前';
                    return Math.floor(diff / 3600) + '小时前';
                };
                
                alertsList.innerHTML = alerts.map(alert => `
                    <div class="alert-item ${alert.severity}">
                        <div class="alert-icon">${severityIcons[alert.severity] || '⚠️'}</div>
                        <div class="alert-content">
                            <div class="alert-title">${alert.rule_name}</div>
                            <div class="alert-message">${alert.message}</div>
                            <div class="alert-time">触发于 ${timeAgo(alert.fired_at)}</div>
                        </div>
                        <div class="alert-actions">
                            <button onclick="acknowledgeAlert('${alert.id}')">确认</button>
                        </div>
                    </div>
                `).join('');
            }
        }

        async function acknowledgeAlert(alertId) {
            try {
                await fetch(API_BASE + '/alerts/' + alertId + '/acknowledge', { method: 'POST' });
                fetchData();
            } catch (e) {
                alert('确认失败: ' + e.message);
            }
        }

        fetchData();
        setInterval(fetchData, 5000); // 每5秒刷新
    </script>
</body>
</html>
