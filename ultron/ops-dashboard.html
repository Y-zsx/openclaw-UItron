<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>奥创运维仪表板</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .logo { font-size: 28px; font-weight: bold; }
        .logo span { color: #ef4444; }
        .status-badge {
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: bold;
            background: #22c55e;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .card-title {
            font-size: 14px;
            color: rgba(255,255,255,0.6);
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .metric {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .metric:last-child { border-bottom: none; }
        .metric-label { color: rgba(255,255,255,0.7); }
        .metric-value { 
            font-size: 20px; 
            font-weight: bold;
            color: #22c55e;
        }
        .progress-bar {
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            margin-top: 8px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.5s ease;
        }
        .progress-cpu { background: linear-gradient(90deg, #22c55e, #f59e0b, #ef4444); }
        .progress-mem { background: linear-gradient(90deg, #3b82f6, #8b5cf6, #ef4444); }
        .progress-disk {
            background: linear-gradient(90deg, #22c55e, #f59e0b);
            width: 30;
        }
        .alert-count {
            font-size: 48px;
            font-weight: bold;
            text-align: center;
            margin: 20px 0;
        }
        .alert-critical { color: #ef4444; }
        .alert-warning { color: #f59e0b; }
        .alert-info { color: #3b82f6; }
        .repair-list {
            max-height: 300px;
            overflow-y: auto;
        }
        .repair-item {
            padding: 12px;
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 13px;
        }
        .repair-time {
            color: rgba(255,255,255,0.5);
            font-size: 11px;
        }
        .repair-strategy {
            display: inline-block;
            padding: 2px 8px;
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
            border-radius: 4px;
            font-size: 12px;
            margin: 4px 0;
        }
        .gateway-status {
            font-family: monospace;
            white-space: pre-wrap;
            font-size: 12px;
            color: rgba(255,255,255,0.8);
            background: rgba(0,0,0,0.3);
            padding: 12px;
            border-radius: 8px;
            max-height: 150px;
            overflow: auto;
        }
        .footer {
            text-align: center;
            padding: 20px;
            color: rgba(255,255,255,0.4);
            font-size: 12px;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .live { animation: pulse 2s infinite; }
    </style>
    <meta http-equiv="refresh" content="30">
</head>
<body>
    <div class="header">
        <div class="logo">奥创<span>运维</span>仪表板 🦞</div>
        <div class="status-badge healthy" style="background: #22c55e;">
            HEALTHY <span class="live">●</span>
        </div>
    </div>
    
    <div class="grid">
        <!-- 系统指标 -->
        <div class="card">
            <div class="card-title">💻 系统资源</div>
            <div class="metric">
                <span class="metric-label">CPU 使用率</span>
                <span class="metric-value">1.6%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill progress-cpu" style="width: 1.6%"></div>
            </div>
            
            <div class="metric" style="margin-top: 20px;">
                <span class="metric-label">内存使用率</span>
                <span class="metric-value">15.3%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill progress-mem" style="width: 15.3%"></div>
            </div>
            
            <div class="metric" style="margin-top: 20px;">
                <span class="metric-label">磁盘使用率</span>
                <span class="metric-value">30%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill progress-disk" style="width: 30%"></div>
            </div>
            
            <div class="metric" style="margin-top: 20px;">
                <span class="metric-label">系统负载</span>
                <span class="metric-value" style="font-size: 16px;">0.56, 0.38, 0.38</span>
            </div>
            <div class="metric">
                <span class="metric-label">进程数 / 网络连接</span>
                <span class="metric-value" style="font-size: 16px;">175 / 325</span>
            </div>
        </div>
        
        <!-- 告警状态 -->
        <div class="card">
            <div class="card-title">🚨 告警状态</div>
            <div class="alert-count" style="color: #ef4444;">10</div>
            <div style="text-align: center; color: rgba(255,255,255,0.6);">总告警数</div>
            
            <div style="display: flex; justify-content: space-around; margin-top: 30px;">
                <div>
                    <div class="alert-count alert-critical" style="font-size: 28px;">3</div>
                    <div style="text-align: center; color: #ef4444;">严重</div>
                </div>
                <div>
                    <div class="alert-count alert-warning" style="font-size: 28px;">7</div>
                    <div style="text-align: center; color: #f59e0b;">警告</div>
                </div>
                <div>
                    <div class="alert-count alert-info" style="font-size: 28px;">0</div>
                    <div style="text-align: center; color: #3b82f6;">信息</div>
                </div>
            </div>
        </div>
        
        <!-- 修复历史 -->
        <div class="card">
            <div class="card-title">🔧 修复历史</div>
            <div class="repair-list">
                
                <div class="repair-item">
                    <div class="repair-time">2026-03-05T15:21:30</div>
                    <span class="repair-strategy">FreeMemory</span>
                    <div style="color: rgba(255,255,255,0.7); margin-top: 4px;">
                        ✓ memory_free
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Gateway状态 -->
        <div class="card">
            <div class="card-title">🔌 OpenClaw Gateway</div>
            <div class="gateway-status">Not Running</div>
        </div>
    </div>
    
    <div class="footer">
        最后更新: 2026-03-06 01:37:11 | 页面每30秒自动刷新
    </div>
</body>
</html>
