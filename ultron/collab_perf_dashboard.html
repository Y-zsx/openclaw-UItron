<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent协作网络 - 性能监控</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #eee;
            min-height: 100vh;
            padding: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
        }
        .header h1 { font-size: 28px; margin-bottom: 10px; }
        .header .subtitle { color: #888; font-size: 14px; }
        .status-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }
        .status-healthy { background: #00c853; }
        .status-degraded { background: #ff9800; }
        .status-unhealthy { background: #f44336; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .card {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 20px;
        }
        .card h3 {
            color: #4fc3f7;
            margin-bottom: 15px;
            font-size: 16px;
        }
        .metric {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .metric:last-child { border-bottom: none; }
        .metric-label { color: #888; }
        .metric-value { 
            font-weight: bold;
            color: #4fc3f7;
        }
        .metric-value.warning { color: #ff9800; }
        .metric-value.error { color: #f44336; }
        .chart-container {
            height: 200px;
            margin-top: 15px;
        }
        .alert-list {
            max-height: 200px;
            overflow-y: auto;
        }
        .alert-item {
            padding: 10px;
            margin-bottom: 8px;
            background: rgba(255,152,0,0.2);
            border-left: 3px solid #ff9800;
            border-radius: 4px;
            font-size: 13px;
        }
        .alert-item.error {
            background: rgba(244,67,54,0.2);
            border-left-color: #f44336;
        }
        .endpoint-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        .endpoint-table th, .endpoint-table td {
            padding: 8px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .endpoint-table th { color: #888; font-weight: normal; }
        .refresh-btn {
            background: #4fc3f7;
            color: #1a1a2e;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 20px;
        }
        .refresh-btn:hover { background: #29b6f6; }
        .last-updated {
            text-align: center;
            color: #666;
            margin-top: 10px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🤖 Agent协作网络 - 性能监控</h1>
        <div class="subtitle">第41世: 性能优化与监控增强</div>
        <div id="statusBadge" class="status-badge status-healthy">健康</div>
    </div>
    
    <div class="grid">
        <div class="card">
            <h3>📊 系统健康</h3>
            <div id="healthMetrics"></div>
        </div>
        
        <div class="card">
            <h3>⚡ 优化统计</h3>
            <div id="optimizerStats"></div>
        </div>
        
        <div class="card">
            <h3>🔄 端点性能</h3>
            <table class="endpoint-table">
                <thead>
                    <tr>
                        <th>端点</th>
                        <th>请求数</th>
                        <th>平均耗时</th>
                        <th>错误率</th>
                    </tr>
                </thead>
                <tbody id="endpointTable"></tbody>
            </table>
        </div>
        
        <div class="card">
            <h3>🔔 告警</h3>
            <div class="alert-list" id="alertList">
                <div style="color: #666; text-align: center; padding: 20px;">暂无告警</div>
            </div>
        </div>
    </div>
    
    <div class="card" style="margin-bottom: 20px;">
        <h3>📈 响应时间趋势</h3>
        <div class="chart-container">
            <canvas id="responseChart"></canvas>
        </div>
    </div>
    
    <div style="text-align: center;">
        <button class="refresh-btn" onclick="refreshData()">🔄 刷新数据</button>
        <div class="last-updated" id="lastUpdated"></div>
    </div>

    <script>
        let responseChart = null;
        
        async function fetchJSON(url) {
            try {
                const resp = await fetch(url);
                return await resp.json();
            } catch(e) {
                console.error(e);
                return null;
            }
        }
        
        async function refreshData() {
            const metrics = await fetchJSON('http://localhost:18141/metrics');
            const stats = await fetchJSON('http://localhost:18141/stats');
            
            if (!metrics) return;
            
            // 更新状态
            const health = metrics.health;
            const badge = document.getElementById('statusBadge');
            badge.className = 'status-badge ' + 
                (health.status === 'healthy' ? 'status-healthy' : 
                 health.status === 'degraded' ? 'status-degraded' : 'status-unhealthy');
            badge.textContent = health.status === 'healthy' ? '健康' : 
                               health.status === 'degraded' ? '降级' : '异常';
            
            // 健康指标
            const m = health.metrics;
            document.getElementById('healthMetrics').innerHTML = `
                <div class="metric">
                    <span class="metric-label">请求数</span>
                    <span class="metric-value">${m.count || 0}</span>
                </div>
                <div class="metric">
                    <span class="metric-label">平均响应</span>
                    <span class="metric-value">${(m.avg || 0).toFixed(1)}ms</span>
                </div>
                <div class="metric">
                    <span class="metric-label">P95响应</span>
                    <span class="metric-value ${(m.p95 || 0) > 500 ? 'warning' : ''}">${(m.p95 || 0).toFixed(1)}ms</span>
                </div>
                <div class="metric">
                    <span class="metric-label">最大响应</span>
                    <span class="metric-value">${(m.max || 0).toFixed(1)}ms</span>
                </div>
            `;
            
            // 优化统计
            if (stats) {
                const c = stats.cache;
                const mt = stats.metrics;
                document.getElementById('optimizerStats').innerHTML = `
                    <div class="metric">
                        <span class="metric-label">缓存命中率</span>
                        <span class="metric-value">${c.hit_rate}</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">缓存条目</span>
                        <span class="metric-value">${c.entries}</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">总请求</span>
                        <span class="metric-value">${mt.requests_total}</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">缓存命中</span>
                        <span class="metric-value">${mt.requests_cached}</span>
                    </div>
                `;
            }
            
            // 端点表格
            const endpoints = health.endpoints;
            let endpointHTML = '';
            for (const [ep, data] of Object.entries(endpoints)) {
                const errorClass = data.error_rate > 5 ? 'error' : '';
                endpointHTML += `
                    <tr>
                        <td>${ep}</td>
                        <td>${data.requests}</td>
                        <td>${data.avg_time_ms.toFixed(1)}ms</td>
                        <td class="${errorClass}">${data.error_rate.toFixed(1)}%</td>
                    </tr>
                `;
            }
            document.getElementById('endpointTable').innerHTML = endpointHTML || 
                '<tr><td colspan="4" style="text-align:center;color:#666">暂无数据</td></tr>';
            
            // 告警
            const alerts = health.alerts || [];
            if (alerts.length > 0) {
                document.getElementById('alertList').innerHTML = alerts.map(a => 
                    `<div class="alert-item">${a}</div>`
                ).join('');
            }
            
            // 更新时间
            document.getElementById('lastUpdated').textContent = 
                '最后更新: ' + new Date().toLocaleTimeString();
        }
        
        function initChart() {
            const ctx = document.getElementById('responseChart').getContext('2d');
            responseChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: '响应时间 (ms)',
                        data: [],
                        borderColor: '#4fc3f7',
                        backgroundColor: 'rgba(79, 195, 247, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            grid: { color: 'rgba(255,255,255,0.1)' }
                        },
                        x: {
                            grid: { display: false }
                        }
                    }
                }
            });
        }
        
        initChart();
        refreshData();
        setInterval(refreshData, 10000);
    </script>
</body>
</html>
