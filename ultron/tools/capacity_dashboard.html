<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能容量规划系统</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }
        .header {
            background: rgba(0,0,0,0.3);
            padding: 20px 40px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { font-size: 24px; color: #00d4ff; }
        .header .time { color: #888; font-size: 14px; }
        .container { padding: 20px 40px; }
        .grid { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 20px; 
            margin-bottom: 20px;
        }
        .card {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .card h3 { color: #888; font-size: 12px; text-transform: uppercase; margin-bottom: 10px; }
        .card .value { font-size: 32px; font-weight: bold; }
        .card .unit { font-size: 14px; color: #888; }
        .card.warning { border-color: #ffc107; }
        .card.danger { border-color: #f44336; }
        .card.success { border-color: #4caf50; }
        
        .gauge-container { display: flex; justify-content: center; margin: 20px 0; }
        .gauge {
            width: 200px;
            height: 100px;
            position: relative;
            overflow: hidden;
        }
        .gauge-bg {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: conic-gradient(from 180deg, #4caf50 0deg, #ffc107 90deg, #f44336 180deg);
            position: absolute;
            top: 0;
        }
        .gauge-mask {
            width: 160px;
            height: 160px;
            background: rgba(26, 26, 46, 0.95);
            border-radius: 50%;
            position: absolute;
            top: 20px;
            left: 20px;
        }
        .gauge-value {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            font-size: 28px;
            font-weight: bold;
        }
        
        .chart-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }
        .chart-card {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .chart-card h3 { margin-bottom: 15px; color: #00d4ff; }
        
        .recommendations {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .recommendations h3 { color: #00d4ff; margin-bottom: 15px; }
        .rec-item {
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            border-left: 4px solid;
        }
        .rec-item.high { background: rgba(244, 67, 54, 0.1); border-color: #f44336; }
        .rec-item.medium { background: rgba(255, 193, 7, 0.1); border-color: #ffc107; }
        .rec-item.low { background: rgba(76, 175, 80, 0.1); border-color: #4caf50; }
        .rec-item .priority { 
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            margin-right: 10px;
        }
        .rec-item.high .priority { background: #f44336; }
        .rec-item.medium .priority { background: #ffc107; color: #000; }
        .rec-item.low .priority { background: #4caf50; }
        
        .efficiency-card {
            text-align: center;
            padding: 30px;
        }
        .efficiency-score {
            font-size: 64px;
            font-weight: bold;
            background: linear-gradient(135deg, #00d4ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .prediction-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            margin-left: 10px;
        }
        .prediction-badge.increasing { background: #f44336; }
        .prediction-badge.decreasing { background: #4caf50; }
        .prediction-badge.stable { background: #2196f3; }
        
        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
        }
        .status-indicator.normal { background: #4caf50; }
        .status-indicator.warning { background: #ffc107; }
        .status-indicator.critical { background: #f44336; }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .live { animation: pulse 2s infinite; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🧠 智能容量规划系统</h1>
        <div class="time">
            <span class="live">●</span> 实时监控 | 
            <span id="currentTime"></span>
        </div>
    </div>
    
    <div class="container">
        <!-- 实时指标 -->
        <div class="grid">
            <div class="card" id="cpuCard">
                <h3><span class="status-indicator" id="cpuStatus"></span>CPU 使用率</h3>
                <div class="value"><span id="cpuValue">0</span><span class="unit">%</span></div>
                <div class="gauge-container">
                    <div class="gauge">
                        <div class="gauge-bg" id="cpuGauge"></div>
                        <div class="gauge-mask"></div>
                        <div class="gauge-value" id="cpuGaugeValue">0%</div>
                    </div>
                </div>
            </div>
            <div class="card" id="memCard">
                <h3><span class="status-indicator" id="memStatus"></span>内存 使用率</h3>
                <div class="value"><span id="memValue">0</span><span class="unit">%</span></div>
                <div style="margin-top: 10px; font-size: 14px; color: #888;">
                    <span id="memUsed">0</span> / <span id="memTotal">0</span> GB
                </div>
            </div>
            <div class="card" id="diskCard">
                <h3><span class="status-indicator" id="diskStatus"></span>磁盘 使用率</h3>
                <div class="value"><span id="diskValue">0</span><span class="unit">%</span></div>
                <div style="margin-top: 10px; font-size: 14px; color: #888;">
                    <span id="diskUsed">0</span> / <span id="diskTotal">0</span> GB
                </div>
            </div>
            <div class="card efficiency-card">
                <h3>资源使用效率</h3>
                <div class="efficiency-score" id="efficiencyScore">--</div>
                <div id="efficiencyRec" style="color: #888; margin-top: 10px;">计算中...</div>
            </div>
        </div>
        
        <!-- 预测信息 -->
        <div class="grid" style="grid-template-columns: repeat(3, 1fr);">
            <div class="card">
                <h3>CPU 预测 (24h)</h3>
                <div class="value">
                    <span id="cpuPredicted">--</span>%
                    <span class="prediction-badge" id="cpuTrend">--</span>
                </div>
                <div style="color: #888; font-size: 12px; margin-top: 5px;">当前: <span id="cpuCurrent">--</span>%</div>
            </div>
            <div class="card">
                <h3>内存 预测 (24h)</h3>
                <div class="value">
                    <span id="memPredicted">--</span>%
                    <span class="prediction-badge" id="memTrend">--</span>
                </div>
                <div style="color: #888; font-size: 12px; margin-top: 5px;">当前: <span id="memCurrent">--</span>%</div>
            </div>
            <div class="card">
                <h3>磁盘 预测 (24h)</h3>
                <div class="value">
                    <span id="diskPredicted">--</span>%
                    <span class="prediction-badge" id="diskTrend">--</span>
                </div>
                <div style="color: #888; font-size: 12px; margin-top: 5px;">当前: <span id="diskCurrent">--</span>%</div>
            </div>
        </div>
        
        <!-- 图表 -->
        <div class="chart-grid">
            <div class="chart-card">
                <h3>📈 资源使用趋势</h3>
                <canvas id="trendChart" height="200"></canvas>
            </div>
            <div class="chart-card">
                <h3>📊 历史使用率</h3>
                <canvas id="historyChart" height="200"></canvas>
            </div>
        </div>
        
        <!-- 建议 -->
        <div class="recommendations">
            <h3>💡 容量规划建议</h3>
            <div id="recommendationsList">
                <div style="color: #888; text-align: center; padding: 20px;">加载中...</div>
            </div>
        </div>
    </div>
    
    <script>
        let trendChart, historyChart;
        const API_BASE = '';
        
        // 初始化图表
        function initCharts() {
            const trendCtx = document.getElementById('trendChart').getContext('2d');
            trendChart = new Chart(trendCtx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [
                        { label: 'CPU', borderColor: '#00d4ff', data: [], tension: 0.4 },
                        { label: '内存', borderColor: '#ff6b6b', data: [], tension: 0.4 },
                        { label: '磁盘', borderColor: '#ffd93d', data: [], tension: 0.4 }
                    ]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { labels: { color: '#fff' } } },
                    scales: {
                        x: { ticks: { color: '#888' }, grid: { color: 'rgba(255,255,255,0.1)' } },
                        y: { ticks: { color: '#888' }, grid: { color: 'rgba(255,255,255,0.1)' }, min: 0, max: 100 }
                    }
                }
            });
            
            const historyCtx = document.getElementById('historyChart').getContext('2d');
            historyChart = new Chart(historyCtx, {
                type: 'bar',
                data: {
                    labels: [],
                    datasets: [
                        { label: 'CPU', backgroundColor: '#00d4ff', data: [] },
                        { label: '内存', backgroundColor: '#ff6b6b', data: [] }
                    ]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { labels: { color: '#fff' } } },
                    scales: {
                        x: { ticks: { color: '#888' }, grid: { color: 'rgba(255,255,255,0.1)' } },
                        y: { ticks: { color: '#888' }, grid: { color: 'rgba(255,255,255,0.1)' }, min: 0, max: 100 }
                    }
                }
            });
        }
        
        // 更新数据
        async function updateData() {
            try {
                const [summaryRes, historyRes] = await Promise.all([
                    fetch(API_BASE + '/api/capacity/summary'),
                    fetch(API_BASE + '/api/capacity/history?limit=20')
                ]);
                
                const summary = await summaryRes.json();
                const history = await historyRes.json();
                
                // 更新实时指标
                const m = summary.metrics;
                document.getElementById('cpuValue').textContent = m.cpu.percent;
                document.getElementById('memValue').textContent = m.memory.percent;
                document.getElementById('diskValue').textContent = m.disk.percent;
                
                document.getElementById('memUsed').textContent = m.memory.used_gb;
                document.getElementById('memTotal').textContent = m.memory.total_gb;
                document.getElementById('diskUsed').textContent = m.disk.used_gb;
                document.getElementById('diskTotal').textContent = m.disk.total_gb;
                
                // 更新状态指示器
                updateStatus('cpu', m.cpu.status);
                updateStatus('mem', m.memory.status);
                updateStatus('disk', m.disk.status);
                
                // 更新预测
                if (summary.prediction) {
                    const p = summary.prediction;
                    document.getElementById('cpuPredicted').textContent = p.cpu.predicted;
                    document.getElementById('memPredicted').textContent = p.memory.predicted;
                    document.getElementById('diskPredicted').textContent = p.disk.predicted;
                    
                    document.getElementById('cpuCurrent').textContent = p.cpu.current;
                    document.getElementById('memCurrent').textContent = p.memory.current;
                    document.getElementById('diskCurrent').textContent = p.disk.current;
                    
                    updateTrend('cpu', p.cpu.trend);
                    updateTrend('mem', p.memory.trend);
                    updateTrend('disk', p.disk.trend);
                }
                
                // 更新效率
                if (summary.efficiency) {
                    document.getElementById('efficiencyScore').textContent = summary.efficiency.score;
                    document.getElementById('efficiencyRec').textContent = summary.efficiency.recommendation;
                }
                
                // 更新建议
                renderRecommendations(summary.recommendations);
                
                // 更新图表
                if (history.history && history.history.length > 0) {
                    const labels = history.history.map((_, i) => i + 1);
                    const cpuData = history.history.map(h => h.cpu.percent);
                    const memData = history.history.map(h => h.memory.percent);
                    const diskData = history.history.map(h => h.disk.percent);
                    
                    trendChart.data.labels = labels;
                    trendChart.data.datasets[0].data = cpuData;
                    trendChart.data.datasets[1].data = memData;
                    trendChart.data.datasets[2].data = diskData;
                    trendChart.update('none');
                    
                    historyChart.data.labels = labels.slice(-10);
                    historyChart.data.datasets[0].data = cpuData.slice(-10);
                    historyChart.data.datasets[1].data = memData.slice(-10);
                    historyChart.update('none');
                }
                
                // 更新时间
                document.getElementById('currentTime').textContent = new Date().toLocaleString('zh-CN');
                
            } catch (e) {
                console.error('获取数据失败:', e);
            }
        }
        
        function updateStatus(type, status) {
            const el = document.getElementById(type + 'Status');
            el.className = 'status-indicator ' + status;
            
            const card = document.getElementById(type + 'Card');
            card.className = 'card ' + (status === 'warning' ? 'warning' : status === 'critical' ? 'danger' : '');
        }
        
        function updateTrend(type, trend) {
            const el = document.getElementById(type + 'Trend');
            el.className = 'prediction-badge ' + trend;
            el.textContent = trend === 'increasing' ? '↑ 上升' : trend === 'decreasing' ? '↓ 下降' : '→ 稳定';
        }
        
        function renderRecommendations(recommendations) {
            const container = document.getElementById('recommendationsList');
            if (!recommendations || recommendations.length === 0) {
                container.innerHTML = '<div style="color: #888; text-align: center;">暂无建议</div>';
                return;
            }
            
            container.innerHTML = recommendations.map(r => `
                <div class="rec-item ${r.priority}">
                    <span class="priority">${r.priority.toUpperCase()}</span>
                    <strong>${r.resource.toUpperCase()}</strong>: ${r.message}
                    <div style="margin-top: 5px; color: #888; font-size: 12px;">建议: ${r.suggested_action}</div>
                </div>
            `).join('');
        }
        
        // 启动
        initCharts();
        updateData();
        setInterval(updateData, 30000);
    </script>
</body>
</html>
