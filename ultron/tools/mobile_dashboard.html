<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>奥创控制台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d1117; color: #c9d1d9;
            min-height: 100vh; padding: 16px;
        }
        .header {
            text-align: center; padding: 20px 0; margin-bottom: 20px;
            border-bottom: 1px solid #30363d;
        }
        .header h1 { color: #58a6ff; font-size: 24px; }
        .status-card {
            background: #161b22; border-radius: 12px; padding: 16px;
            margin-bottom: 12px; border: 1px solid #30363d;
        }
        .status-card h3 { color: #8b949e; font-size: 12px; text-transform: uppercase; margin-bottom: 8px; }
        .status-card .value { font-size: 28px; font-weight: bold; }
        .status-card .value.good { color: #3fb950; }
        .status-card .value.warn { color: #d29922; }
        .status-card .value.bad { color: #f85149; }
        
        .metric { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #21262d; }
        .metric:last-child { border-bottom: none; }
        .metric-label { color: #8b949e; }
        .metric-value { font-weight: bold; }
        
        .service { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; }
        .service-name { font-weight: bold; }
        .service-status { 
            padding: 4px 12px; border-radius: 12px; font-size: 12px; 
        }
        .service-status.running { background: #238636; color: white; }
        .service-status.stopped { background: #da3633; color: white; }
        
        .refresh-btn {
            display: block; width: 100%; padding: 16px;
            background: #238636; color: white; border: none;
            border-radius: 8px; font-size: 16px; cursor: pointer;
            margin-top: 20px;
        }
        
        .loading { text-align: center; padding: 40px; color: #8b949e; }
        .error { background: #da3633; color: white; padding: 12px; border-radius: 8px; margin-bottom: 12px; }
        
        @media (prefers-color-scheme: light) {
            body { background: #f6f8fa; color: #24292f; }
            .status-card { background: white; border-color: #d0d7de; }
            .status-card h3 { color: #57606a; }
            .metric { border-color: #d0d7de; }
            .metric-label { color: #57606a; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🦞 奥创控制台</h1>
        <p id="timestamp" style="color: #8b949e; margin-top: 8px;"></p>
    </div>
    
    <div id="app">
        <div class="loading">加载中...</div>
    </div>
    
    <button class="refresh-btn" onclick="loadStatus()">🔄 刷新状态</button>
    
    <script>
        async function loadStatus() {
            const app = document.getElementById('app');
            app.innerHTML = '<div class="loading">加载中...</div>';
            
            try {
                const res = await fetch('http://115.29.235.46:18096/status');
                const data = await res.json();
                
                const cpuClass = data.system.cpu < 70 ? 'good' : data.system.cpu < 90 ? 'warn' : 'bad';
                const memClass = data.system.memory_percent < 70 ? 'good' : data.system.memory_percent < 90 ? 'warn' : 'bad';
                const diskClass = data.system.disk_percent < 70 ? 'good' : data.system.disk_percent < 90 ? 'warn' : 'bad';
                
                const time = new Date(data.timestamp).toLocaleString('zh-CN');
                document.getElementById('timestamp').textContent = time;
                
                let html = `
                    <div class="status-card">
                        <h3>系统状态</h3>
                        <div class="value ${cpuClass}">${data.system.cpu}%</div>
                        <div style="color: #8b949e; font-size: 12px;">CPU 使用率</div>
                    </div>
                    
                    <div class="status-card">
                        <h3>内存</h3>
                        <div class="value ${memClass}">${data.system.memory_percent}%</div>
                        <div style="color: #8b949e; font-size: 12px;">
                            ${data.system.memory_used_gb}GB / ${data.system.memory_total_gb}GB
                        </div>
                    </div>
                    
                    <div class="status-card">
                        <h3>磁盘</h3>
                        <div class="value ${diskClass}">${data.system.disk_percent}%</div>
                    </div>
                    
                    <div class="status-card">
                        <h3>运行时间</h3>
                        <div class="value good">${data.system.uptime}</div>
                    </div>
                    
                    <div class="status-card">
                        <h3>服务状态</h3>
                        ${Object.entries(data.services).map(([name, status]) => `
                            <div class="service">
                                <span class="service-name">${name}</span>
                                <span class="service-status ${status}">${status}</span>
                            </div>
                        `).join('')}
                    </div>
                `;
                
                app.innerHTML = html;
            } catch (e) {
                app.innerHTML = `<div class="error">加载失败: ${e.message}</div>`;
            }
        }
        
        loadStatus();
        setInterval(loadStatus, 30000);
    </script>
</body>
</html>
