<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>🛡️ Agent服务健康监控面板</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        .header {
            text-align: center;
            padding: 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            margin-bottom: 20px;
        }
        .header h1 { font-size: 2em; margin-bottom: 10px; }
        .header .time { color: #aaa; }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .card {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 20px;
            backdrop-filter: blur(10px);
        }
        
        .card h2 {
            font-size: 1.2em;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .service-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
            margin-bottom: 10px;
        }
        
        .service-info { flex: 1; }
        .service-name { font-weight: bold; font-size: 1.1em; }
        .service-meta { color: #aaa; font-size: 0.85em; margin-top: 4px; }
        
        .status {
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9em;
        }
        
        .status.healthy { background: #10b981; color: #fff; }
        .status.degraded { background: #f59e0b; color: #000; }
        .status.unhealthy { background: #ef4444; color: #fff; }
        .status.unknown { background: #6b7280; color: #fff; }
        
        .alerts {
            max-height: 300px;
            overflow-y: auto;
        }
        
        .alert-item {
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 10px;
            border-left: 4px solid;
        }
        
        .alert-item.critical { background: rgba(239,68,68,0.2); border-color: #ef4444; }
        .alert-item.warning { background: rgba(245,158,11,0.2); border-color: #f59e0b; }
        .alert-item.info { background: rgba(59,130,246,0.2); border-color: #3b82f6; }
        
        .alert-time { color: #aaa; font-size: 0.8em; }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s;
        }
        
        .btn-primary { background: #3b82f6; color: #fff; }
        .btn-primary:hover { background: #2563eb; }
        
        .btn-group { display: flex; gap: 10px; margin-bottom: 20px; justify-content: center; }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }
        
        .stat-value { font-size: 2em; font-weight: bold; }
        .stat-label { color: #aaa; margin-top: 5px; }
        
        .stat-card.healthy .stat-value { color: #10b981; }
        .stat-card.degraded .stat-value { color: #f59e0b; }
        .stat-card.unhealthy .stat-value { color: #ef4444; }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .updating { animation: pulse 1s infinite; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🛡️ Agent服务健康监控面板</h1>
        <div class="time">更新时间: <span id="updateTime">--</span></div>
    </div>
    
    <div class="btn-group">
        <button class="btn btn-primary" onclick="refresh()">🔄 刷新</button>
        <button class="btn btn-primary" onclick="checkNow()">🔍 立即检测</button>
    </div>
    
    <div class="stats" id="stats">
        <div class="stat-card healthy">
            <div class="stat-value" id="healthyCount">0</div>
            <div class="stat-label">健康服务</div>
        </div>
        <div class="stat-card degraded">
            <div class="stat-value" id="degradedCount">0</div>
            <div class="stat-label">性能下降</div>
        </div>
        <div class="stat-card unhealthy">
            <div class="stat-value" id="unhealthyCount">0</div>
            <div class="stat-label">故障服务</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="alertCount">0</div>
            <div class="stat-label">活跃告警</div>
        </div>
    </div>
    
    <div class="grid">
        <div class="card">
            <h2>📊 服务状态</h2>
            <div id="services"></div>
        </div>
        
        <div class="card">
            <h2>📢 最近告警</h2>
            <div class="alerts" id="alerts"></div>
        </div>
    </div>
    
    <script>
        const API_BASE = 'http://localhost:8098';
        
        async function fetchJSON(url) {
            try {
                const resp = await fetch(url);
                return await resp.json();
            } catch (e) {
                console.error(e);
                return null;
            }
        }
        
        function formatTime(ts) {
            if (!ts) return '--';
            return ts.replace('T', ' ').substring(0, 19);
        }
        
        async function refresh() {
            document.body.classList.add('updating');
            
            const status = await fetchJSON(`${API_BASE}/status`);
            if (!status) {
                alert('无法连接到健康检测服务 (端口8098)');
                document.body.classList.remove('updating');
                return;
            }
            
            // 更新时间
            document.getElementById('updateTime').textContent = formatTime(status.timestamp);
            
            // 统计数据
            const services = status.services || {};
            let healthy = 0, degraded = 0, unhealthy = 0;
            
            // 渲染服务列表
            let servicesHTML = '';
            for (const [name, info] of Object.entries(services)) {
                const statusClass = info.status || 'unknown';
                const statusIcon = {
                    'healthy': '✅',
                    'degraded': '⚠️',
                    'unhealthy': '❌',
                    'unknown': '❓'
                }[statusClass];
                
                if (statusClass === 'healthy') healthy++;
                else if (statusClass === 'degraded') degraded++;
                else if (statusClass === 'unhealthy') unhealthy++;
                
                servicesHTML += `
                    <div class="service-item">
                        <div class="service-info">
                            <div class="service-name">${statusIcon} ${name}</div>
                            <div class="service-meta">
                                响应时间: ${info.response_time ? info.response_time + 's' : 'N/A'} | 
                                失败: ${info.failure_count || 0}次
                            </div>
                        </div>
                        <span class="status ${statusClass}">${statusClass}</span>
                    </div>
                `;
            }
            
            document.getElementById('services').innerHTML = servicesHTML || '<p style="color:#aaa">暂无服务数据</p>';
            
            // 更新统计
            document.getElementById('healthyCount').textContent = healthy;
            document.getElementById('degradedCount').textContent = degraded;
            document.getElementById('unhealthyCount').textContent = unhealthy;
            
            // 渲染告警
            const alerts = status.alerts || [];
            document.getElementById('alertCount').textContent = alerts.length;
            
            let alertsHTML = '';
            for (const alert of alerts.slice(-10).reverse()) {
                alertsHTML += `
                    <div class="alert-item ${alert.level}">
                        <div>${alert.service}: ${alert.message}</div>
                        <div class="alert-time">${formatTime(alert.timestamp)}</div>
                    </div>
                `;
            }
            
            document.getElementById('alerts').innerHTML = alertsHTML || '<p style="color:#aaa">暂无告警</p>';
            
            document.body.classList.remove('updating');
        }
        
        async function checkNow() {
            await fetchJSON(`${API_BASE}/check`);
            await refresh();
        }
        
        // 自动刷新
        refresh();
        setInterval(refresh, 30000);
    </script>
</body>
</html>
