<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Orchestrator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { 
            text-align: center; 
            margin-bottom: 30px;
            color: #00d4ff;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }
        .stat-value { font-size: 2.5em; font-weight: bold; }
        .stat-label { color: #aaa; margin-top: 5px; }
        .online { color: #00ff88; }
        .offline { color: #ff4757; }
        .running { color: #ffa502; }
        .completed { color: #2ed573; }
        .failed { color: #ff4757; }
        
        .section {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .section h2 {
            margin-bottom: 15px;
            color: #00d4ff;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
        }
        
        .agent-card, .orch-card {
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .agent-card:hover, .orch-card:hover {
            background: rgba(0,0,0,0.5);
        }
        .agent-info { flex: 1; }
        .agent-name { font-weight: bold; }
        .agent-meta { color: #888; font-size: 0.9em; }
        .status-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85em;
        }
        .status-online { background: rgba(0,255,136,0.2); color: #00ff88; }
        .status-offline { background: rgba(255,71,87,0.2); color: #ff4757; }
        .status-running { background: rgba(255,165,2,0.2); color: #ffa502; }
        .status-completed { background: rgba(46,213,115,0.2); color: #2ed573; }
        .status-failed { background: rgba(255,71,87,0.2); color: #ff4757; }
        
        .capabilities {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            margin-top: 5px;
        }
        .capability {
            background: rgba(0,212,255,0.2);
            color: #00d4ff;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.8em;
        }
        
        .refresh-btn {
            background: #00d4ff;
            color: #1a1a2e;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .refresh-btn:hover { background: #00b8e6; }
        
        .footer {
            text-align: center;
            color: #666;
            margin-top: 30px;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 Agent Orchestrator</h1>
        
        <button class="refresh-btn" onclick="refreshAll()">🔄 Refresh</button>
        
        <div class="stats" id="stats">
            <div class="stat-card">
                <div class="stat-value" id="agent-total">-</div>
                <div class="stat-label">Total Agents</div>
            </div>
            <div class="stat-card">
                <div class="stat-value online" id="agent-online">-</div>
                <div class="stat-label">Online</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="orch-total">-</div>
                <div class="stat-label">Orchestrations</div>
            </div>
            <div class="stat-card">
                <div class="stat-value running" id="orch-running">-</div>
                <div class="stat-label">Running</div>
            </div>
        </div>
        
        <div class="section">
            <h2>🤖 Registered Agents</h2>
            <div id="agents-list"></div>
        </div>
        
        <div class="section">
            <h2>🔄 Orchestrations</h2>
            <div id="orchestrations-list"></div>
        </div>
        
        <div class="footer">
            Agent Orchestrator | Port 18102 | <span id="last-update"></span>
        </div>
    </div>
    
    <script>
        const API_BASE = '';
        
        async function refreshAll() {
            await Promise.all([
                loadDashboard(),
                loadAgents(),
                loadOrchestrations()
            ]);
            document.getElementById('last-update').textContent = 'Updated: ' + new Date().toLocaleTimeString();
        }
        
        async function loadDashboard() {
            try {
                const resp = await fetch('/api/dashboard');
                const data = await resp.json();
                
                const agents = data.agents || {};
                document.getElementById('agent-total').textContent = agents.total || 0;
                document.getElementById('agent-online').textContent = agents.online || 0;
                
                const orchs = data.orchestrations || {};
                document.getElementById('orch-total').textContent = orchs.total || 0;
                document.getElementById('orch-running').textContent = orchs.running || 0;
            } catch(e) {
                console.error(e);
            }
        }
        
        async function loadAgents() {
            try {
                const resp = await fetch('/api/agents');
                const data = await resp.json();
                
                const container = document.getElementById('agents-list');
                if (data.agents && data.agents.length > 0) {
                    container.innerHTML = data.agents.map(agent => `
                        <div class="agent-card">
                            <div class="agent-info">
                                <div class="agent-name">${agent.name}</div>
                                <div class="agent-meta">${agent.id} | ${agent.endpoint}</div>
                                <div class="capabilities">
                                    ${(agent.capabilities || []).map(c => `<span class="capability">${c}</span>`).join('')}
                                </div>
                            </div>
                            <span class="status-badge status-${agent.status}">${agent.status}</span>
                        </div>
                    `).join('');
                } else {
                    container.innerHTML = '<p style="color:#666;text-align:center;">No agents registered</p>';
                }
            } catch(e) {
                document.getElementById('agents-list').innerHTML = '<p style="color:#ff4757;">Failed to load agents</p>';
            }
        }
        
        async function loadOrchestrations() {
            try {
                const resp = await fetch('/api/orchestrations');
                const data = await resp.json();
                
                const container = document.getElementById('orchestrations-list');
                if (data.orchestrations && data.orchestrations.length > 0) {
                    container.innerHTML = data.orchestrations.map(orch => `
                        <div class="orch-card">
                            <div class="agent-info">
                                <div class="agent-name">${orch.name}</div>
                                <div class="agent-meta">${orch.id} | ${orch.tasks_count} tasks, ${orch.completed} completed</div>
                            </div>
                            <span class="status-badge status-${orch.status}">${orch.status}</span>
                        </div>
                    `).join('');
                } else {
                    container.innerHTML = '<p style="color:#666;text-align:center;">No orchestrations</p>';
                }
            } catch(e) {
                document.getElementById('orchestrations-list').innerHTML = '<p style="color:#ff4757;">Failed to load orchestrations</p>';
            }
        }
        
        // Auto refresh every 30 seconds
        refreshAll();
        setInterval(refreshAll, 30000);
    </script>
</body>
</html>
