<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Agent性能监控面板</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            padding: 20px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #30363d;
        }
        .header h1 { color: #58a6ff; }
        .score {
            font-size: 48px;
            font-weight: bold;
            padding: 10px 30px;
            border-radius: 8px;
        }
        .score.good { background: #238636; color: white; }
        .score.warning { background: #d29922; color: white; }
        .score.critical { background: #da3633; color: white; }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }
        .card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 20px;
        }
        .card h3 { color: #8b949e; margin-bottom: 15px; font-size: 14px; }
        .stat { font-size: 32px; font-weight: bold; margin: 5px 0; }
        .stat-label { color: #8b949e; font-size: 12px; }
        .status-normal { color: #3fb950; }
        .status-warning { color: #d29922; }
        .status-critical { color: #f85149; }
        
        .chart-container { height: 200px; margin-top: 10px; }
        
        .agents { margin-top: 20px; }
        .agent-card {
            background: #21262d;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 10px;
        }
        .agent-header { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .agent-name { font-weight: bold; color: #58a6ff; }
        .agent-stats { display: flex; gap: 30px; }
        .agent-stat { text-align: center; }
        .agent-stat-value { font-size: 20px; font-weight: bold; }
        .agent-stat-label { font-size: 11px; color: #8b949e; }
        
        .recommendations {
            background: #1c2128;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
        }
        .recommendations h3 { color: #d29922; margin-bottom: 10px; }
        .recommendations li { margin: 8px 0; color: #c9d1d9; }
        
        .alerts {
            background: #21262d;
            border-radius: 6px;
            padding: 15px;
            margin-top: 15px;
        }
        .alert { 
            padding: 8px 12px; 
            margin: 5px 0; 
            border-radius: 4px;
            font-size: 13px;
        }
        .alert.warning { background: #3d2e00; border-left: 3px solid #d29922; }
        .alert.error { background: #3d1515; border-left: 3px solid #f85149; }
        
        .refresh { 
            background: #238636; 
            color: white; 
            border: none; 
            padding: 8px 16px; 
            border-radius: 6px; 
            cursor: pointer;
        }
        .refresh:hover { background: #2ea043; }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <h1>📊 Agent性能监控</h1>
            <span id="uptime" class="stat-label">--</span>
        </div>
        <div>
            <span id="score" class="score good">100</span>
        </div>
    </div>
    
    <div class="grid">
        <div class="card">
            <h3>CPU</h3>
            <div id="cpu" class="stat status-normal">--%</div>
            <div class="stat-label">负载: <span id="load">--</span></div>
            <div class="chart-container">
                <canvas id="cpuChart"></canvas>
            </div>
        </div>
        <div class="card">
            <h3>内存</h3>
            <div id="memory" class="stat status-normal">--%</div>
            <div class="stat-label"><span id="memUsed">--</span> / <span id="memTotal">--</span> MB</div>
            <div class="chart-container">
                <canvas id="memChart"></canvas>
            </div>
        </div>
        <div class="card">
            <h3>磁盘</h3>
            <div id="disk" class="stat status-normal">--%</div>
            <div class="stat-label"><span id="diskUsed">--</span> / <span id="diskTotal">--</span> GB</div>
        </div>
        <div class="card">
            <h3>网络</h3>
            <div class="stat-label">接收: <span id="netRecv">--</span> MB/s</div>
            <div class="stat-label">发送: <span id="netSent">--</span> MB/s</div>
            <div class="chart-container">
                <canvas id="netChart"></canvas>
            </div>
        </div>
    </div>
    
    <div class="recommendations" id="recSection" style="display:none;">
        <h3>💡 优化建议</h3>
        <ul id="recList"></ul>
    </div>
    
    <div class="agents">
        <h3>🤖 Agent指标</h3>
        <div id="agentList"></div>
    </div>
    
    <button class="refresh" onclick="refresh()" style="margin-top:20px">🔄 刷新</button>

    <script>
        const API = 'http://localhost:8095';
        
        // Charts
        const cpuChart = new Chart(document.getElementById('cpuChart'), {
            type: 'line',
            data: { labels: [], datasets: [{ label: 'CPU %', data: [], borderColor: '#58a6ff', tension: 0.3 }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { max: 100 } } }
        });
        
        const memChart = new Chart(document.getElementById('memChart'), {
            type: 'line',
            data: { labels: [], datasets: [{ label: 'Memory %', data: [], borderColor: '#a371f7', tension: 0.3 }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { max: 100 } } }
        });
        
        const netChart = new Chart(document.getElementById('netChart'), {
            type: 'line',
            data: { 
                labels: [], 
                datasets: [
                    { label: 'Recv', data: [], borderColor: '#3fb950', tension: 0.3 },
                    { label: 'Sent', data: [], borderColor: '#f85149', tension: 0.3 }
                ] 
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
        });
        
        function updateChart(chart, data, label) {
            chart.data.labels = data.map((_, i) => i);
            chart.data.datasets[0].data = data;
            chart.update('none');
        }
        
        async function refresh() {
            try {
                const [snap, cpuHist, memHist, netHist] = await Promise.all([
                    fetch(API + '/snapshot').then(r => r.json()),
                    fetch(API + '/cpu?limit=30').then(r => r.json()),
                    fetch(API + '/memory?limit=30').then(r => r.json()),
                    fetch(API + '/network?limit=30').then(r => r.json())
                ]);
                
                const stats = snap.current;
                const analysis = snap.analysis;
                
                // Score
                const scoreEl = document.getElementById('score');
                scoreEl.textContent = analysis.overall_score;
                scoreEl.className = 'score ' + (analysis.overall_score >= 70 ? 'good' : analysis.overall_score >= 40 ? 'warning' : 'critical');
                
                // CPU
                const cpu = stats.cpu;
                document.getElementById('cpu').textContent = cpu.avg_percent.toFixed(1) + '%';
                document.getElementById('cpu').className = 'stat ' + (cpu.avg_percent < 70 ? 'status-normal' : cpu.avg_percent < 90 ? 'status-warning' : 'status-critical');
                document.getElementById('load').textContent = cpu.load_avg.join(', ');
                
                // Memory
                const mem = stats.memory;
                document.getElementById('memory').textContent = mem.percent.toFixed(1) + '%';
                document.getElementById('memory').className = 'stat ' + (mem.percent < 75 ? 'status-normal' : mem.percent < 90 ? 'status-warning' : 'status-critical');
                document.getElementById('memUsed').textContent = mem.used_mb.toFixed(0);
                document.getElementById('memTotal').textContent = mem.total_mb.toFixed(0);
                
                // Disk
                const disk = stats.disk;
                document.getElementById('disk').textContent = disk.percent.toFixed(1) + '%';
                document.getElementById('disk').className = 'stat ' + (disk.percent < 80 ? 'status-normal' : 'status-warning');
                document.getElementById('diskUsed').textContent = disk.used_gb.toFixed(1);
                document.getElementById('diskTotal').textContent = disk.total_gb.toFixed(1);
                
                // Network
                const net = netHist[netHist.length - 1] || { recv_mb_s: 0, sent_mb_s: 0 };
                document.getElementById('netRecv').textContent = net.recv_mb_s.toFixed(2);
                document.getElementById('netSent').textContent = net.sent_mb_s.toFixed(2);
                
                // Uptime
                const hours = (stats.uptime_seconds / 3600).toFixed(1);
                document.getElementById('uptime').textContent = `运行时间: ${hours}小时`;
                
                // Charts
                updateChart(cpuChart, cpuHist.map(d => d.avg), 'CPU');
                updateChart(memChart, memHist.map(d => d.percent), 'Memory');
                updateChart(netChart, netHist.map(d => d.recv_mb_s), 'Net');
                
                // Recommendations
                const recSection = document.getElementById('recSection');
                const recList = document.getElementById('recList');
                if (analysis.recommendations.length > 0) {
                    recSection.style.display = 'block';
                    recList.innerHTML = analysis.recommendations.map(r => `<li>${r}</li>`).join('');
                } else {
                    recSection.style.display = 'none';
                }
                
                // Agents
                const agentList = document.getElementById('agentList');
                const agents = snap.agents;
                if (Object.keys(agents).length > 0) {
                    agentList.innerHTML = Object.entries(agents).map(([id, data]) => {
                        const m = data.metrics;
                        const avgLat = m.request_count > 0 ? (m.total_latency_ms / m.request_count).toFixed(0) : 0;
                        const errRate = m.request_count > 0 ? (m.error_count / m.request_count * 100).toFixed(1) : 0;
                        return `
                            <div class="agent-card">
                                <div class="agent-header">
                                    <span class="agent-name">${id}</span>
                                </div>
                                <div class="agent-stats">
                                    <div class="agent-stat">
                                        <div class="agent-stat-value">${m.request_count}</div>
                                        <div class="agent-stat-label">请求数</div>
                                    </div>
                                    <div class="agent-stat">
                                        <div class="agent-stat-value" style="color:${errRate > 5 ? '#f85149' : '#3fb950'}">${errRate}%</div>
                                        <div class="agent-stat-label">错误率</div>
                                    </div>
                                    <div class="agent-stat">
                                        <div class="agent-stat-value">${avgLat}ms</div>
                                        <div class="agent-stat-label">平均延迟</div>
                                    </div>
                                </div>
                            </div>
                        `;
                    }).join('');
                } else {
                    agentList.innerHTML = '<div class="alerts"><div class="alert">暂无注册的Agent</div></div>';
                }
                
            } catch(e) {
                console.error(e);
                document.body.innerHTML = '<h2 style="color:#f85149">API未运行 - 请启动 performance_api.py</h2>';
            }
        }
        
        refresh();
        setInterval(refresh, 5000);
    </script>
</body>
</html>
