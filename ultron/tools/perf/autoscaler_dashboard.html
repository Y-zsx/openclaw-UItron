<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自动扩缩容与负载均衡 - Agent服务监控</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        .header {
            text-align: center;
            padding: 30px 0;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            margin-bottom: 30px;
        }
        .header h1 { font-size: 2.5em; margin-bottom: 10px; }
        .header .subtitle { color: #00d4ff; font-size: 1.1em; }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .card {
            background: rgba(255,255,255,0.08);
            border-radius: 15px;
            padding: 25px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .card h2 {
            font-size: 1.3em;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .card h2 .icon { font-size: 1.5em; }
        
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        
        .stat-box {
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            padding: 15px;
            text-align: center;
        }
        
        .stat-box .value {
            font-size: 2em;
            font-weight: bold;
            color: #00d4ff;
        }
        
        .stat-box .label {
            color: #aaa;
            font-size: 0.9em;
            margin-top: 5px;
        }
        
        .agent-list {
            max-height: 300px;
            overflow-y: auto;
        }
        
        .agent-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            margin-bottom: 10px;
        }
        
        .agent-item .name { font-weight: bold; color: #00ff88; }
        .agent-item .instances { 
            background: #00d4ff;
            color: #000;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
        }
        
        .strategy-badge {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            margin: 5px;
        }
        
        .strategy-badge.active {
            background: #00ff88;
            color: #000;
        }
        
        .strategy-badge.inactive {
            background: rgba(255,255,255,0.2);
            color: #aaa;
        }
        
        .chart-container {
            height: 250px;
            margin-top: 15px;
        }
        
        .btn {
            background: linear-gradient(135deg, #00d4ff, #00ff88);
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .btn:hover { transform: scale(1.05); }
        
        .rules-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .rules-table th, .rules-table td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .rules-table th { color: #00d4ff; }
        
        .status-ok { color: #00ff88; }
        .status-warn { color: #ffaa00; }
        .status-error { color: #ff4444; }
        
        .history-item {
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            margin-bottom: 8px;
            border-left: 3px solid #00d4ff;
        }
        
        .history-item.scale-up { border-left-color: #00ff88; }
        .history-item.scale-down { border-left-color: #ff4444; }
        
        .refresh-info {
            text-align: center;
            color: #666;
            margin-top: 20px;
            font-size: 0.9em;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .live-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            background: #00ff88;
            border-radius: 50%;
            animation: pulse 2s infinite;
            margin-right: 8px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🚀 自动扩缩容与负载均衡</h1>
        <div class="subtitle"><span class="live-indicator"></span>Agent服务智能调度中心</div>
    </div>
    
    <div class="grid">
        <!-- 总体状态 -->
        <div class="card">
            <h2><span class="icon">📊</span>系统概览</h2>
            <div class="stat-grid">
                <div class="stat-box">
                    <div class="value" id="total-agents">7</div>
                    <div class="label">Agent服务</div>
                </div>
                <div class="stat-box">
                    <div class="value" id="total-instances">7</div>
                    <div class="label">总实例数</div>
                </div>
                <div class="stat-box">
                    <div class="value" id="total-requests">0</div>
                    <div class="label">总请求数</div>
                </div>
                <div class="stat-box">
                    <div class="value" id="scaling-events">0</div>
                    <div class="label">扩缩容事件</div>
                </div>
            </div>
        </div>
        
        <!-- 负载均衡策略 -->
        <div class="card">
            <h2><span class="icon">⚖️</span>负载均衡策略</h2>
            <div style="margin-bottom: 15px;">
                <span class="strategy-badge active" id="current-strategy">adaptive</span>
            </div>
            <div class="stat-grid">
                <div class="stat-box">
                    <div class="value" id="lb-requests">0</div>
                    <div class="label">LB请求</div>
                </div>
                <div class="stat-box">
                    <div class="value" id="lb-errors">0</div>
                    <div class="label">错误数</div>
                </div>
            </div>
            <div style="margin-top: 15px;">
                <button class="btn" onclick="setStrategy('adaptive')">自适应</button>
                <button class="btn" onclick="setStrategy('round_robin')">轮询</button>
                <button class="btn" onclick="setStrategy('least_connections')">最少连接</button>
            </div>
        </div>
        
        <!-- Agent实例池 -->
        <div class="card">
            <h2><span class="icon">🐳</span>Agent实例池</h2>
            <div class="agent-list" id="agent-list">
                <!-- 动态加载 -->
            </div>
        </div>
        
        <!-- 扩缩容规则 -->
        <div class="card">
            <h2><span class="icon">📐</span>扩缩容规则</h2>
            <table class="rules-table">
                <tr><th>指标</th><th>阈值</th></tr>
                <tr><td>CPU 扩容</td><td>> 80%</td></tr>
                <tr><td>CPU 缩容</td><td>< 20%</td></tr>
                <tr><td>内存 扩容</td><td>> 85%</td></tr>
                <tr><td>内存 缩容</td><td>< 30%</td></tr>
                <tr><td>响应时间</td><td>> 2000ms 扩容</td></tr>
                <tr><td>实例范围</td><td>1 - 10</td></tr>
                <tr><td>冷却时间</td><td>60秒</td></tr>
            </table>
        </div>
        
        <!-- 扩缩容历史 -->
        <div class="card" style="grid-column: span 2;">
            <h2><span class="icon">📜</span>扩缩容历史</h2>
            <div id="scaling-history">
                <!-- 动态加载 -->
            </div>
        </div>
    </div>
    
    <div class="refresh-info">
        自动刷新中... 最后更新: <span id="last-update">-</span>
    </div>
    
    <script>
        let historyChart = null;
        
        async function fetchData() {
            try {
                const resp = await fetch('/snapshot');
                const data = await resp.json();
                updateUI(data);
            } catch(e) {
                console.error('获取数据失败:', e);
            }
        }
        
        function updateUI(data) {
            const scaling = data.scaling || {};
            const lb = data.load_balancer || {};
            
            // 更新系统概览
            const pool = scaling.instance_pool || {};
            document.getElementById('total-agents').textContent = Object.keys(pool).length;
            document.getElementById('total-instances').textContent = 
                Object.values(pool).reduce((sum, p) => sum + (p.instances || 0), 0);
            document.getElementById('scaling-events').textContent = scaling.history_count || 0;
            
            // 更新负载均衡
            const stats = lb.stats || {};
            let totalReq = 0, totalErr = 0;
            for (let k in stats) {
                totalReq += stats[k].requests || 0;
                totalErr += stats[k].errors || 0;
            }
            document.getElementById('total-requests').textContent = totalReq;
            document.getElementById('lb-requests').textContent = totalReq;
            document.getElementById('lb-errors').textContent = totalErr;
            document.getElementById('current-strategy').textContent = lb.strategy || 'adaptive';
            
            // 更新Agent列表
            const agentList = document.getElementById('agent-list');
            agentList.innerHTML = '';
            for (let [name, info] of Object.entries(pool)) {
                const item = document.createElement('div');
                item.className = 'agent-item';
                item.innerHTML = `
                    <span class="name">${name}</span>
                    <span class="instances">${info.instances} 实例</span>
                `;
                agentList.appendChild(item);
            }
            
            // 更新扩缩容历史
            const history = scaling.history || [];
            const historyEl = document.getElementById('scaling-history');
            if (history.length === 0) {
                historyEl.innerHTML = '<div style="color:#666;text-align:center;">暂无扩缩容事件</div>';
            } else {
                historyEl.innerHTML = history.slice(-5).reverse().map(h => `
                    <div class="history-item ${h.event_type}">
                        <strong>${h.agent}</strong>: ${h.event_type === 'scale_up' ? '扩容' : '缩容'}
                        ${h.old_instances} → ${h.new_instances} 实例
                        <span style="color:#666;font-size:0.9em;">(${h.reason})</span>
                        <span style="color:#666;font-size:0.8em;float:right;">${h.timestamp?.split('T')[1]?.split('.')[0]}</span>
                    </div>
                `).join('');
            }
            
            document.getElementById('last-update').textContent = new Date().toLocaleTimeString();
        }
        
        async function setStrategy(strategy) {
            try {
                await fetch('/lb/strategy', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({strategy})
                });
                fetchData();
            } catch(e) {
                console.error('设置策略失败:', e);
            }
        }
        
        // 初始化
        fetchData();
        setInterval(fetchData, 5000);
    </script>
</body>
</html>
