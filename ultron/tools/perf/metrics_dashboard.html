<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent服务性能监控中心</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #e4e4e7;
            padding: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .header h1 {
            font-size: 28px;
            background: linear-gradient(90deg, #00d4ff, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        .header .timestamp { color: #71717a; font-size: 14px; }
        
        .status-bar {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        .status-item {
            background: rgba(255,255,255,0.08);
            padding: 12px 20px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .status-item .label { color: #a1a1aa; font-size: 13px; }
        .status-item .value { font-weight: 600; font-size: 16px; }
        .status-item .value.ok { color: #22c55e; }
        .status-item .value.warn { color: #f59e0b; }
        .status-item .value.error { color: #ef4444; }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .card {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .card h3 {
            font-size: 16px;
            color: #00d4ff;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .card h3::before {
            content: '';
            width: 8px;
            height: 8px;
            background: #00d4ff;
            border-radius: 50%;
        }
        
        .metrics-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }
        .metric-box {
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }
        .metric-box .value {
            font-size: 24px;
            font-weight: 700;
            color: #fff;
        }
        .metric-box .label {
            font-size: 12px;
            color: #71717a;
            margin-top: 5px;
        }
        .metric-box.cpu .value { color: #f59e0b; }
        .metric-box.memory .value { color: #8b5cf6; }
        .metric-box.disk .value { color: #06b6d4; }
        .metric-box.network .value { color: #22c55e; }
        
        .agents-table {
            width: 100%;
            border-collapse: collapse;
        }
        .agents-table th, .agents-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .agents-table th { color: #71717a; font-size: 12px; text-transform: uppercase; }
        .agents-table td { font-size: 14px; }
        .agents-table .name { color: #00d4ff; font-weight: 600; }
        .agents-table .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
        }
        .agents-table .status-dot.active { background: #22c55e; }
        .agents-table .status-dot.warning { background: #f59e0b; }
        .agents-table .status-dot.error { background: #ef4444; }
        
        .health-indicators {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
        }
        .health-item {
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }
        .health-item .indicator {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            margin: 0 auto 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        .health-item .indicator.ok { background: rgba(34,197,94,0.2); }
        .health-item .indicator.error { background: rgba(239,68,68,0.2); }
        .health-item .name { font-size: 12px; color: #a1a1aa; }
        
        .api-list {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        .api-item {
            background: rgba(0,0,0,0.3);
            padding: 12px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .api-item .name { font-size: 13px; color: #00d4ff; }
        .api-item .port { font-size: 12px; color: #71717a; }
        .api-item .status {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }
        .api-item .status.up { background: #22c55e; }
        .api-item .status.down { background: #ef4444; }
        
        .alert-box {
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.3);
            border-radius: 10px;
            padding: 15px;
            margin-top: 15px;
            display: none;
        }
        .alert-box.show { display: block; }
        .alert-box .title { color: #ef4444; font-weight: 600; margin-bottom: 10px; }
        .alert-box .item { 
            padding: 8px 12px; 
            background: rgba(0,0,0,0.3); 
            border-radius: 6px; 
            margin-bottom: 8px;
            font-size: 13px;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .updating { animation: pulse 1s infinite; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🚀 Agent服务性能监控中心</h1>
        <div class="timestamp">最后更新: <span id="lastUpdate">--</span></div>
    </div>
    
    <div class="status-bar">
        <div class="status-item">
            <span class="label">系统运行时间</span>
            <span class="value" id="uptime">--</span>
        </div>
        <div class="status-item">
            <span class="label">已注册Agent</span>
            <span class="value ok" id="agentCount">--</span>
        </div>
        <div class="status-item">
            <span class="label">API服务</span>
            <span class="value ok" id="apiCount">--</span>
        </div>
        <div class="status-item">
            <span class="label">健康状态</span>
            <span class="value ok" id="healthStatus">正常</span>
        </div>
    </div>
    
    <div class="grid">
        <div class="card">
            <h3>系统资源</h3>
            <div class="metrics-row">
                <div class="metric-box cpu">
                    <div class="value" id="cpuPercent">--%</div>
                    <div class="label">CPU</div>
                </div>
                <div class="metric-box memory">
                    <div class="value" id="memoryPercent">--%</div>
                    <div class="label">内存</div>
                </div>
                <div class="metric-box disk">
                    <div class="value" id="diskPercent">--%</div>
                    <div class="label">磁盘</div>
                </div>
                <div class="metric-box network">
                    <div class="value" id="loadAvg">--</div>
                    <div class="label">负载</div>
                </div>
            </div>
            <canvas id="cpuChart" height="80"></canvas>
        </div>
        
        <div class="card">
            <h3>Agent服务状态</h3>
            <table class="agents-table">
                <thead>
                    <tr>
                        <th>服务</th>
                        <th>请求数</th>
                        <th>延迟</th>
                        <th>状态</th>
                    </tr>
                </thead>
                <tbody id="agentsTable">
                    <tr><td colspan="4">加载中...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
    
    <div class="grid">
        <div class="card">
            <h3>API服务健康</h3>
            <div class="api-list" id="apiList">
                <div class="api-item"><span class="name">Loading...</span></div>
            </div>
        </div>
        
        <div class="card">
            <h3>告警</h3>
            <div class="alert-box" id="alertBox">
                <div class="title">⚠️ 告警信息</div>
                <div id="alertList"></div>
            </div>
            <div id="noAlerts" style="color: #71717a; text-align: center; padding: 20px;">
                无告警
            </div>
        </div>
    </div>
    
    <div class="grid">
        <div class="card">
            <h3>内存使用历史</h3>
            <canvas id="memoryChart" height="100"></canvas>
        </div>
        
        <div class="card">
            <h3>Agent请求统计</h3>
            <canvas id="agentChart" height="100"></canvas>
        </div>
    </div>

    <script>
        const API_BASE = 'http://' + window.location.hostname;
        const APIS = [
            { name: '性能监控', port: 8095, path: '/health' },
            { name: '日志聚合', port: 8091, path: '/health' },
            { name: '健康检测', port: 8098, path: '/health' },
            { name: '工作流引擎', port: 8093, path: '/workflows' }
        ];
        
        let cpuChart, memoryChart, agentChart;
        
        async function fetchJSON(url) {
            try {
                const resp = await fetch(url);
                return await resp.json();
            } catch(e) { return null; }
        }
        
        async function checkAPI(api) {
            try {
                const resp = await fetch(`http://${window.location.hostname}:${api.port}${api.path}`, {signal: AbortSignal.timeout(2000)});
                return resp.ok;
            } catch { return false; }
        }
        
        function formatUptime(seconds) {
            const days = Math.floor(seconds / 86400);
            const hours = Math.floor((seconds % 86400) / 3600);
            const mins = Math.floor((seconds % 3600) / 60);
            return days > 0 ? `${days}天${hours}小时` : `${hours}小时${mins}分`;
        }
        
        async function updateStats() {
            const [stats, agents, cpuHistory, memHistory] = await Promise.all([
                fetchJSON(`http://${window.location.hostname}:8095/stats`),
                fetchJSON(`http://${window.location.hostname}:8095/agents`),
                fetchJSON(`http://${window.location.hostname}:8095/cpu?limit=30`),
                fetchJSON(`http://${window.location.hostname}:8095/memory?limit=30`)
            ]);
            
            if (!stats) return;
            
            // 更新系统指标
            document.getElementById('cpuPercent').textContent = stats.cpu?.avg_percent?.toFixed(1) + '%' || '--';
            document.getElementById('memoryPercent').textContent = stats.memory?.percent?.toFixed(1) + '%' || '--';
            document.getElementById('diskPercent').textContent = stats.disk?.percent?.toFixed(1) + '%' || '--';
            document.getElementById('loadAvg').textContent = stats.cpu?.load_avg?.[0]?.toFixed(2) || '--';
            document.getElementById('uptime').textContent = formatUptime(stats.uptime_seconds || 0);
            
            // 更新Agent列表
            const agentCount = agents ? Object.keys(agents).length : 0;
            document.getElementById('agentCount').textContent = agentCount;
            
            if (agents) {
                let html = '';
                let hasAlerts = false;
                for (const [id, data] of Object.entries(agents)) {
                    const reqCount = data.metrics?.request_count || 0;
                    const avgLatency = reqCount > 0 ? (data.metrics.total_latency_ms / reqCount).toFixed(0) : 0;
                    const errorCount = data.metrics?.error_count || 0;
                    const status = errorCount > 0 ? 'error' : reqCount > 0 ? 'active' : 'warning';
                    if (data.alerts?.length > 0) hasAlerts = true;
                    html += `<tr>
                        <td><span class="name">${id}</span></td>
                        <td>${reqCount}</td>
                        <td>${avgLatency}ms</td>
                        <td><span class="status-dot ${status}"></span>${status}</td>
                    </tr>`;
                }
                document.getElementById('agentsTable').innerHTML = html;
                
                // 告警
                const alertList = [];
                for (const [id, data] of Object.entries(agents)) {
                    if (data.alerts) alertList.push(...data.alerts);
                }
                const alertBox = document.getElementById('alertBox');
                const noAlerts = document.getElementById('noAlerts');
                if (alertList.length > 0) {
                    alertBox.classList.add('show');
                    noAlerts.style.display = 'none';
                    document.getElementById('alertList').innerHTML = alertList.map(a => 
                        `<div class="item">${a.message || JSON.stringify(a)}</div>`).join('');
                } else {
                    alertBox.classList.remove('show');
                    noAlerts.style.display = 'block';
                }
            }
            
            // 更新图表
            if (cpuHistory && cpuHistory.length > 0) {
                const labels = cpuHistory.map((_, i) => '');
                const data = cpuHistory.map(h => h.avg_percent || 0);
                if (cpuChart) {
                    cpuChart.data.labels = labels;
                    cpuChart.data.datasets[0].data = data;
                    cpuChart.update('none');
                } else {
                    cpuChart = new Chart(document.getElementById('cpuChart'), {
                        type: 'line',
                        data: { labels, datasets: [{ data, borderColor: '#f59e0b', backgroundColor: 'rgba(245,158,11,0.1)', fill: true, tension: 0.4 }] },
                        options: { responsive: true, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { display: false } }, maintainAspectRatio: false }
                    });
                }
            }
            
            if (memHistory && memHistory.length > 0) {
                const labels = memHistory.map((_, i) => '');
                const data = memHistory.map(h => h.percent || 0);
                if (memoryChart) {
                    memoryChart.data.labels = labels;
                    memoryChart.data.datasets[0].data = data;
                    memoryChart.update('none');
                } else {
                    memoryChart = new Chart(document.getElementById('memoryChart'), {
                        type: 'line',
                        data: { labels, datasets: [{ data, borderColor: '#8b5cf6', backgroundColor: 'rgba(139,92,246,0.1)', fill: true, tension: 0.4 }] },
                        options: { responsive: true, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { display: false } }, maintainAspectRatio: false }
                    });
                }
            }
            
            // Agent请求图表
            if (agents) {
                const labels = Object.keys(agents);
                const reqData = labels.map(id => agents[id].metrics?.request_count || 0);
                const errData = labels.map(id => agents[id].metrics?.error_count || 0);
                if (agentChart) {
                    agentChart.data.labels = labels;
                    agentChart.data.datasets[0].data = reqData;
                    agentChart.data.datasets[1].data = errData;
                    agentChart.update('none');
                } else {
                    agentChart = new Chart(document.getElementById('agentChart'), {
                        type: 'bar',
                        data: { 
                            labels, 
                            datasets: [{ label: '请求', data: reqData, backgroundColor: '#22c55e' }, { label: '错误', data: errData, backgroundColor: '#ef4444' }] 
                        },
                        options: { responsive: true, plugins: { legend: { position: 'bottom', labels: { color: '#a1a1aa' } } }, scales: { x: { ticks: { color: '#a1a1aa' } }, y: { ticks: { color: '#a1a1aa' }, grid: { color: 'rgba(255,255,255,0.1)' } } }, maintainAspectRatio: false }
                    });
                }
            }
            
            // 检查API服务
            const apiStatus = await Promise.all(APIS.map(async api => ({ ...api, up: await checkAPI(api) })));
            document.getElementById('apiCount').textContent = apiStatus.filter(a => a.up).length + '/' + APIS.length;
            document.getElementById('apiList').innerHTML = apiStatus.map(api => `
                <div class="api-item">
                    <span class="name">${api.name}</span>
                    <span class="port">:${api.port}</span>
                    <span class="status ${api.up ? 'up' : 'down'}"></span>
                </div>
            `).join('');
            
            document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString();
        }
        
        updateStats();
        setInterval(updateStats, 5000);
    </script>
</body>
</html>
