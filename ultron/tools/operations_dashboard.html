<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能运维助手 - 统一仪表盘</title>
    <style>
        :root {
            --bg-dark: #0d1117;
            --bg-card: #161b22;
            --border: #30363d;
            --text-main: #c9d1d9;
            --text-muted: #8b949e;
            --green: #3fb950;
            --red: #f85149;
            --yellow: #d29922;
            --blue: #58a6ff;
            --purple: #a371f7;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            padding: 20px;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }
        
        .header h1 {
            font-size: 24px;
            background: linear-gradient(135deg, var(--blue), var(--purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .last-updated {
            color: var(--text-muted);
            font-size: 14px;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }
        
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
        }
        
        .card h2 {
            font-size: 16px;
            color: var(--text-muted);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .status-ok { color: var(--green); }
        .status-error { color: var(--red); }
        .status-warning { color: var(--yellow); }
        
        .service-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .service-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: rgba(255,255,255,0.02);
            border-radius: 6px;
        }
        
        .service-name {
            font-weight: 500;
        }
        
        .service-meta {
            font-size: 12px;
            color: var(--text-muted);
        }
        
        .status-badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .badge-healthy { background: rgba(63,185,80,0.15); color: var(--green); }
        .badge-unhealthy { background: rgba(248,81,73,0.15); color: var(--red); }
        
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }
        
        .stat-box {
            text-align: center;
            padding: 16px;
            background: rgba(255,255,255,0.02);
            border-radius: 8px;
        }
        
        .stat-value {
            font-size: 28px;
            font-weight: 600;
            color: var(--blue);
        }
        
        .stat-label {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 4px;
        }
        
        .alert-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .alert-item {
            padding: 12px;
            border-radius: 6px;
            font-size: 14px;
        }
        
        .alert-critical { background: rgba(248,81,73,0.1); border-left: 3px solid var(--red); }
        .alert-warning { background: rgba(210,153,34,0.1); border-left: 3px solid var(--yellow); }
        .alert-info { background: rgba(88,166,255,0.1); border-left: 3px solid var(--blue); }
        
        .report-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .report-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: rgba(255,255,255,0.02);
            border-radius: 6px;
        }
        
        .report-name { font-weight: 500; }
        .report-time { font-size: 12px; color: var(--text-muted); }
        
        .btn {
            padding: 6px 12px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text-main);
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }
        
        .btn:hover { background: rgba(255,255,255,0.05); }
        .btn-primary { background: var(--blue); color: #000; border: none; }
        
        .full-width { grid-column: 1 / -1; }
        
        .system-stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
        }
        
        @media (max-width: 768px) {
            .grid { grid-template-columns: 1fr; }
            .system-stats { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🖥️ 智能运维助手 - 统一仪表盘</h1>
        <div class="last-updated">最后更新: <span id="updateTime">--</span></div>
    </div>
    
    <div class="grid">
        <!-- 系统健康概览 -->
        <div class="card">
            <h2>📊 系统健康概览</h2>
            <div class="stat-grid" id="systemStats">
                <div class="stat-box">
                    <div class="stat-value" id="totalServices">--</div>
                    <div class="stat-label">服务总数</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value status-ok" id="healthyServices">--</div>
                    <div class="stat-label">健康</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value status-error" id="unhealthyServices">--</div>
                    <div class="stat-label">异常</div>
                </div>
            </div>
        </div>
        
        <!-- 最新告警 -->
        <div class="card">
            <h2>🚨 最新告警 <span id="alertCount"></span></h2>
            <div class="alert-list" id="alertList">
                <div style="color: var(--text-muted); text-align: center; padding: 20px;">暂无告警</div>
            </div>
        </div>
        
        <!-- 服务状态 -->
        <div class="card full-width">
            <h2>🔌 服务状态监控</h2>
            <div class="service-list" id="serviceList">
                <div style="color: var(--text-muted); text-align: center; padding: 20px;">加载中...</div>
            </div>
        </div>
        
        <!-- 运维报告 -->
        <div class="card">
            <h2>📋 运维报告</h2>
            <div class="report-list" id="reportList">
                <div style="color: var(--text-muted); text-align: center; padding: 20px;">加载中...</div>
            </div>
        </div>
        
        <!-- 系统资源 -->
        <div class="card">
            <h2>💻 系统资源</h2>
            <div class="system-stats" id="resourceStats">
                <div class="stat-box">
                    <div class="stat-value" id="cpuUsage">--%</div>
                    <div class="stat-label">CPU</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="memUsage">--%</div>
                    <div class="stat-label">内存</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="diskUsage">--%</div>
                    <div class="stat-label">磁盘</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="loadAvg">--</div>
                    <div class="stat-label">负载</div>
                </div>
            </div>
        </div>
    </div>
    
    <div style="text-align: center; margin-top: 20px;">
        <button class="btn btn-primary" onclick="refreshAll()">🔄 刷新数据</button>
    </div>

    <script>
        const API_HEALTH = 'http://localhost:8098';
        const API_WORKFLOW = 'http://localhost:8099';
        
        async function fetchJSON(url) {
            try {
                const resp = await fetch(url);
                return await resp.json();
            } catch (e) {
                console.error(url, e);
                return null;
            }
        }
        
        async function loadHealth() {
            const data = await fetchJSON(API_HEALTH + '/status');
            if (!data) return;
            
            const services = data.services || {};
            const serviceList = document.getElementById('serviceList');
            
            let healthy = 0, unhealthy = 0;
            
            serviceList.innerHTML = Object.entries(services).map(([name, info]) => {
                const isHealthy = info.status === 'healthy';
                if (isHealthy) healthy++; else unhealthy++;
                
                return `
                    <div class="service-item">
                        <div>
                            <div class="service-name">${name}</div>
                            <div class="service-meta">响应时间: ${(info.response_time * 1000).toFixed(1)}ms</div>
                        </div>
                        <span class="status-badge ${isHealthy ? 'badge-healthy' : 'badge-unhealthy'}">
                            ${isHealthy ? '✓ 健康' : '✗ 异常'}
                        </span>
                    </div>
                `;
            }).join('');
            
            document.getElementById('totalServices').textContent = Object.keys(services).length;
            document.getElementById('healthyServices').textContent = healthy;
            document.getElementById('unhealthyServices').textContent = unhealthy;
            
            // Alerts
            const alerts = data.alerts || [];
            const alertList = document.getElementById('alertList');
            document.getElementById('alertCount').textContent = `(${alerts.length})`;
            
            if (alerts.length === 0) {
                alertList.innerHTML = '<div style="color: var(--text-muted); text-align: center; padding: 20px;">✅ 暂无告警</div>';
            } else {
                alertList.innerHTML = alerts.slice(0, 5).map(a => `
                    <div class="alert-item alert-${a.level || 'info'}">
                        <strong>${a.service || 'System'}</strong>: ${a.message || a.error || 'Unknown alert'}
                    </div>
                `).join('');
            }
        }
        
        async function loadSystemResources() {
            const data = await fetchJSON(API_HEALTH + '/status');
            if (!data) return;
            
            // Get system info from health monitor
            const health = data.health || {};
            document.getElementById('cpuUsage').textContent = health.cpu ? health.cpu.toFixed(1) + '%' : '--%';
            document.getElementById('memUsage').textContent = health.memory ? health.memory.toFixed(1) + '%' : '--%';
            document.getElementById('diskUsage').textContent = health.disk ? health.disk.toFixed(1) + '%' : '--%';
            document.getElementById('loadAvg').textContent = health.load ? health.load.toFixed(2) : '--';
        }
        
        async function loadReports() {
            const reportDir = '/root/.openclaw/workspace/ultron/reports';
            const data = await fetchJSON(API_HEALTH + '/status');
            
            const reportList = document.getElementById('reportList');
            
            // Check for recent reports via API or list directory
            try {
                const resp = await fetch('/api/reports');
                const reports = await resp.json();
                
                if (reports && reports.length > 0) {
                    reportList.innerHTML = reports.slice(0, 5).map(r => `
                        <div class="report-item">
                            <div>
                                <div class="report-name">${r.name}</div>
                                <div class="report-time">${r.time}</div>
                            </div>
                            <button class="btn" onclick="viewReport('${r.file}')">查看</button>
                        </div>
                    `).join('');
                    return;
                }
            } catch(e) {}
            
            // Fallback: show static list
            reportList.innerHTML = `
                <div class="report-item">
                    <div>
                        <div class="report-name">每日运维报告</div>
                        <div class="report-time">自动生成 (Cron)</div>
                    </div>
                    <button class="btn" onclick="location.href='/reports/'">查看</button>
                </div>
                <div class="report-item">
                    <div>
                        <div class="report-name">系统健康报告</div>
                        <div class="report-time">实时生成</div>
                    </div>
                    <button class="btn" onclick="refreshAll()">刷新</button>
                </div>
            `;
        }
        
        async function refreshAll() {
            await Promise.all([
                loadHealth(),
                loadSystemResources(),
                loadReports()
            ]);
            document.getElementById('updateTime').textContent = new Date().toLocaleTimeString('zh-CN');
        }
        
        function viewReport(file) {
            window.open('/reports/' + file, '_blank');
        }
        
        // Auto refresh every 30 seconds
        refreshAll();
        setInterval(refreshAll, 30000);
    </script>
</body>
</html>
