<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统监控中心 - 奥创</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-primary: #0f0f1a;
            --bg-secondary: #1a1a2e;
            --bg-card: #16213e;
            --accent: #00d4ff;
            --accent-green: #00ff88;
            --accent-yellow: #ffd93d;
            --accent-red: #ff6b6b;
            --text-primary: #eee;
            --text-secondary: #888;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
            min-height: 100vh;
            color: var(--text-primary);
            padding: 20px;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 25px;
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            backdrop-filter: blur(10px);
        }
        
        .header h1 {
            font-size: 28px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .header h1 span { color: var(--accent); }
        
        .header-meta {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        
        .last-update {
            color: var(--text-secondary);
            font-size: 14px;
        }
        
        .refresh-btn {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .refresh-btn:hover {
            background: var(--accent-green);
            transform: translateY(-2px);
        }
        
        /* Status Cards */
        .status-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .status-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            transition: all 0.3s;
            border: 1px solid rgba(255,255,255,0.05);
        }
        
        .status-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        .status-card .icon {
            font-size: 36px;
            margin-bottom: 10px;
        }
        
        .status-card .value {
            font-size: 42px;
            font-weight: 700;
            margin: 10px 0;
        }
        
        .status-card .label {
            color: var(--text-secondary);
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .status-card.cpu .value { color: var(--accent); }
        .status-card.memory .value { color: var(--accent-yellow); }
        .status-card.disk .value { color: var(--accent-green); }
        .status-card.network .value { color: #a855f7; }
        .status-card.services .value { color: var(--accent-green); }
        
        /* Main Content Grid */
        .main-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        @media (max-width: 1200px) {
            .main-grid { grid-template-columns: 1fr; }
        }
        
        .chart-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        
        .chart-card h3 {
            margin-bottom: 20px;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .chart-container {
            position: relative;
            height: 300px;
        }
        
        /* Services Grid */
        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .service-card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 18px;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.3s;
        }
        
        .service-card:hover {
            border-color: var(--accent);
        }
        
        .service-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }
        
        .service-icon.healthy {
            background: rgba(0,255,136,0.15);
        }
        
        .service-icon.error {
            background: rgba(255,107,107,0.15);
        }
        
        .service-icon.warning {
            background: rgba(255,217,61,0.15);
        }
        
        .service-info {
            flex: 1;
        }
        
        .service-name {
            font-weight: 600;
            font-size: 15px;
            margin-bottom: 4px;
        }
        
        .service-port {
            color: var(--text-secondary);
            font-size: 13px;
        }
        
        .service-status {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .service-status.healthy {
            background: rgba(0,255,136,0.15);
            color: var(--accent-green);
        }
        
        .service-status.error {
            background: rgba(255,107,107,0.15);
            color: var(--accent-red);
        }
        
        /* Alerts Section */
        .alerts-section {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        
        .alerts-section h3 {
            margin-bottom: 20px;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .alerts-list {
            max-height: 200px;
            overflow-y: auto;
        }
        
        .alert-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 8px;
            background: rgba(255,255,255,0.03);
        }
        
        .alert-item.warning {
            border-left: 3px solid var(--accent-yellow);
        }
        
        .alert-item.info {
            border-left: 3px solid var(--accent);
        }
        
        .alert-item.success {
            border-left: 3px solid var(--accent-green);
        }
        
        /* Process List */
        .process-section {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        
        .process-section h3 {
            margin-bottom: 20px;
            font-size: 18px;
        }
        
        .process-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .process-table th,
        .process-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        
        .process-table th {
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 13px;
        }
        
        .process-table td {
            font-size: 14px;
        }
        
        .process-table tr:hover td {
            background: rgba(255,255,255,0.03);
        }
        
        /* Loading State */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            color: var(--text-secondary);
        }
        
        /* Auto-refresh indicator */
        .auto-refresh {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            font-size: 13px;
        }
        
        .auto-refresh .dot {
            width: 8px;
            height: 8px;
            background: var(--accent-green);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🦞 <span>系统监控中心</span></h1>
        <div class="header-meta">
            <div class="auto-refresh">
                <div class="dot"></div>
                <span>自动刷新</span>
            </div>
            <div class="last-update" id="lastUpdate">最后更新: --</div>
            <button class="refresh-btn" onclick="refreshAll()">🔄 刷新</button>
        </div>
    </div>
    
    <!-- Status Cards -->
    <div class="status-cards">
        <div class="status-card cpu">
            <div class="icon">🖥️</div>
            <div class="value" id="cpuValue">--</div>
            <div class="label">CPU 使用率</div>
        </div>
        <div class="status-card memory">
            <div class="icon">💾</div>
            <div class="value" id="memoryValue">--</div>
            <div class="label">内存使用</div>
        </div>
        <div class="status-card disk">
            <div class="icon">💿</div>
            <div class="value" id="diskValue">--</div>
            <div class="label">磁盘使用</div>
        </div>
        <div class="status-card network">
            <div class="icon">🌐</div>
            <div class="value" id="networkValue">--</div>
            <div class="label">网络活动</div>
        </div>
        <div class="status-card services">
            <div class="icon">⚡</div>
            <div class="value" id="servicesValue">--</div>
            <div class="label">运行服务</div>
        </div>
    </div>
    
    <!-- Main Charts -->
    <div class="main-grid">
        <div class="chart-card">
            <h3>📊 系统资源趋势</h3>
            <div class="chart-container">
                <canvas id="trendChart"></canvas>
            </div>
        </div>
        <div class="chart-card">
            <h3>🎯 资源分布</h3>
            <div class="chart-container">
                <canvas id="distChart"></canvas>
            </div>
        </div>
    </div>
    
    <!-- Services Grid -->
    <div class="chart-card">
        <h3>🚀 服务状态监控</h3>
        <div class="services-grid" id="servicesGrid">
            <div class="loading">加载中...</div>
        </div>
    </div>
    
    <!-- Alerts Section -->
    <div class="alerts-section">
        <h3>🔔 系统告警</h3>
        <div class="alerts-list" id="alertsList">
            <div class="alert-item info">
                <span>✅ 系统运行正常</span>
            </div>
        </div>
    </div>
    
    <!-- Process Section -->
    <div class="process-section">
        <h3>📋 Top 进程</h3>
        <table class="process-table">
            <thead>
                <tr>
                    <th>PID</th>
                    <th>名称</th>
                    <th>CPU%</th>
                    <th>内存%</th>
                    <th>状态</th>
                </tr>
            </thead>
            <tbody id="processTable">
                <tr><td colspan="5" class="loading">加载中...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        // Global state
        let metricsHistory = {
            labels: [],
            cpu: [],
            memory: [],
            disk: []
        };
        
        // Chart instances
        let trendChart, distChart;
        
        // Services to monitor
        const services = [
            { port: 18789, name: 'OpenClaw Gateway', critical: true },
            { port: 18098, name: 'Health Check API', critical: true },
            { port: 18105, name: 'Health Dashboard', critical: false },
            { port: 8888, name: 'Metrics API', critical: true },
            { port: 18180, name: 'Decision Engine', critical: true },
            { port: 18190, name: 'Collab Gateway', critical: true },
            { port: 18200, name: 'Browser Control', critical: false },
            { port: 18232, name: 'Orchestration', critical: false },
        ];
        
        // Initialize charts
        function initCharts() {
            // Trend Chart
            const trendCtx = document.getElementById('trendChart').getContext('2d');
            trendChart = new Chart(trendCtx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [
                        {
                            label: 'CPU %',
                            borderColor: '#00d4ff',
                            backgroundColor: 'rgba(0,212,255,0.1)',
                            data: [],
                            fill: true,
                            tension: 0.4
                        },
                        {
                            label: 'Memory %',
                            borderColor: '#ffd93d',
                            backgroundColor: 'rgba(255,217,61,0.1)',
                            data: [],
                            fill: true,
                            tension: 0.4
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            labels: { color: '#888' }
                        }
                    },
                    scales: {
                        x: {
                            grid: { color: 'rgba(255,255,255,0.05)' },
                            ticks: { color: '#888' }
                        },
                        y: {
                            grid: { color: 'rgba(255,255,255,0.05)' },
                            ticks: { color: '#888' },
                            min: 0,
                            max: 100
                        }
                    }
                }
            });
            
            // Distribution Chart
            const distCtx = document.getElementById('distChart').getContext('2d');
            distChart = new Chart(distCtx, {
                type: 'doughnut',
                data: {
                    labels: ['CPU', '内存', '磁盘', '空闲'],
                    datasets: [{
                        data: [25, 25, 25, 25],
                        backgroundColor: ['#00d4ff', '#ffd93d', '#00ff88', '#333'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: { color: '#888', padding: 20 }
                        }
                    }
                }
            });
        }
        
        // Fetch metrics from API
        async function fetchMetrics() {
            try {
                const response = await fetch('http://127.0.0.1:8888/metrics');
                const data = await response.json();
                return data;
            } catch (e) {
                console.error('Failed to fetch metrics:', e);
                return null;
            }
        }
        
        // Check service status
        async function checkService(port) {
            try {
                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), 2000);
                
                const response = await fetch(`http://127.0.0.1:${port}/health`, {
                    signal: controller.signal
                });
                clearTimeout(timeout);
                return response.ok;
            } catch (e) {
                return false;
            }
        }
        
        // Check all services
        async function checkServices() {
            const results = [];
            for (const svc of services) {
                const healthy = await checkService(svc.port);
                results.push({ ...svc, healthy });
            }
            return results;
        }
        
        // Get top processes
        async function getTopProcesses() {
            try {
                const response = await fetch('http://127.0.0.1:8888/procs');
                const data = await response.json();
                return data.slice(0, 10);
            } catch (e) {
                return [];
            }
        }
        
        // Update UI with metrics
        function updateMetricsUI(data) {
            if (!data) return;
            
            const now = new Date().toLocaleTimeString();
            document.getElementById('lastUpdate').textContent = `最后更新: ${now}`;
            
            // Update cards
            document.getElementById('cpuValue').textContent = data.cpu.usage_percent.toFixed(1) + '%';
            document.getElementById('memoryValue').textContent = data.memory.percent.toFixed(1) + '%';
            document.getElementById('diskValue').textContent = data.disk.disks[0].percent.toFixed(1) + '%';
            
            const net = data.network;
            const totalNet = (net.bytes_sent + net.bytes_recv) / 1024 / 1024;
            document.getElementById('networkValue').textContent = totalNet.toFixed(0) + ' MB';
            
            // Update history
            const time = new Date().toLocaleTimeString();
            metricsHistory.labels.push(time);
            metricsHistory.cpu.push(data.cpu.usage_percent);
            metricsHistory.memory.push(data.memory.percent);
            metricsHistory.disk.push(data.disk.disks[0].percent);
            
            // Keep only last 20 points
            if (metricsHistory.labels.length > 20) {
                metricsHistory.labels.shift();
                metricsHistory.cpu.shift();
                metricsHistory.memory.shift();
                metricsHistory.disk.shift();
            }
            
            // Update charts
            trendChart.data.labels = metricsHistory.labels;
            trendChart.data.datasets[0].data = metricsHistory.cpu;
            trendChart.data.datasets[1].data = metricsHistory.memory;
            trendChart.update('none');
            
            distChart.data.datasets[0].data = [
                data.cpu.usage_percent,
                data.memory.percent,
                data.disk.disks[0].percent,
                100 - Math.max(data.cpu.usage_percent, data.memory.percent, data.disk.disks[0].percent)
            ];
            distChart.update('none');
            
            // Update alerts
            updateAlerts(data);
        }
        
        // Update alerts based on metrics
        function updateAlerts(data) {
            const alertsList = document.getElementById('alertsList');
            const alerts = [];
            
            if (data.cpu.usage_percent > 80) {
                alerts.push({ type: 'warning', text: `⚠️ CPU使用率较高: ${data.cpu.usage_percent.toFixed(1)}%` });
            }
            if (data.memory.percent > 80) {
                alerts.push({ type: 'warning', text: `⚠️ 内存使用率较高: ${data.memory.percent.toFixed(1)}%` });
            }
            if (data.disk.disks[0].percent > 85) {
                alerts.push({ type: 'warning', text: `⚠️ 磁盘使用率较高: ${data.disk.disks[0].percent.toFixed(1)}%` });
            }
            
            if (alerts.length === 0) {
                alerts.push({ type: 'success', text: '✅ 系统运行正常' });
            }
            
            alertsList.innerHTML = alerts.map(a => 
                `<div class="alert-item ${a.type}"><span>${a.text}</span></div>`
            ).join('');
        }
        
        // Update services grid
        async function updateServices() {
            const servicesData = await checkServices();
            const healthy = servicesData.filter(s => s.healthy).length;
            
            document.getElementById('servicesValue').textContent = `${healthy}/${servicesData.length}`;
            
            const grid = document.getElementById('servicesGrid');
            grid.innerHTML = servicesData.map(svc => `
                <div class="service-card">
                    <div class="service-icon ${svc.healthy ? 'healthy' : 'error'}">
                        ${svc.healthy ? '✓' : '✗'}
                    </div>
                    <div class="service-info">
                        <div class="service-name">${svc.name}</div>
                        <div class="service-port">端口: ${svc.port}</div>
                    </div>
                    <span class="service-status ${svc.healthy ? 'healthy' : 'error'}">
                        ${svc.healthy ? '运行中' : '离线'}
                    </span>
                </div>
            `).join('');
        }
        
        // Refresh all data
        async function refreshAll() {
            const data = await fetchMetrics();
            updateMetricsUI(data);
            await updateServices();
        }
        
        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            initCharts();
            refreshAll();
            
            // Auto-refresh every 30 seconds
            setInterval(refreshAll, 30000);
        });
    </script>
</body>
</html>
