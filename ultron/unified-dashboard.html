<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>奥创统一监控面板</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 20px; background: #1a1a2e; color: #eee; }
        h1 { color: #00d4ff; text-align: center; }
        .summary { display: flex; justify-content: center; gap: 30px; margin: 20px 0; }
        .summary-card { background: #16213e; padding: 20px; border-radius: 10px; text-align: center; min-width: 150px; }
        .summary-card .value { font-size: 32px; font-weight: bold; color: #00d4ff; }
        .summary-card .label { color: #888; margin-top: 5px; }
        .systems { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin: 20px 0; }
        .system-card { background: #16213e; padding: 20px; border-radius: 10px; border-left: 4px solid #00d4ff; }
        .system-card h3 { margin: 0 0 15px 0; color: #00d4ff; }
        .metric { display: flex; justify-content: space-between; margin: 10px 0; }
        .metric-label { color: #888; }
        .metric-value { font-weight: bold; }
        .status-healthy { color: #00ff88; }
        .status-error { color: #ff4444; }
    </style>
</head>
<body>
    <h1>🦞 奥创统一监控面板</h1>
    <div class="summary">
        <div class="summary-card">
            <div class="value">3</div>
            <div class="label">总系统数</div>
        </div>
        <div class="summary-card">
            <div class="value">1</div>
            <div class="label">健康系统</div>
        </div>
        <div class="summary-card">
            <div class="value">15.7%</div>
            <div class="label">平均CPU</div>
        </div>
        <div class="summary-card">
            <div class="value">42.1%</div>
            <div class="label">平均内存</div>
        </div>
    </div>
    <div class="systems">
        <div class="system-card">
            <h3>openclaw</h3>
            <div class="metric">
                <span class="metric-label">状态</span>
                <span class="metric-value status-healthy">healthy</span>
            </div>
            <div class="metric">
                <span class="metric-label">CPU</span>
                <span class="metric-value">15.5%</span>
            </div>
            <div class="metric">
                <span class="metric-label">内存</span>
                <span class="metric-value">42.3%</span>
            </div>
            <div class="metric">
                <span class="metric-label">磁盘</span>
                <span class="metric-value">38.7%</span>
            </div>
            <div class="metric">
                <span class="metric-label">网络入</span>
                <span class="metric-value">1024.5 KB/s</span>
            </div>
            <div class="metric">
                <span class="metric-label">网络出</span>
                <span class="metric-value">512.3 KB/s</span>
            </div>
        </div>
        <div class="system-card">
            <h3>server</h3>
            <div class="metric">
                <span class="metric-label">状态</span>
                <span class="metric-value status-error">online</span>
            </div>
            <div class="metric">
                <span class="metric-label">CPU</span>
                <span class="metric-value">23.1%</span>
            </div>
            <div class="metric">
                <span class="metric-label">内存</span>
                <span class="metric-value">55.8%</span>
            </div>
            <div class="metric">
                <span class="metric-label">磁盘</span>
                <span class="metric-value">45.2%</span>
            </div>
            <div class="metric">
                <span class="metric-label">网络入</span>
                <span class="metric-value">2048.0 KB/s</span>
            </div>
            <div class="metric">
                <span class="metric-label">网络出</span>
                <span class="metric-value">1536.0 KB/s</span>
            </div>
        </div>
        <div class="system-card">
            <h3>docker</h3>
            <div class="metric">
                <span class="metric-label">状态</span>
                <span class="metric-value status-error">running</span>
            </div>
            <div class="metric">
                <span class="metric-label">CPU</span>
                <span class="metric-value">8.5%</span>
            </div>
            <div class="metric">
                <span class="metric-label">内存</span>
                <span class="metric-value">28.3%</span>
            </div>
            <div class="metric">
                <span class="metric-label">磁盘</span>
                <span class="metric-value">12.5%</span>
            </div>
            <div class="metric">
                <span class="metric-label">网络入</span>
                <span class="metric-value">256.0 KB/s</span>
            </div>
            <div class="metric">
                <span class="metric-label">网络出</span>
                <span class="metric-value">128.0 KB/s</span>
            </div>
        </div>
    </div>
</body>
</html>
