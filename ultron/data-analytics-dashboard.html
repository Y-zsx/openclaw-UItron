<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>奥创数据分析面板</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 20px; background: #1a1a2e; color: #eee; }
        h1 { color: #00d4ff; text-align: center; }
        .timestamp { text-align: center; color: #888; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; }
        .card { background: #16213e; padding: 20px; border-radius: 10px; border-left: 4px solid #00d4ff; }
        .card h3 { margin: 0 0 15px 0; color: #00d4ff; }
        .metric { display: flex; justify-content: space-between; margin: 8px 0; border-bottom: 1px solid #2a3f5f; padding-bottom: 4px; }
        .metric-label { color: #888; }
        .metric-value { font-weight: bold; color: #fff; }
        .trend { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; margin-left: 10px; }
        .trend-rising { background: #ff4444; color: white; }
        .trend-falling { background: #00ff88; color: #1a1a2e; }
        .trend-stable { background: #888; color: white; }
    </style>
</head>
<body>
    <h1>📊 奥创数据分析面板</h1>
    <div class="timestamp">更新时间: 2026-03-04T20:26:23.670059</div>
    <div class="grid">
        <div class="card">
            <h3>cpu_usage <span class="trend trend-falling">↓下降</span></h3>
            <div class="metric"><span class="metric-label">平均值</span><span class="metric-value">18.34</span></div>
            <div class="metric"><span class="metric-label">最小值</span><span class="metric-value">13.07</span></div>
            <div class="metric"><span class="metric-label">最大值</span><span class="metric-value">23.98</span></div>
            <div class="metric"><span class="metric-label">标准差</span><span class="metric-value">3.78</span></div>
            <div class="metric"><span class="metric-label">P95</span><span class="metric-value">23.69</span></div>
            <div class="metric"><span class="metric-label">样本数</span><span class="metric-value">8</span></div>
        </div>
        <div class="card">
            <h3>memory_usage <span class="trend trend-rising">↑上升</span></h3>
            <div class="metric"><span class="metric-label">平均值</span><span class="metric-value">44.66</span></div>
            <div class="metric"><span class="metric-label">最小值</span><span class="metric-value">43.30</span></div>
            <div class="metric"><span class="metric-label">最大值</span><span class="metric-value">46.28</span></div>
            <div class="metric"><span class="metric-label">标准差</span><span class="metric-value">0.90</span></div>
            <div class="metric"><span class="metric-label">P95</span><span class="metric-value">45.92</span></div>
            <div class="metric"><span class="metric-label">样本数</span><span class="metric-value">8</span></div>
        </div>
        <div class="card">
            <h3>disk_usage <span class="trend trend-stable">→稳定</span></h3>
            <div class="metric"><span class="metric-label">平均值</span><span class="metric-value">39.77</span></div>
            <div class="metric"><span class="metric-label">最小值</span><span class="metric-value">39.60</span></div>
            <div class="metric"><span class="metric-label">最大值</span><span class="metric-value">39.95</span></div>
            <div class="metric"><span class="metric-label">标准差</span><span class="metric-value">0.11</span></div>
            <div class="metric"><span class="metric-label">P95</span><span class="metric-value">39.93</span></div>
            <div class="metric"><span class="metric-label">样本数</span><span class="metric-value">8</span></div>
        </div>
    </div>
</body>
</html>
