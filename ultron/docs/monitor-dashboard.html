<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultron 监控仪表盘</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1e3a5f 0%, #0f172a 100%);
            min-height: 100vh;
            padding: 20px;
            color: #e2e8f0;
        }
        .dashboard {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header .subtitle {
            color: #94a3b8;
            font-size: 0.9rem;
        }
        .status-badge {
            display: inline-block;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: bold;
            margin-top: 15px;
            background: #22c55e;
            color: white;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .card {
            background: rgba(30, 41, 59, 0.8);
            border-radius: 16px;
            padding: 24px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(148, 163, 184, 0.1);
        }
        .card-title {
            font-size: 1.1rem;
            color: #94a3b8;
            margin-bottom: 20px;
            font-weight: 500;
        }
        .gauge-container {
            margin-bottom: 20px;
        }
        .gauge-label {
            font-size: 0.9rem;
            color: #94a3b8;
            margin-bottom: 8px;
        }
        .gauge {
            height: 24px;
            background: #334155;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
        }
        .gauge-fill {
            height: 100%;
            border-radius: 12px;
            transition: width 0.5s ease;
        }
        .gauge-value {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-weight: bold;
            font-size: 0.85rem;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }
        .gauge-threshold {
            font-size: 0.75rem;
            color: #64748b;
            margin-top: 4px;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 20px;
        }
        .stat {
            text-align: center;
            padding: 15px;
            background: rgba(15, 23, 42, 0.5);
            border-radius: 12px;
        }
        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #60a5fa;
        }
        .stat-label {
            font-size: 0.8rem;
            color: #64748b;
            margin-top: 5px;
        }
        .chart-section {
            background: rgba(30, 41, 59, 0.8);
            border-radius: 16px;
            padding: 24px;
            margin-top: 20px;
        }
        .chart-placeholder {
            height: 150px;
            display: flex;
            align-items: flex-end;
            justify-content: space-around;
            padding: 20px 0;
        }
        .bar {
            width: 30px;
            border-radius: 4px 4px 0 0;
            transition: height 0.3s ease;
        }
        .bar-load { background: linear-gradient(to top, #3b82f6, #60a5fa); }
        .bar-mem { background: linear-gradient(to top, #8b5cf6, #a78bfa); }
        .bar-disk { background: linear-gradient(to top, #10b981, #34d399); }
        .bar-label {
            text-align: center;
            font-size: 0.75rem;
            color: #64748b;
            margin-top: 8px;
        }
        .footer {
            text-align: center;
            margin-top: 30px;
            color: #475569;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="header">
            <h1>🦞 Ultron 监控仪表盘</h1>
            <div class="subtitle">服务器实时状态监控</div>
            <div class="status-badge">
                🟢 系统正常
            </div>
        </div>
        
        <div class="grid">
            <div class="card">
                <div class="card-title">📊 系统负载</div>
                
        <div class="gauge-container">
            <div class="gauge-label">Load Average</div>
            <div class="gauge">
                <div class="gauge-fill" style="width: 11.0%; background: #22c55e;"></div>
                <div class="gauge-value">0.4</div>
            </div>
            <div class="gauge-threshold">阈值: 2.0</div>
        </div>
    
                
        <div class="gauge-container">
            <div class="gauge-label">内存使用</div>
            <div class="gauge">
                <div class="gauge-fill" style="width: 17.1%; background: #22c55e;"></div>
                <div class="gauge-value">17.1%</div>
            </div>
            <div class="gauge-threshold">阈值: 80%</div>
        </div>
    
                
        <div class="gauge-container">
            <div class="gauge-label">磁盘使用</div>
            <div class="gauge">
                <div class="gauge-fill" style="width: 30.0%; background: #22c55e;"></div>
                <div class="gauge-value">30.0%</div>
            </div>
            <div class="gauge-threshold">阈值: 90%</div>
        </div>
    
            </div>
            
            <div class="card">
                <div class="card-title">🔧 运行状态</div>
                <div class="stats">
                    <div class="stat">
                        <div class="stat-value">1</div>
                        <div class="stat-label">检查次数</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value">0</div>
                        <div class="stat-label">告警次数</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value">是</div>
                        <div class="stat-label">网关状态</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value">1</div>
                        <div class="stat-label">数据点</div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="chart-section">
            <div class="card-title">📈 最近趋势 (Load)</div>
            <div class="chart-placeholder">
                
                <div>
                    <div class="bar bar-load" style="height: 0.0px;"></div>
                    <div class="bar-label">Load</div>
                </div>
        
            </div>
        </div>
        
        <div class="footer">
            <p>最后更新: 2026-03-05T14:55:17.729502</p>
            <p>Powered by Ultron 🦞</p>
        </div>
    </div>
</body>
</html>
