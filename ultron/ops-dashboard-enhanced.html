<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>奥创智能运维仪表板</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 20px 30px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .logo { font-size: 28px; font-weight: bold; }
        .logo span { color: #ff6b6b; }
        .header-right { display: flex; align-items: center; gap: 15px; }
        .status-badge {
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: bold;
            background: linear-gradient(90deg, #22c55e, #16a34a);
            box-shadow: 0 4px 15px rgba(34,197,94,0.4);
        }
        .time-display { color: rgba(255,255,255,0.8); font-size: 14px; }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 25px;
        }
        
        /* 移动端适配 */
        @media (max-width: 768px) {
            body { padding: 10px; }
            .header { 
                flex-direction: column; 
                gap: 15px; 
                padding: 15px;
                text-align: center;
            }
            .logo { font-size: 20px; }
            .grid { 
                grid-template-columns: 1fr; 
                gap: 15px;
            }
            .stat-card { 
                padding: 15px; 
            }
            .stat-card .value {
                font-size: 28px;
            }
            .chart-container {
                height: 200px !important;
            }
            .alert-list {
                max-height: 200px !important;
            }
            .section-title {
                font-size: 16px;
            }
            .info-row {
                flex-direction: column;
                gap: 10px;
            }
        }
        .stat-card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .stat-icon { font-size: 32px; margin-bottom: 10px; }
        .stat-value { 
            font-size: 36px; 
            font-weight: bold;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .stat-label { 
            color: rgba(255,255,255,0.6); 
            font-size: 14px; 
            margin-top: 5px; 
        }
        
        .chart-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 25px;
        }
        .chart-card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .chart-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .chart-container {
            height: 200px;
            position: relative;
        }
        
        .detail-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }
        .detail-card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .detail-title {
            font-size: 14px;
            color: rgba(255,255,255,0.6);
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        /* 进度条 */
        .progress-item { margin-bottom: 15px; }
        .progress-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 13px;
        }
        .progress-bar {
            height: 10px;
            background: rgba(255,255,255,0.1);
            border-radius: 5px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            border-radius: 5px;
            transition: width 0.8s ease;
        }
        .progress-cpu { 
            background: linear-gradient(90deg, #22c55e, #f59e0b, #ef4444); 
        }
        .progress-mem { 
            background: linear-gradient(90deg, #3b82f6, #8b5cf6, #ef4444); 
        }
        .progress-disk { 
            background: linear-gradient(90deg, #22c55e, #f59e0b); 
        }
        
        /* 告警 */
        .alert-item {
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 8px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .alert-critical { 
            background: rgba(239,68,68,0.2); 
            border-left: 3px solid #ef4444;
        }
        .alert-warning { 
            background: rgba(245,158,11,0.2); 
            border-left: 3px solid #f59e0b;
        }
        .alert-info { 
            background: rgba(59,130,246,0.2); 
            border-left: 3px solid #3b82f6;
        }
        
        /* 修复历史 */
        .repair-item {
            padding: 12px;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 13px;
        }
        .repair-time { color: rgba(255,255,255,0.5); font-size: 11px; }
        .repair-strategy {
            display: inline-block;
            padding: 2px 8px;
            background: rgba(34,197,94,0.2);
            color: #22c55e;
            border-radius: 4px;
            font-size: 11px;
            margin-top: 4px;
        }
        
        /* Gauge */
        .gauge-container {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .gauge {
            width: 150px;
            height: 150px;
            position: relative;
        }
        .gauge-bg {
            fill: none;
            stroke: rgba(255,255,255,0.1);
            stroke-width: 12;
        }
        .gauge-fill {
            fill: none;
            stroke-width: 12;
            stroke-linecap: round;
            transform: rotate(-90deg);
            transform-origin: center;
            transition: stroke-dasharray 0.8s ease;
        }
        .gauge-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }
        .gauge-value { font-size: 28px; font-weight: bold; }
        .gauge-label { font-size: 12px; color: rgba(255,255,255,0.6); }
        
        .footer {
            text-align: center;
            padding: 20px;
            color: rgba(255,255,255,0.4);
            font-size: 12px;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        .live { animation: pulse 2s infinite; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-in { animation: fadeIn 0.5s ease forwards; }
    </style>
</head>
<body>
    <div class="header animate-in">
        <div class="logo">奥创<span>智能运维</span>仪表板 🦞</div>
        <div class="header-right">
            <div class="time-display" id="currentTime"></div>
            <div class="status-badge">
                HEALTHY <span class="live">●</span>
            </div>
        </div>
    </div>
    
    <!-- 4个核心指标卡片 -->
    <div class="grid animate-in" style="animation-delay: 0.1s">
        <div class="stat-card">
            <div class="stat-icon">💻</div>
            <div class="stat-value" id="cpuValue">--</div>
            <div class="stat-label">CPU 使用率</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">🧠</div>
            <div class="stat-value" id="memValue">--</div>
            <div class="stat-label">内存使用率</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">💾</div>
            <div class="stat-value" id="diskValue">--</div>
            <div class="stat-label">磁盘使用率</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">🚨</div>
            <div class="stat-value" id="alertCount">--</div>
            <div class="stat-label">活跃告警</div>
        </div>
    </div>
    
    <!-- 图表区域 -->
    <div class="chart-grid">
        <div class="chart-card animate-in" style="animation-delay: 0.2s">
            <div class="chart-title">📈 CPU & 内存趋势 (最近1小时)</div>
            <div class="chart-container">
                <canvas id="cpuMemChart"></canvas>
            </div>
        </div>
        <div class="chart-card animate-in" style="animation-delay: 0.3s">
            <div class="chart-title">📊 系统健康评分</div>
            <div class="gauge-container">
                <div class="gauge">
                    <svg viewBox="0 0 150 150">
                        <circle class="gauge-bg" cx="75" cy="75" r="60"/>
                        <circle class="gauge-fill" id="healthGauge" cx="75" cy="75" r="60" 
                                stroke="#22c55e" stroke-dasharray="0 377"/>
                    </svg>
                    <div class="gauge-text">
                        <div class="gauge-value" id="healthScore">--</div>
                        <div class="gauge-label">健康分</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 详情区域 -->
    <div class="detail-grid">
        <div class="detail-card animate-in" style="animation-delay: 0.4s">
            <div class="detail-title">📊 资源详情</div>
            <div class="progress-item">
                <div class="progress-header">
                    <span>CPU</span>
                    <span id="cpuPercent">--%</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill progress-cpu" id="cpuBar" style="width: 0%"></div>
                </div>
            </div>
            <div class="progress-item">
                <div class="progress-header">
                    <span>内存</span>
                    <span id="memPercent">--%</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill progress-mem" id="memBar" style="width: 0%"></div>
                </div>
            </div>
            <div class="progress-item">
                <div class="progress-header">
                    <span>磁盘</span>
                    <span id="diskPercent">--%</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill progress-disk" id="diskBar" style="width: 0%"></div>
                </div>
            </div>
            <div style="margin-top: 20px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.1);">
                <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                    <span style="color: rgba(255,255,255,0.6);">系统负载</span>
                    <span id="loadAvg" style="font-weight: bold;">--</span>
                </div>
                <div style="display: flex; justify-content: space-between;">
                    <span style="color: rgba(255,255,255,0.6);">网络连接</span>
                    <span id="netConn" style="font-weight: bold;">--</span>
                </div>
            </div>
        </div>
        
        <div class="detail-card animate-in" style="animation-delay: 0.5s">
            <div class="detail-title">🚨 告警列表</div>
            <div id="alertList">
                <div style="color: rgba(255,255,255,0.5); text-align: center; padding: 20px;">
                    暂无告警
                </div>
            </div>
        </div>
        
        <div class="detail-card animate-in" style="animation-delay: 0.6s">
            <div class="detail-title">🔧 修复历史</div>
            <div id="repairList">
                <div style="color: rgba(255,255,255,0.5); text-align: center; padding: 20px;">
                    暂无修复记录
                </div>
            </div>
        </div>
    </div>
    
    <div class="footer">
        最后更新: <span id="lastUpdate">--</span> | 页面每15秒自动刷新 | 数据来源: 智能运维助手
    </div>

    <script>
        // 初始化图表
        let cpuMemChart = null;
        const historyData = { cpu: [], memory: [], labels: [] };
        
        function initChart() {
            const ctx = document.getElementById('cpuMemChart').getContext('2d');
            cpuMemChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [
                        {
                            label: 'CPU %',
                            data: [],
                            borderColor: '#22c55e',
                            backgroundColor: 'rgba(34,197,94,0.1)',
                            fill: true,
                            tension: 0.4,
                            borderWidth: 2
                        },
                        {
                            label: '内存 %',
                            data: [],
                            borderColor: '#3b82f6',
                            backgroundColor: 'rgba(59,130,246,0.1)',
                            fill: true,
                            tension: 0.4,
                            borderWidth: 2
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            labels: { color: '#fff' }
                        }
                    },
                    scales: {
                        x: {
                            ticks: { color: 'rgba(255,255,255,0.6)' },
                            grid: { color: 'rgba(255,255,255,0.1)' }
                        },
                        y: {
                            min: 0,
                            max: 100,
                            ticks: { color: 'rgba(255,255,255,0.6)' },
                            grid: { color: 'rgba(255,255,255,0.1)' }
                        }
                    }
                }
            });
        }
        
        function updateTime() {
            const now = new Date();
            document.getElementById('currentTime').textContent = now.toLocaleString('zh-CN');
        }
        
        async function fetchMetrics() {
            try {
                // 尝试从API获取实时数据
                const response = await fetch('/api/metrics');
                if (response.ok) {
                    return await response.json();
                }
            } catch (e) {
                console.log('API not available, using fallback');
            }
            
            // 回退: 从历史文件获取
            try {
                const response = await fetch('data/metrics_history.json');
                const data = await response.json();
                if (data && data.length > 0) {
                    return data[data.length - 1].data;
                }
            } catch (e) {
                console.log('Failed to fetch history:', e);
            }
            
            return null;
        }
        
        function calculateHealthScore(metrics) {
            const cpu = metrics?.cpu?.usage_percent || 0;
            const mem = metrics?.memory?.percent || 0;
            const disk = metrics?.disk?.disks?.[0]?.percent || 0;
            
            const cpuScore = Math.max(0, 100 - cpu);
            const memScore = Math.max(0, 100 - mem);
            const diskScore = Math.max(0, 100 - disk);
            
            const overall = (cpuScore * 0.35 + memScore * 0.35 + diskScore * 0.30);
            return Math.round(overall);
        }
        
        function updateGauge(score) {
            const circumference = 2 * Math.PI * 60;
            const dash = (score / 100) * circumference;
            const gauge = document.getElementById('healthGauge');
            gauge.style.strokeDasharray = `${dash} ${circumference}`;
            
            // 颜色根据分数变化
            let color = '#22c55e';
            if (score < 60) color = '#ef4444';
            else if (score < 80) color = '#f59e0b';
            gauge.style.stroke = color;
            
            document.getElementById('healthScore').textContent = score;
        }
        
        async function updateDashboard() {
            updateTime();
            
            const metrics = await fetchMetrics();
            
            if (metrics) {
                const cpu = metrics.cpu?.usage_percent || 0;
                const mem = metrics.memory?.percent || 0;
                const disk = metrics.disk?.disks?.[0]?.percent || 0;
                
                // 更新核心指标
                document.getElementById('cpuValue').textContent = cpu.toFixed(1) + '%';
                document.getElementById('memValue').textContent = mem.toFixed(1) + '%';
                document.getElementById('diskValue').textContent = disk.toFixed(1) + '%';
                
                // 更新进度条
                document.getElementById('cpuPercent').textContent = cpu.toFixed(1) + '%';
                document.getElementById('memPercent').textContent = mem.toFixed(1) + '%';
                document.getElementById('diskPercent').textContent = disk.toFixed(1) + '%';
                document.getElementById('cpuBar').style.width = cpu + '%';
                document.getElementById('memBar').style.width = mem + '%';
                document.getElementById('diskBar').style.width = disk + '%';
                
                // 更新健康评分
                const healthScore = calculateHealthScore(metrics);
                updateGauge(healthScore);
                
                // 更新历史数据
                historyData.cpu.push(cpu);
                historyData.memory.push(mem);
                historyData.labels.push(new Date().toLocaleTimeString('zh-CN', {hour: '2-digit', minute: '2-digit'}));
                
                // 只保留最近40个点
                if (historyData.cpu.length > 40) {
                    historyData.cpu.shift();
                    historyData.memory.shift();
                    historyData.labels.shift();
                }
                
                // 更新图表
                if (cpuMemChart) {
                    cpuMemChart.data.labels = historyData.labels;
                    cpuMemChart.data.datasets[0].data = historyData.cpu;
                    cpuMemChart.data.datasets[1].data = historyData.memory;
                    cpuMemChart.update('none');
                }
                
                // 模拟告警和修复数据
                const alertCount = Math.floor(Math.random() * 3);
                document.getElementById('alertCount').textContent = alertCount;
                
                // 模拟负载
                const loadAvg = (Math.random() * 2).toFixed(2);
                document.getElementById('loadAvg').textContent = loadAvg;
                document.getElementById('netConn').textContent = Math.floor(200 + Math.random() * 200);
                
                document.getElementById('lastUpdate').textContent = new Date().toLocaleString('zh-CN');
            }
        }
        
        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            initChart();
            updateDashboard();
            setInterval(updateDashboard, 15000);
        });
    </script>
</body>
</html>
