<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>奥创控制台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 20px; background: #0d1117; color: #c9d1d9; min-height: 100vh; }
        h1 { color: #58a6ff; text-align: center; margin-bottom: 10px; }
        .timestamp { text-align: center; color: #8b949e; margin-bottom: 20px; font-size: 14px; }
        .nav { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .nav-btn { background: #21262d; color: #c9d1d9; border: 1px solid #30363d; padding: 8px 16px; border-radius: 6px; cursor: pointer; }
        .nav-btn:hover, .nav-btn.active { background: #30363d; border-color: #58a6ff; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .card { background: #161b22; padding: 20px; border-radius: 8px; border: 1px solid #30363d; }
        .card h3 { color: #58a6ff; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        .metric { display: flex; justify-content: space-between; margin: 10px 0; padding-bottom: 8px; border-bottom: 1px solid #30363d; }
        .metric-label { color: #8b949e; }
        .metric-value { font-weight: bold; color: #fff; }
        .status-ok { color: #3fb950; }
        .status-error { color: #f85149; }
        .status-warning { color: #d29922; }
        .alert-item { display: grid; grid-template-columns: 80px 1fr 80px; gap: 10px; padding: 10px 0; border-bottom: 1px solid #30363d; font-size: 13px; }
        .alert-time { color: #8b949e; }
        .alert-msg { color: #c9d1d9; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .alert-sev { padding: 2px 8px; border-radius: 4px; font-size: 11px; text-align: center; }
        .sev-error { background: #f8514922; color: #f85149; }
        .sev-warning { background: #d2992222; color: #d29922; }
        .panel { display: none; }
        .panel.active { display: block; }
        .quick-links { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 15px; }
        .quick-link { background: #21262d; color: #58a6ff; text-decoration: none; padding: 8px 12px; border-radius: 6px; font-size: 13px; }
        .quick-link:hover { background: #30363d; }
    </style>
</head>
<body>
    <h1>🦞 奥创控制台</h1>
    <div class="timestamp">更新时间: <span id="updateTime">-</span></div>
    
    <div class="nav">
        <button class="nav-btn active" onclick="showPanel('overview')">📊 概览</button>
        <button class="nav-btn" onclick="showPanel('alerts')">🚨 告警</button>
        <button class="nav-btn" onclick="showPanel('system')">⚙️ 系统</button>
    </div>
    
    <!-- 概览面板 -->
    <div id="overview" class="panel active">
        <div class="grid">
            <div class="card">
                <h3>🌐 公网访问</h3>
                <div class="metric"><span class="metric-label">Dashboard</span><span class="metric-value status-ok" id="dashboardStatus">检查中...</span></div>
                <div class="metric"><span class="metric-label">Gateway</span><span class="metric-value status-ok" id="gatewayStatus">运行中</span></div>
            </div>
            <div class="card">
                <h3>💻 系统状态</h3>
                <div class="metric"><span class="metric-label">CPU</span><span class="metric-value" id="cpu">-</span></div>
                <div class="metric"><span class="metric-label">内存</span><span class="metric-value" id="memory">-</span></div>
                <div class="metric"><span class="metric-label">磁盘</span><span class="metric-value" id="disk">-</span></div>
            </div>
            <div class="card">
                <h3>🚨 告警统计</h3>
                <div class="metric"><span class="metric-label">总告警</span><span class="metric-value" id="alertTotal">-</span></div>
                <div class="metric"><span class="metric-label">站点故障</span><span class="metric-value" id="alertSite">-</span></div>
                <div class="metric"><span class="metric-label">活跃告警</span><span class="metric-value" id="alertActive">-</span></div>
            </div>
        </div>
        <div class="quick-links" style="margin-top: 20px;">
            <a class="quick-link" href="/analytics" target="_blank">📈 数据分析</a>
            <a class="quick-link" href="/alerts">🚨 告警历史</a>
        </div>
    </div>
    
    <!-- 告警面板 -->
    <div id="alerts" class="panel">
        <div class="card">
            <h3>最近告警 <button onclick="loadAlerts()" style="margin-left:auto;background:#238636;color:white;border:none;padding:4px 10px;border-radius:4px;cursor:pointer;">🔄</button></h3>
            <div id="alertList"></div>
        </div>
    </div>
    
    <!-- 系统面板 -->
    <div id="system" class="panel">
        <div class="grid">
            <div class="card">
                <h3>🐳 容器状态</h3>
                <div class="metric"><span class="metric-label">Gateway</span><span class="metric-value status-ok">运行中</span></div>
                <div class="metric"><span class="metric-label">Browser</span><span class="metric-value status-ok">运行中</span></div>
                <div class="metric"><span class="metric-label">Alert API</span><span class="metric-value status-ok" id="alertApiStatus">检查中...</span></div>
            </div>
            <div class="card">
                <h3>⏰ 定时任务</h3>
                <div class="metric"><span class="metric-label">Cron任务</span><span class="metric-value">4个活跃</span></div>
                <div class="metric"><span class="metric-label">心跳</span><span class="metric-value status-ok">30分钟/次</span></div>
            </div>
        </div>
    </div>
    
    <script>
        function showPanel(name) {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(name).classList.add('active');
            event.target.classList.add('active');
        }
        
        async function checkDashboard() {
            try {
                const resp = await fetch('/');
                document.getElementById('dashboardStatus').textContent = resp.ok ? '✅ 正常' : '❌ 异常';
                document.getElementById('dashboardStatus').className = 'metric-value status-ok';
            } catch(e) {
                document.getElementById('dashboardStatus').textContent = '❌ 异常';
                document.getElementById('dashboardStatus').className = 'metric-value status-error';
            }
        }
        
        async function checkAlertApi() {
            try {
                const resp = await fetch('http://localhost:8765/api/alerts');
                if(resp.ok) {
                    document.getElementById('alertApiStatus').textContent = '运行中';
                    document.getElementById('alertApiStatus').className = 'metric-value status-ok';
                }
            } catch(e) {
                document.getElementById('alertApiStatus').textContent = '已停止';
                document.getElementById('alertApiStatus').className = 'metric-value status-error';
            }
        }
        
        async function loadAlerts() {
            try {
                const resp = await fetch('http://localhost:8765/api/alerts');
                const data = await resp.json();
                const list = document.getElementById('alertList');
                document.getElementById('alertTotal').textContent = data.alerts?.length || 0;
                document.getElementById('alertSite').textContent = data.stats?.by_type?.site_down || 0;
                document.getElementById('alertActive').textContent = data.alerts?.filter(a => a.status === 'active').length || 0;
                
                if (!data.alerts || data.alerts.length === 0) {
                    list.innerHTML = '<div style="color:#8b949e;text-align:center;padding:20px;">暂无告警</div>';
                    return;
                }
                list.innerHTML = data.alerts.slice(0, 10).map(a => `
                    <div class="alert-item">
                        <div class="alert-time">${a.timestamp?.replace('T',' ').substring(0,19) || '-'}</div>
                        <div class="alert-msg">${a.site || a.error || a.message}</div>
                        <div class="alert-sev sev-${a.severity || 'warning'}">${a.severity || '-'}</div>
                    </div>
                `).join('');
            } catch(e) {
                document.getElementById('alertList').innerHTML = '<div style="color:#f85149;">加载失败</div>';
            }
        }
        
        async function loadSystem() {
            try {
                const resp = await fetch('/api/status');
                const data = await resp.json();
                document.getElementById('cpu').textContent = data.cpu?.usage || '-';
                document.getElementById('memory').textContent = data.memory?.usage || '-';
                document.getElementById('disk').textContent = data.disk?.usage || '-';
            } catch(e) {}
        }
        
        // 初始化
        document.getElementById('updateTime').textContent = new Date().toLocaleString();
        checkDashboard();
        checkAlertApi();
        loadAlerts();
        loadSystem();
        setInterval(() => {
            document.getElementById('updateTime').textContent = new Date().toLocaleString();
            loadAlerts();
        }, 30000);
    </script>
</body>
</html>
