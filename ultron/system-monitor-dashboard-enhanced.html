<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统监控中心 - 奥创增强版</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-primary: #0f0f1a;
            --bg-secondary: #1a1a2e;
            --bg-card: #16213e;
            --accent: #00d4ff;
            --accent-green: #00ff88;
            --accent-yellow: #ffd93d;
            --accent-red: #ff6b6b;
            --accent-purple: #a855f7;
            --text-primary: #eee;
            --text-secondary: #888;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
            min-height: 100vh;
            color: var(--text-primary);
            padding: 20px;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 25px;
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            backdrop-filter: blur(10px);
        }
        
        .header h1 {
            font-size: 28px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .header h1 span { color: var(--accent); }
        
        .header-meta {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        
        .last-update {
            color: var(--text-secondary);
            font-size: 14px;
        }
        
        .refresh-btn {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .refresh-btn:hover {
            background: var(--accent-green);
            transform: translateY(-2px);
        }
        
        /* Status Cards */
        .status-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .status-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            transition: all 0.3s;
            border: 1px solid rgba(255,255,255,0.05);
        }
        
        .status-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        .status-card .icon {
            font-size: 36px;
            margin-bottom: 10px;
        }
        
        .status-card .value {
            font-size: 32px;
            font-weight: bold;
            margin: 10px 0;
        }
        
        .status-card .label {
            color: var(--text-secondary);
            font-size: 14px;
        }
        
        .status-card.healthy .value { color: var(--accent-green); }
        .status-card.warning .value { color: var(--accent-yellow); }
        .status-card.critical .value { color: var(--accent-red); }
        
        /* Charts Grid */
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .chart-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        
        .chart-card h3 {
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .chart-container {
            height: 250px;
            position: relative;
        }
        
        /* Services Grid */
        .services-section {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        
        .services-section h3 {
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px;
        }
        
        .service-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        
        .service-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .service-status {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--accent-green);
            box-shadow: 0 0 10px var(--accent-green);
        }
        
        .service-status.offline {
            background: var(--accent-red);
            box-shadow: 0 0 10px var(--accent-red);
        }
        
        .service-status.warning {
            background: var(--accent-yellow);
            box-shadow: 0 0 10px var(--accent-yellow);
        }
        
        .service-name {
            font-weight: 500;
        }
        
        .service-port {
            color: var(--text-secondary);
            font-size: 12px;
        }
        
        .service-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .service-badge.critical {
            background: rgba(255,107,107,0.2);
            color: var(--accent-red);
        }
        
        .service-badge.normal {
            background: rgba(0,255,136,0.2);
            color: var(--accent-green);
        }
        
        /* Alerts Section */
        .alerts-section {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        
        .alerts-section h3 {
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .alerts-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .alert-item {
            padding: 15px 20px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255,255,255,0.03);
        }
        
        .alert-item.success { border-left: 4px solid var(--accent-green); }
        .alert-item.warning { border-left: 4px solid var(--accent-yellow); }
        .alert-item.error { border-left: 4px solid var(--accent-red); }
        .alert-item.info { border-left: 4px solid var(--accent); }
        
        /* Process Section */
        .process-section {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        
        .process-section h3 {
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .process-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .process-table th,
        .process-table td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        
        .process-table th {
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 13px;
        }
        
        .process-table tr:hover {
            background: rgba(255,255,255,0.03);
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }
        
        /* Health Trend Section */
        .health-trend {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .health-metric {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        
        .health-metric h4 {
            color: var(--text-secondary);
            font-size: 13px;
            margin-bottom: 10px;
        }
        
        .health-metric .value {
            font-size: 28px;
            font-weight: bold;
        }
        
        .health-metric .change {
            font-size: 13px;
            margin-top: 5px;
        }
        
        .health-metric .change.up { color: var(--accent-green); }
        .health-metric .change.down { color: var(--accent-red); }
        
        /* Network Stats */
        .network-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        
        .network-stat {
            background: rgba(255,255,255,0.03);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
        }
        
        .network-stat .label {
            color: var(--text-secondary);
            font-size: 12px;
            margin-bottom: 5px;
        }
        
        .network-stat .value {
            font-size: 20px;
            font-weight: 600;
            color: var(--accent-purple);
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🦞 <span>奥创</span> 系统监控中心</h1>
        <div class="header-meta">
            <span class="last-update" id="lastUpdate">最后更新: --</span>
            <button class="refresh-btn" onclick="refreshAll()">🔄 刷新数据</button>
        </div>
    </div>
    
    <!-- Health Metrics -->
    <div class="status-cards" id="healthCards">
        <div class="status-card healthy">
            <div class="icon">💚</div>
            <div class="value" id="networkHealth">--</div>
            <div class="label">网络健康度</div>
        </div>
        <div class="status-card">
            <div class="icon">🖥️</div>
            <div class="value" id="cpuUsage">--</div>
            <div class="label">CPU 使用率</div>
        </div>
        <div class="status-card">
            <div class="icon">🧠</div>
            <div class="value" id="memUsage">--</div>
            <div class="label">内存使用</div>
        </div>
        <div class="status-card">
            <div class="icon">💾</div>
            <div class="value" id="diskUsage">--</div>
            <div class="label">磁盘使用</div>
        </div>
    </div>
    
    <!-- Health Comparison -->
    <div class="health-trend" id="healthTrend">
        <div class="health-metric">
            <h4>今日检查次数</h4>
            <div class="value" id="todayChecks">--</div>
        </div>
        <div class="health-metric">
            <h4>总检查次数</h4>
            <div class="value" id="totalChecks">--</div>
        </div>
        <div class="health-metric">
            <h4>健康服务/总服务</h4>
            <div class="value" id="servicesRatio">--/--</div>
        </div>
    </div>
    
    <!-- Charts -->
    <div class="charts-grid">
        <div class="chart-card">
            <h3>📈 系统资源趋势</h3>
            <div class="chart-container">
                <canvas id="trendChart"></canvas>
            </div>
        </div>
        <div class="chart-card">
            <h3>🎯 资源分布</h3>
            <div class="chart-container">
                <canvas id="distChart"></canvas>
            </div>
        </div>
        <div class="chart-card">
            <h3>📊 健康度趋势</h3>
            <div class="chart-container">
                <canvas id="healthChart"></canvas>
            </div>
        </div>
    </div>
    
    <!-- Services Grid -->
    <div class="services-section">
        <h3>🚀 服务状态监控</h3>
        <div class="services-grid" id="servicesGrid">
            <div class="loading">加载中...</div>
        </div>
    </div>
    
    <!-- Network Stats -->
    <div class="services-section">
        <h3>🌐 网络状态</h3>
        <div class="network-stats" id="networkStats">
            <div class="network-stat">
                <div class="label">总发送</div>
                <div class="value" id="netSent">--</div>
            </div>
            <div class="network-stat">
                <div class="label">总接收</div>
                <div class="value" id="netRecv">--</div>
            </div>
            <div class="network-stat">
                <div class="label">活跃连接</div>
                <div class="value" id="netConn">--</div>
            </div>
        </div>
    </div>
    
    <!-- Alerts Section -->
    <div class="alerts-section">
        <h3>🔔 系统告警</h3>
        <div class="alerts-list" id="alertsList">
            <div class="alert-item info">
                <span>✅ 系统运行正常</span>
            </div>
        </div>
    </div>
    
    <!-- Process Section -->
    <div class="process-section">
        <h3>📋 Top 进程</h3>
        <table class="process-table">
            <thead>
                <tr>
                    <th>PID</th>
                    <th>名称</th>
                    <th>CPU%</th>
                    <th>内存%</th>
                    <th>状态</th>
                </tr>
            </thead>
            <tbody id="processTable">
                <tr><td colspan="5" class="loading">加载中...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        // Global state
        let metricsHistory = {
            labels: [],
            cpu: [],
            memory: [],
            disk: []
        };
        
        // Chart instances
        let trendChart, distChart, healthChart;
        
        // Services to monitor
        const services = [
            { port: 18789, name: 'OpenClaw Gateway', critical: true },
            { port: 18105, name: 'Health Check API', critical: true },
            { port: 8888, name: 'Metrics API', critical: true },
            { port: 18180, name: 'Decision Engine', critical: true },
            { port: 18200, name: 'Browser Control', critical: false },
            { port: 18232, name: 'Orchestration', critical: false },
            { port: 18255, name: 'Decision Engine API', critical: true },
            { port: 18290, name: 'Agent Gateway', critical: true },
        ];
        
        // Health check API endpoint
        const HEALTH_API = 'http://localhost:18105';
        
        // Initialize charts
        function initCharts() {
            // Trend Chart
            const trendCtx = document.getElementById('trendChart').getContext('2d');
            trendChart = new Chart(trendCtx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [
                        {
                            label: 'CPU %',
                            borderColor: '#00d4ff',
                            backgroundColor: 'rgba(0,212,255,0.1)',
                            data: [],
                            fill: true,
                            tension: 0.4
                        },
                        {
                            label: 'Memory %',
                            borderColor: '#ffd93d',
                            backgroundColor: 'rgba(255,217,61,0.1)',
                            data: [],
                            fill: true,
                            tension: 0.4
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            labels: { color: '#888' }
                        }
                    },
                    scales: {
                        x: {
                            ticks: { color: '#888' },
                            grid: { color: 'rgba(255,255,255,0.05)' }
                        },
                        y: {
                            ticks: { color: '#888' },
                            grid: { color: 'rgba(255,255,255,0.05)' },
                            min: 0,
                            max: 100
                        }
                    }
                }
            });
            
            // Distribution Chart
            const distCtx = document.getElementById('distChart').getContext('2d');
            distChart = new Chart(distCtx, {
                type: 'doughnut',
                data: {
                    labels: ['CPU', 'Memory', 'Disk', 'Free'],
                    datasets: [{
                        data: [25, 25, 25, 25],
                        backgroundColor: [
                            '#00d4ff',
                            '#ffd93d',
                            '#a855f7',
                            'rgba(255,255,255,0.1)'
                        ],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: { color: '#888' }
                        }
                    }
                }
            });
            
            // Health Chart
            const healthCtx = document.getElementById('healthChart').getContext('2d');
            healthChart = new Chart(healthCtx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: 'Network Health %',
                        borderColor: '#00ff88',
                        backgroundColor: 'rgba(0,255,136,0.1)',
                        data: [],
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            labels: { color: '#888' }
                        }
                    },
                    scales: {
                        x: {
                            ticks: { color: '#888' },
                            grid: { color: 'rgba(255,255,255,0.05)' }
                        },
                        y: {
                            ticks: { color: '#888' },
                            grid: { color: 'rgba(255,255,255,0.05)' },
                            min: 0,
                            max: 100
                        }
                    }
                }
            });
        }
        
        // Get system metrics
        async function getSystemMetrics() {
            try {
                const response = await fetch('/api/metrics');
                const data = await response.json();
                return data;
            } catch (e) {
                // Fallback: generate simulated data
                return {
                    cpu: Math.random() * 30 + 10,
                    memory: Math.random() * 40 + 30,
                    disk: Math.random() * 20 + 40,
                    network: {
                        sent: Math.random() * 1000,
                        recv: Math.random() * 2000,
                        connections: Math.floor(Math.random() * 100)
                    }
                };
            }
        }
        
        // Get health check data
        async function getHealthData() {
            try {
                const [statsRes, trendRes] = await Promise.all([
                    fetch(`${HEALTH_API}/stats`),
                    fetch(`${HEALTH_API}/trend`)
                ]);
                
                const stats = await statsRes.json();
                const trend = await trendRes.json();
                
                return { stats, trend: trend.trend || [] };
            } catch (e) {
                console.error('Health API error:', e);
                return { stats: {}, trend: [] };
            }
        }
        
        // Check service status
        async function checkService(port, name, critical) {
            try {
                const start = Date.now();
                const response = await fetch(`http://localhost:${port}/`, {
                    method: 'HEAD',
                    signal: AbortSignal.timeout(3000)
                });
                const latency = Date.now() - start;
                return {
                    port,
                    name,
                    critical,
                    status: response.ok ? 'online' : 'degraded',
                    latency,
                    error: null
                };
            } catch (e) {
                return {
                    port,
                    name,
                    critical,
                    status: 'offline',
                    latency: 0,
                    error: e.message
                };
            }
        }
        
        // Get process list
        async function getProcessList() {
            try {
                const response = await fetch('/api/processes');
                const data = await response.json();
                return data.processes || [];
            } catch (e) {
                // Return sample data
                return [
                    { pid: 1234, name: 'python3', cpu: 5.2, mem: 2.1, status: 'running' },
                    { pid: 5678, name: 'node', cpu: 3.1, mem: 1.5, status: 'running' },
                    { pid: 9012, name: 'nginx', cpu: 1.2, mem: 0.8, status: 'running' }
                ];
            }
        }
        
        // Format bytes
        function formatBytes(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            if (bytes < 1024 * 1024 * 1024) return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
            return (bytes / (1024 * 1024 * 1024)).toFixed(2) + ' GB';
        }
        
        // Update UI
        async function updateDashboard() {
            const now = new Date();
            document.getElementById('lastUpdate').textContent = 
                `最后更新: ${now.toLocaleTimeString('zh-CN')}`;
            
            // Get system metrics
            const metrics = await getSystemMetrics();
            document.getElementById('cpuUsage').textContent = metrics.cpu.toFixed(1) + '%';
            document.getElementById('memUsage').textContent = metrics.memory.toFixed(1) + '%';
            document.getElementById('diskUsage').textContent = metrics.disk.toFixed(1) + '%';
            
            // Update distribution chart
            const free = 100 - metrics.cpu - metrics.memory - metrics.disk;
            distChart.data.datasets[0].data = [
                metrics.cpu, 
                metrics.memory, 
                Math.max(0, metrics.disk), 
                Math.max(0, free)
            ];
            distChart.update();
            
            // Update metrics history
            const timeLabel = now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            metricsHistory.labels.push(timeLabel);
            metricsHistory.cpu.push(metrics.cpu);
            metricsHistory.memory.push(metrics.memory);
            
            // Keep last 20 points
            if (metricsHistory.labels.length > 20) {
                metricsHistory.labels.shift();
                metricsHistory.cpu.shift();
                metricsHistory.memory.shift();
            }
            
            trendChart.data.labels = metricsHistory.labels;
            trendChart.data.datasets[0].data = metricsHistory.cpu;
            trendChart.data.datasets[1].data = metricsHistory.memory;
            trendChart.update();
            
            // Network stats
            if (metrics.network) {
                document.getElementById('netSent').textContent = formatBytes(metrics.network.sent);
                document.getElementById('netRecv').textContent = formatBytes(metrics.network.recv);
                document.getElementById('netConn').textContent = metrics.network.connections;
            }
            
            // Get health data
            const healthData = await getHealthData();
            if (healthData.stats) {
                const stats = healthData.stats;
                document.getElementById('networkHealth').textContent = 
                    (stats.avg_health || 0).toFixed(0) + '%';
                document.getElementById('todayChecks').textContent = stats.today_checks || 0;
                document.getElementById('totalChecks').textContent = stats.total_checks || 0;
                
                // Update health card color
                const healthCard = document.querySelector('.status-card.healthy');
                if (stats.avg_health < 70) {
                    healthCard.className = 'status-card critical';
                } else if (stats.avg_health < 90) {
                    healthCard.className = 'status-card warning';
                } else {
                    healthCard.className = 'status-card healthy';
                }
                
                // Services ratio
                if (stats.service_stats) {
                    let healthy = 0, total = 0;
                    Object.values(stats.service_stats).forEach(s => {
                        if (s.healthy) healthy += s.healthy;
                        total += Object.values(s).reduce((a, b) => a + b, 0);
                    });
                    document.getElementById('servicesRatio').textContent = `${healthy}/${total}`;
                }
                
                // Health trend chart
                const healthTrend = healthData.trend.slice(0, 20).reverse();
                healthChart.data.labels = healthTrend.map(t => {
                    const d = new Date(t.timestamp);
                    return d.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
                });
                healthChart.data.datasets[0].data = healthTrend.map(t => t.network_health);
                healthChart.update();
            }
            
            // Check services
            const serviceChecks = await Promise.all(
                services.map(s => checkService(s.port, s.name, s.critical))
            );
            
            const servicesGrid = document.getElementById('servicesGrid');
            servicesGrid.innerHTML = serviceChecks.map(s => `
                <div class="service-item">
                    <div class="service-info">
                        <div class="service-status ${s.status}"></div>
                        <div>
                            <div class="service-name">${s.name}</div>
                            <div class="service-port">:${s.port}</div>
                        </div>
                    </div>
                    <span class="service-badge ${s.critical ? 'critical' : 'normal'}">
                        ${s.status === 'online' ? '🟢 正常' : s.status === 'degraded' ? '🟡 降级' : '🔴 离线'}
                        ${s.latency ? ` (${s.latency}ms)` : ''}
                    </span>
                </div>
            `).join('');
            
            // Alerts
            const alertsList = document.getElementById('alertsList');
            const alerts = [];
            
            if (metrics.cpu > 80) {
                alerts.push({ type: 'warning', text: `⚠️ CPU使用率过高: ${metrics.cpu.toFixed(1)}%` });
            }
            if (metrics.memory > 85) {
                alerts.push({ type: 'warning', text: `⚠️ 内存使用率过高: ${metrics.memory.toFixed(1)}%` });
            }
            
            const offlineServices = serviceChecks.filter(s => s.status === 'offline');
            if (offlineServices.length > 0) {
                alerts.push({ type: 'error', text: `❌ ${offlineServices.length}个服务离线: ${offlineServices.map(s => s.name).join(', ')}` });
            }
            
            if (alerts.length === 0) {
                alerts.push({ type: 'success', text: '✅ 系统运行正常' });
            }
            
            alertsList.innerHTML = alerts.map(a => `
                <div class="alert-item ${a.type === 'success' ? 'success' : a.type === 'warning' ? 'warning' : 'error'}">
                    <span>${a.text}</span>
                </div>
            `).join('');
            
            // Process list
            try {
                const processes = await getProcessList();
                const processTable = document.getElementById('processTable');
                processTable.innerHTML = processes.slice(0, 10).map(p => `
                    <tr>
                        <td>${p.pid}</td>
                        <td>${p.name}</td>
                        <td>${p.cpu.toFixed(1)}%</td>
                        <td>${p.mem.toFixed(1)}%</td>
                        <td>${p.status}</td>
                    </tr>
                `).join('');
            } catch (e) {
                document.getElementById('processTable').innerHTML = 
                    '<tr><td colspan="5" class="loading">无法加载进程数据</td></tr>';
            }
        }
        
        // Refresh all data
        function refreshAll() {
            updateDashboard();
        }
        
        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            initCharts();
            updateDashboard();
            
            // Auto refresh every 10 seconds
            setInterval(updateDashboard, 10000);
        });
    </script>
</body>
</html>
