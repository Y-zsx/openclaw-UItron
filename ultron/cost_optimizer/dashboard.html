<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能成本优化系统 - Agent协作网络</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 { 
            font-size: 2em;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        .header p { color: #888; }
        
        .dashboard {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.3s;
        }
        .stat-card:hover { transform: translateY(-5px); }
        
        .stat-card.cost { border-left: 4px solid #00d4ff; }
        .stat-card.efficiency { border-left: 4px solid #7b2cbf; }
        .stat-card.savings { border-left: 4px solid #00ff88; }
        .stat-card.cpu { border-left: 4px solid #ff6b6b; }
        
        .stat-label { color: #888; font-size: 0.9em; margin-bottom: 8px; }
        .stat-value { font-size: 1.8em; font-weight: bold; }
        .stat-unit { color: #888; font-size: 0.5em; }
        
        .main-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .chart-card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .chart-card h3 { 
            margin-bottom: 20px; 
            color: #00d4ff;
        }
        
        .suggestions-card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            max-height: 400px;
            overflow-y: auto;
        }
        
        .suggestions-card h3 { 
            margin-bottom: 20px; 
            color: #00ff88;
        }
        
        .suggestion-item {
            background: rgba(0,255,136,0.1);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
            border-left: 3px solid #00ff88;
        }
        
        .suggestion-category {
            font-size: 0.8em;
            color: #00ff88;
            text-transform: uppercase;
        }
        
        .suggestion-desc { margin: 8px 0; }
        
        .suggestion-savings {
            color: #00d4ff;
            font-size: 0.9em;
        }
        
        .refresh-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: linear-gradient(135deg, #00d4ff, #7b2cbf);
            border: none;
            color: white;
            padding: 15px 25px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 1em;
            box-shadow: 0 4px 15px rgba(0,212,255,0.3);
        }
        .refresh-btn:hover { transform: scale(1.05); }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        .updating { animation: pulse 1s infinite; }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="header">
            <h1>🦞 智能成本优化系统</h1>
            <p>Agent协作网络 - 资源成本分析与优化建议</p>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card cost">
                <div class="stat-label">当前小时成本</div>
                <div class="stat-value" id="totalCost">--<span class="stat-unit">元</span></div>
            </div>
            <div class="stat-card efficiency">
                <div class="stat-label">资源效率评分</div>
                <div class="stat-value" id="efficiencyScore">--<span class="stat-unit">/100</span></div>
            </div>
            <div class="stat-card savings">
                <div class="stat-label">预估月度节省</div>
                <div class="stat-value" id="potentialSavings">--<span class="stat-unit">元</span></div>
            </div>
            <div class="stat-card cpu">
                <div class="stat-label">CPU使用率</div>
                <div class="stat-value" id="cpuUsage">--<span class="stat-unit">%</span></div>
            </div>
        </div>
        
        <div class="main-grid">
            <div class="chart-card">
                <h3>📈 成本趋势 (24小时)</h3>
                <canvas id="costChart" height="250"></canvas>
            </div>
            <div class="suggestions-card">
                <h3>💡 优化建议</h3>
                <div id="suggestions"></div>
            </div>
        </div>
        
        <div class="chart-card">
            <h3>💰 成本构成分析</h3>
            <canvas id="costBreakdown" height="150"></canvas>
        </div>
    </div>
    
    <button class="refresh-btn" onclick="refreshData()">🔄 刷新数据</button>
    
    <script>
        let costChart = null;
        let breakdownChart = null;
        
        async function refreshData() {
            document.body.classList.add('updating');
            
            try {
                // 获取摘要数据
                const summaryRes = await fetch('/api/summary');
                const summary = await summaryRes.json();
                
                // 更新统计卡片
                document.getElementById('totalCost').innerHTML = 
                    summary.cost_per_hour.total_per_hour.toFixed(4) + '<span class="stat-unit">元/时</span>';
                document.getElementById('efficiencyScore').innerHTML = 
                    summary.efficiency_score.toFixed(1) + '<span class="stat-unit">/100</span>';
                document.getElementById('potentialSavings').innerHTML = 
                    summary.potential_monthly_savings.toFixed(2) + '<span class="stat-unit">元/月</span>';
                document.getElementById('cpuUsage').innerHTML = 
                    summary.system.cpu_percent.toFixed(1) + '<span class="stat-unit">%</span>';
                
                // 更新建议
                const suggestionsDiv = document.getElementById('suggestions');
                if (summary.suggestions.length === 0) {
                    suggestionsDiv.innerHTML = '<div class="suggestion-item"><div class="suggestion-desc">系统运行良好，无需优化</div></div>';
                } else {
                    suggestionsDiv.innerHTML = summary.suggestions.map(s => `
                        <div class="suggestion-item">
                            <div class="suggestion-category">${s.category}</div>
                            <div class="suggestion-desc">${s.description}</div>
                            ${s.potential_savings > 0 ? `<div class="suggestion-savings">预计节省: ¥${s.potential_savings}/小时</div>` : ''}
                        </div>
                    `).join('');
                }
                
                // 更新成本趋势图
                const historyRes = await fetch('/api/cost-history?hours=24');
                const history = await historyRes.json();
                
                const labels = history.history.map(h => {
                    const d = new Date(h.timestamp);
                    return d.getHours() + ':00';
                });
                const data = history.history.map(h => h.cost_per_hour);
                
                if (costChart) costChart.destroy();
                const ctx1 = document.getElementById('costChart').getContext('2d');
                costChart = new Chart(ctx1, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: '成本 (元/小时)',
                            data: data,
                            borderColor: '#00d4ff',
                            backgroundColor: 'rgba(0,212,255,0.1)',
                            fill: true,
                            tension: 0.4
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: { legend: { display: false } },
                        scales: {
                            x: { grid: { color: 'rgba(255,255,255,0.1)' } },
                            y: { grid: { color: 'rgba(255,255,255,0.1)' } }
                        }
                    }
                });
                
                // 更新成本构成饼图
                const cost = summary.cost_per_hour;
                if (breakdownChart) breakdownChart.destroy();
                const ctx2 = document.getElementById('costBreakdown').getContext('2d');
                breakdownChart = new Chart(ctx2, {
                    type: 'doughnut',
                    data: {
                        labels: ['CPU', '内存', '磁盘', '网络'],
                        datasets: [{
                            data: [cost.cpu, cost.memory, cost.disk, cost.network],
                            backgroundColor: ['#ff6b6b', '#4ecdc4', '#ffe66d', '#95e1d3']
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: { 
                            legend: { position: 'right' },
                            tooltip: {
                                callbacks: {
                                    label: (ctx) => `¥${ctx.raw.toFixed(4)}/小时`
                                }
                            }
                        }
                    }
                });
                
            } catch (e) {
                console.error('Error:', e);
            }
            
            document.body.classList.remove('updating');
        }
        
        // 初始加载
        refreshData();
        
        // 自动刷新
        setInterval(refreshData, 30000);
    </script>
</body>
</html>
