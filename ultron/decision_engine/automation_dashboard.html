<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>决策自动化增强面板</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #eee;
            padding: 20px;
        }
        .header {
            text-align: center;
            padding: 20px;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 2em;
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            backdrop-filter: blur(10px);
        }
        .stat-card .value {
            font-size: 2.5em;
            font-weight: bold;
            color: #00d9ff;
        }
        .stat-card .label {
            color: #aaa;
            margin-top: 5px;
        }
        .section {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .section h2 {
            color: #00ff88;
            margin-bottom: 15px;
            font-size: 1.3em;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px;
        }
        .card {
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            padding: 15px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .card h3 {
            color: #00d9ff;
            margin-bottom: 10px;
        }
        .card .desc {
            color: #888;
            font-size: 0.9em;
            margin-bottom: 10px;
        }
        .card .meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.8em;
            color: #666;
        }
        .tag {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.75em;
            margin-right: 5px;
        }
        .tag.performance { background: #ff6b6b; }
        .tag.predictive { background: #4ecdc4; }
        .tag.health { background: #45b7d1; }
        .tag.storage { background: #96ceb4; }
        .tag.scheduled { background: #dda0dd; }
        .btn {
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            color: #1a1a2e;
            cursor: pointer;
            font-weight: bold;
            margin: 5px;
        }
        .btn:hover { opacity: 0.9; }
        .alert {
            padding: 10px;
            border-radius: 8px;
            margin: 5px 0;
            font-size: 0.9em;
        }
        .alert.warning { background: rgba(255,165,0,0.3); border-left: 3px solid orange; }
        .alert.info { background: rgba(0,217,255,0.2); border-left: 3px solid #00d9ff; }
        .alert.success { background: rgba(0,255,136,0.2); border-left: 3px solid #00ff88; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🧠 决策自动化增强面板</h1>
        <p>Decision Automation Enhanced Dashboard</p>
    </div>
    
    <div class="stats">
        <div class="stat-card">
            <div class="value" id="templates">-</div>
            <div class="label">决策模板</div>
        </div>
        <div class="stat-card">
            <div class="value" id="predictions">-</div>
            <div class="label">预测次数</div>
        </div>
        <div class="stat-card">
            <div class="value" id="executions">-</div>
            <div class="label">今日执行</div>
        </div>
        <div class="stat-card">
            <div class="value" id="services">-</div>
            <div class="label">集成服务</div>
        </div>
    </div>
    
    <div class="section">
        <h2>📊 决策模板库</h2>
        <div class="grid" id="templateGrid"></div>
    </div>
    
    <div class="section">
        <h2>🔮 预测性决策</h2>
        <div class="grid">
            <div class="card">
                <h3>CPU 预测</h3>
                <div id="cpuPrediction">加载中...</div>
            </div>
            <div class="card">
                <h3>内存预测</h3>
                <div id="memPrediction">加载中...</div>
            </div>
        </div>
    </div>
    
    <div class="section">
        <h2>🔔 最近告警</h2>
        <div id="alerts"></div>
    </div>
    
    <script>
        const API_BASE = '';
        
        async function loadStats() {
            try {
                const [tmpl, pred, stats] = await Promise.all([
                    fetch(API_BASE + '/api/templates').then(r => r.json()),
                    fetch(API_BASE + '/api/predictions').then(r => r.json()),
                    fetch(API_BASE + '/api/stats').then(r => r.json())
                ]);
                
                document.getElementById('templates').textContent = tmpl.length;
                document.getElementById('predictions').textContent = pred.length;
                document.getElementById('executions').textContent = stats.today_executions;
                document.getElementById('services').textContent = '4';
                
                renderTemplates(tmpl);
                renderPredictions(pred);
            } catch(e) {
                console.error(e);
            }
        }
        
        function renderTemplates(templates) {
            const grid = document.getElementById('templateGrid');
            grid.innerHTML = templates.map(t => `
                <div class="card">
                    <h3>${t.name}</h3>
                    <span class="tag ${t.category}">${t.category}</span>
                    <p class="desc">${t.description}</p>
                    <div class="meta">
                        <span>优先级: ${t.priority}</span>
                        <span>使用: ${t.usage_count}</span>
                    </div>
                    <button class="btn" onclick="executeTemplate('${t.name}')">执行</button>
                </div>
            `).join('');
        }
        
        function renderPredictions(predictions) {
            const cpuDiv = document.getElementById('cpuPrediction');
            const memDiv = document.getElementById('memPrediction');
            
            const cpu = predictions.filter(p => p.metric === 'cpu').slice(0, 3);
            const mem = predictions.filter(p => p.metric === 'memory').slice(0, 3);
            
            cpuDiv.innerHTML = cpu.length ? cpu.map(p => `
                <div class="alert ${p.confidence > 70 ? 'warning' : 'info'}">
                    预测值: ${p.predicted?.toFixed(1)}% | 置信度: ${p.confidence?.toFixed(0)}%
                </div>
            `).join('') : '暂无数据';
            
            memDiv.innerHTML = mem.length ? mem.map(p => `
                <div class="alert ${p.confidence > 70 ? 'warning' : 'info'}">
                    预测值: ${p.predicted?.toFixed(1)}% | 置信度: ${p.confidence?.toFixed(0)}%
                </div>
            `).join('') : '暂无数据';
        }
        
        async function executeTemplate(name) {
            try {
                const r = await fetch(API_BASE + '/api/templates/' + name + '/execute', {method: 'POST'});
                const data = await r.json();
                alert('执行完成: ' + JSON.stringify(data.results, null, 2));
                loadStats();
            } catch(e) {
                alert('执行失败: ' + e);
            }
        }
        
        loadStats();
        setInterval(loadStats, 10000);
    </script>
</body>
</html>
