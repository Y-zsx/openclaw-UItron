<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent任务调度中心</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #e0e0e0;
        }
        .header {
            background: rgba(0,0,0,0.3);
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .header h1 { font-size: 24px; color: #00d9ff; }
        .header .status { 
            padding: 8px 16px; 
            border-radius: 20px;
            font-size: 14px;
        }
        .status.running { background: #00c853; }
        .status.idle { background: #ff9800; }
        
        .container { padding: 20px 30px; }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .stat-card .value { 
            font-size: 36px; 
            font-weight: bold;
            color: #00d9ff;
        }
        .stat-card .label { 
            font-size: 14px; 
            color: #888;
            margin-top: 5px;
        }
        .stat-card.pending .value { color: #ff9800; }
        .stat-card.running .value { color: #00d9ff; }
        .stat-card.completed .value { color: #00c853; }
        .stat-card.failed .value { color: #f44336; }
        
        .charts-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        .chart-card {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .chart-card h3 { 
            font-size: 16px; 
            margin-bottom: 15px;
            color: #ccc;
        }
        
        .queue-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .queue-card {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            max-height: 400px;
            overflow-y: auto;
        }
        .queue-card h3 { 
            font-size: 16px; 
            margin-bottom: 15px;
            color: #ccc;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .queue-card h3 .count {
            background: rgba(0,217,255,0.2);
            padding: 2px 10px;
            border-radius: 10px;
            font-size: 12px;
        }
        
        .task-item {
            background: rgba(0,0,0,0.3);
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 3px solid #00d9ff;
        }
        .task-item.running { border-left-color: #00d9ff; }
        .task-item.pending { border-left-color: #ff9800; }
        .task-item.completed { border-left-color: #00c853; }
        .task-item.failed { border-left-color: #f44336; }
        
        .task-item .task-id { 
            font-size: 12px; 
            color: #888;
            font-family: monospace;
        }
        .task-item .task-name {
            font-size: 14px;
            margin-top: 5px;
            color: #fff;
        }
        .task-item .task-meta {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
            display: flex;
            gap: 15px;
        }
        
        .config-section {
            margin-top: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .config-section h3 { margin-bottom: 15px; }
        
        .config-row {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
        }
        .config-item {
            flex: 1;
        }
        .config-item label {
            display: block;
            font-size: 12px;
            color: #888;
            margin-bottom: 5px;
        }
        .config-item input {
            width: 100%;
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.3);
            color: #fff;
            font-size: 14px;
        }
        
        .footer {
            text-align: center;
            padding: 20px;
            color: #666;
            font-size: 12px;
        }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🤖 Agent任务调度中心</h1>
        <span class="status running" id="systemStatus">运行中</span>
    </div>
    
    <div class="container">
        <!-- 统计卡片 -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="value" id="totalTasks">0</div>
                <div class="label">总任务数</div>
            </div>
            <div class="stat-card pending">
                <div class="value" id="pendingTasks">0</div>
                <div class="label">等待中</div>
            </div>
            <div class="stat-card running">
                <div class="value" id="runningTasks">0</div>
                <div class="label">执行中</div>
            </div>
            <div class="stat-card completed">
                <div class="value" id="completedTasks">0</div>
                <div class="label">已完成</div>
            </div>
            <div class="stat-card failed">
                <div class="value" id="failedTasks">0</div>
                <div class="label">失败</div>
            </div>
        </div>
        
        <!-- 图表 -->
        <div class="charts-row">
            <div class="chart-card">
                <h3>任务执行趋势</h3>
                <canvas id="trendChart"></canvas>
            </div>
            <div class="chart-card">
                <h3>队列分布</h3>
                <canvas id="distributionChart"></canvas>
            </div>
        </div>
        
        <!-- 队列详情 -->
        <div class="queue-section">
            <div class="queue-card">
                <h3>等待队列 <span class="count" id="readyCount">0</span></h3>
                <div id="readyQueue"></div>
            </div>
            <div class="queue-card">
                <h3>运行中 <span class="count" id="runningCount">0</span></h3>
                <div id="runningQueue"></div>
            </div>
        </div>
        
        <!-- 配置 -->
        <div class="config-section">
            <h3>调度配置</h3>
            <div class="config-row">
                <div class="config-item">
                    <label>最大并发数</label>
                    <input type="number" id="maxConcurrent" value="5" min="1" max="20">
                </div>
                <div class="config-item">
                    <label>默认超时(秒)</label>
                    <input type="number" id="defaultTimeout" value="300" min="10">
                </div>
                <div class="config-item">
                    <label>最大重试次数</label>
                    <input type="number" id="maxRetries" value="3" min="0" max="10">
                </div>
            </div>
        </div>
    </div>
    
    <div class="footer">
        最后更新: <span id="lastUpdate">-</span>
    </div>
    
    <script>
        let trendChart, distributionChart;
        
        function initCharts() {
            const trendCtx = document.getElementById('trendChart').getContext('2d');
            trendChart = new Chart(trendCtx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: '完成任务',
                        data: [],
                        borderColor: '#00c853',
                        backgroundColor: 'rgba(0,200,83,0.1)',
                        fill: true
                    }, {
                        label: '失败任务',
                        data: [],
                        borderColor: '#f44336',
                        backgroundColor: 'rgba(244,67,54,0.1)',
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { labels: { color: '#ccc' } } },
                    scales: {
                        x: { ticks: { color: '#888' }, grid: { color: 'rgba(255,255,255,0.1)' } },
                        y: { ticks: { color: '#888' }, grid: { color: 'rgba(255,255,255,0.1)' } }
                    }
                }
            });
            
            const distCtx = document.getElementById('distributionChart').getContext('2d');
            distributionChart = new Chart(distCtx, {
                type: 'doughnut',
                data: {
                    labels: ['等待中', '执行中', '已完成', '失败'],
                    datasets: [{
                        data: [0, 0, 0, 0],
                        backgroundColor: ['#ff9800', '#00d9ff', '#00c853', '#f44336']
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { labels: { color: '#ccc' } } }
                }
            });
        }
        
        async function fetchData() {
            try {
                const [statusRes, statsRes] = await Promise.all([
                    fetch('/api/status'),
                    fetch('/api/stats')
                ]);
                
                const status = await statusRes.json();
                const stats = await statsRes.json();
                
                // 更新统计
                document.getElementById('totalTasks').textContent = stats.total_tasks || 0;
                document.getElementById('pendingTasks').textContent = status.queues?.ready || 0;
                document.getElementById('runningTasks').textContent = status.queues?.running || 0;
                document.getElementById('completedTasks').textContent = stats.completed || 0;
                document.getElementById('failedTasks').textContent = stats.failed || 0;
                
                // 更新配置
                if (status.config) {
                    document.getElementById('maxConcurrent').value = status.config.max_concurrent;
                    document.getElementById('defaultTimeout').value = status.config.default_timeout;
                    document.getElementById('maxRetries').value = status.config.max_retries;
                }
                
                // 更新队列
                const [readyRes, runningRes] = await Promise.all([
                    fetch('/api/list/pending'),
                    fetch('/api/list/running')
                ]);
                
                const readyTasks = await readyRes.json();
                const runningTasks = await runningRes.json();
                
                document.getElementById('readyCount').textContent = readyTasks.length;
                document.getElementById('runningCount').textContent = runningTasks.length;
                
                renderTaskList('readyQueue', readyTasks);
                renderTaskList('runningQueue', runningTasks);
                
                // 更新图表
                distributionChart.data.datasets[0].data = [
                    status.queues?.ready || 0,
                    status.queues?.running || 0,
                    stats.completed || 0,
                    stats.failed || 0
                ];
                distributionChart.update();
                
                document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString();
            } catch (e) {
                console.error('Fetch error:', e);
            }
        }
        
        function renderTaskList(containerId, tasks) {
            const container = document.getElementById(containerId);
            if (!tasks || tasks.length === 0) {
                container.innerHTML = '<div style="color:#666;text-align:center;padding:20px;">暂无任务</div>';
                return;
            }
            
            container.innerHTML = tasks.slice(0, 10).map(task => {
                const status = task.status || 'pending';
                const created = task.created_at ? new Date(task.created_at).toLocaleTimeString() : '-';
                return `
                    <div class="task-item ${status}">
                        <div class="task-id">${task.task_id}</div>
                        <div class="task-name">${task.name || task.task_id}</div>
                        <div class="task-meta">
                            <span>优先级: ${task.priority}</span>
                            <span>创建: ${created}</span>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        initCharts();
        fetchData();
        setInterval(fetchData, 5000);
    </script>
</body>
</html>
