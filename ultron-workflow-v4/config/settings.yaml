# 奥创转世系统 v4.0 配置

system:
  name: "ultron-life-v4"
  version: "4.0.0"
  workdir: "/root/.openclaw/workspace/ultron-workflow-v4"

# 任务配置
tasks:
  default_interval: 300  # 默认5分钟
  max_retries: 3
  timeout: 120

# 记忆配置
memory:
  short_term_file: "memory/short_term.json"
  incarnation_file: "memory/incarnation.json"
  long_term_file: "/root/.openclaw/workspace/MEMORY.md"
  keep_generations: 5  # 保留最近5世记忆

# 执行配置
executor:
  state_file: "executor/state.json"
  log_file: "executor/execution.log"
  enable_rollback: true

# 调度配置
scheduler:
  mode: "dependency"  # dependency | random | priority
  check_interval: 60